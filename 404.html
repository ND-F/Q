<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Loading...</title>
  <script>
    var path = window.location.pathname; 
    var segment = path.split('/').filter(Boolean).pop(); // يجلب 1 أو Q1 أو MIA-001
    
    if (segment && segment !== 'Q') {
      // التحقق إذا كان الرابط يبدأ بحرف Q (لتحويله للنسخة B)
      if (segment.charAt(0).toUpperCase() === 'Q' && segment.length > 1) {
        var realId = segment.substring(1); // بنحذف حرف الـ Q عشان نبعت الـ ID الصافي
        window.location.replace('/Q/scan-b.html?id=' + realId);
      } else {
        // الروابط العادية تذهب للنسخة الأساسية A
        window.location.replace('/Q/scan.html?id=' + segment);
      }
    } else {
      window.location.replace('/Q/scan.html');
    }
  </script>
</head>
<body></body>
</html>
