<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Loading...</title>
  <script>
    var path = window.location.pathname; 
    var segment = path.split('/').filter(Boolean).pop(); 
    
    if (segment && segment !== 'Q') {
      var upperSeg = segment.toUpperCase();
      
      // 1. مسار التصميم الثالث (M و MV) -> يوجه إلى scan-c.html
      if (upperSeg.startsWith('VM')) {
        var realId = 'V' + segment.substring(2); // V1
        window.location.replace('/Q/scan-c.html?id=' + realId);
      } 
      else if (upperSeg.startsWith('M')) {
        var realId = segment.substring(1); // 1
        window.location.replace('/Q/scan-c.html?id=' + realId);
      }
      
      // 2. مسار التصميم الثاني (Q و VQ) -> يوجه إلى scan-b.html
      else if (upperSeg.startsWith('VQ')) {
        var realId = 'V' + segment.substring(2); // V1
        window.location.replace('/Q/scan-b.html?id=' + realId);
      } 
      else if (upperSeg.startsWith('Q')) {
        var realId = segment.substring(1); // 1
        window.location.replace('/Q/scan-b.html?id=' + realId);
      } 
      
      // 3. المسار الافتراضي العادي -> يوجه إلى scan.html
      else {
        window.location.replace('/Q/scan.html?id=' + segment);
      }
    } else {
      window.location.replace('/Q/scan.html');
    }
  </script>
</head>
<body></body>
</html>
