<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Loading...</title>

  <script>
    var path =
      window.location.pathname;

    var segment =
      path.split('/')
      .filter(Boolean)
      .pop();

    if (
      segment &&
      segment !== ''
    ) {

      var upperSeg =
        segment.toUpperCase();

      // VM -> scan.html
      if (
        upperSeg.startsWith('VM')
      ) {

        var realId =
          'V' + segment.substring(2);

        window.location.replace(
          '/scan.html?id=' + realId
        );
      }

      // M -> scan.html
      else if (
        upperSeg.startsWith('M')
      ) {

        var realId =
          segment.substring(1);

        window.location.replace(
          '/scan.html?id=' + realId
        );
      }

      // VN -> n.html
      else if (
        upperSeg.startsWith('VN')
      ) {

        var realId =
          'V' + segment.substring(2);

        window.location.replace(
          '/n.html?id=' + realId
        );
      }

      // N -> n.html
      else if (
        upperSeg.startsWith('N')
      ) {

        var realId =
          segment.substring(1);

        window.location.replace(
          '/n.html?id=' + realId
        );
      }

      // VQ -> scan-b.html
      else if (
        upperSeg.startsWith('VQ')
      ) {

        var realId =
          'V' + segment.substring(2);

        window.location.replace(
          '/scan-b.html?id=' + realId
        );
      }

      // Q -> scan-b.html
      else if (
        upperSeg.startsWith('Q')
      ) {

        var realId =
          segment.substring(1);

        window.location.replace(
          '/scan-b.html?id=' + realId
        );
      }

      // default -> c.html
      else {

        window.location.replace(
          '/c.html?id=' + segment
        );
      }

    } else {

      window.location.replace(
        '/c.html'
      );
    }
  </script>
</head>
<body></body>
</html>
