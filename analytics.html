<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Analytics - NADIM x MIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --main: #06444C;
            --dark-red: #4A121C;
            --gold: #E1A93E;
            --light: #EAE8D8;
            --accent: #ADCAC9;
        }

        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background: var(--main);
            color: var(--light);
            transition: 0.4s;
        }

        body.light {
            background: var(--light);
            color: var(--main);
        }

        /* هيدر موحد */
        #museumHeader { 
            background: var(--light); 
            padding: 15px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 20px; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.2);
        }
        .logo { height: 45px; }
        .header-title { 
            font-size: 16px; font-weight: 700; text-align: center; 
            color: var(--main) !important; line-height: 1.3; 
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(225, 169, 62, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        body.light .chart-card {
            background: white;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h1 {
            color: var(--gold);
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }

        #loader { text-align: center; padding: 50px; color: var(--gold); font-size: 18px; }

        @media (max-width: 600px) {
            h1 { font-size: 22px; }
            .chart-card { padding: 15px; }
        }
    </style>
</head>

<body>

<header id="museumHeader">
    <img src="images/logo-nadim.png" class="logo">
    <div class="header-title">
        Visitor Analytics & Insights<br>إحصائيات وتحليلات الزوار
    </div>
    <img src="images/MIALOGO.png" class="logo">
</header>

<div class="container">
    <h1>إحصائيات مسح القطع الأثرية</h1>
    
    <div class="chart-card">
        <div id="loader">جاري جلب البيانات الإحصائية...</div>
        <canvas id="chart"></canvas>
    </div>
</div>

<script>
    // مزامنة الثيم من الـ LocalStorage
    if (localStorage.getItem("theme") === "light") {
        document.body.classList.add("light");
    }

    const API = "https://script.google.com/macros/s/AKfycbxW__sGqYA7pI4KQFKrwSaV4eQ-p6YrTcAwoc8ORZLyl9NOdF1r2Y983_gGhpbkkdLv/exec?stats=1";

    fetch(API)
    .then(r => r.json())
    .then(data => {
        document.getElementById("loader").style.display = "none";
        
        const isLight = document.body.classList.contains("light");
        const textColor = isLight ? "#06444C" : "#EAE8D8";
        const gridColor = isLight ? "rgba(0,0,0,0.05)" : "rgba(255,255,255,0.05)";

        // إعداد الرسم البياني
        const ctx = document.getElementById("chart").getContext("2d");
        new Chart(ctx, {
            type: "bar",
            data: {
                labels: Object.keys(data).map(id => id.replace("MIA-", "Piece ")),
                datasets: [{
                    label: "عدد الزيارات (Scans)",
                    data: Object.values(data),
                    backgroundColor: "#E1A93E", // اللون الذهبي للأعمدة
                    borderColor: "#ADCAC9",     // لمسة بالأخضر الفاتح في الحواف
                    borderWidth: 1,
                    borderRadius: 8,
                    hoverBackgroundColor: "#ADCAC9" // يقلب أخضر فاتح عند الوقوف عليه
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: {
                        labels: { 
                            font: { family: 'Tajawal', size: 14 },
                            color: textColor 
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: gridColor },
                        ticks: { color: textColor, font: { family: 'Tajawal' } }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: textColor, font: { family: 'Tajawal' } }
                    }
                }
            }
        });
    })
    .catch(err => {
        document.getElementById("loader").textContent = "حدث خطأ أثناء تحميل البيانات الإحصائية.";
    });
</script>

</body>
</html>
