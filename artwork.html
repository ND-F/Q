<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        // التقاط الـ ID وتحويل المستخدم فوراً لأحدث نسخة من الكود
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if (id) {
            window.location.replace("scan.html?id=" + id);
        } else {
            window.location.replace("index.html");
        }
    </script>
</head>
<body style="background:#06444C; color:#EAE8D8; font-family:sans-serif; text-align:center; padding-top:20%;">
    <p>جاري الانتقال لأحدث نسخة من العارض... جاري التحميل</p>
</body>
</html>
