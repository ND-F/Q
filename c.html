<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    
    <title>NADIM in Museum of Islamic Arts - نديم في متحف الفن الإسلامي</title>
    
    <meta name="theme-color" content="#EAE8D8" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#06444C" media="(prefers-color-scheme: dark)">
    
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/ND-F/Q/main/images/icon-nadim-light.svg?v=2" media="(prefers-color-scheme: dark)">
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/ND-F/Q/main/images/icon-nadim.svg?v=2" media="(prefers-color-scheme: light)">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/ND-F/Q/main/images/icon-nadim-light.svg?v=2">
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RWD0WHS7EV"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RWD0WHS7EV');
    </script>

    <style>
        :root { --main: #06444C; --light: #EAE8D8; --gold: #E1A93E; --accent: #ADCAC9; --darkred: #4A121C; }
        
        body { 
            margin: 0; font-family: 'Tajawal', sans-serif; 
            font-weight: 500; 
            background: var(--light); color: var(--main); 
            transition: background 0.4s ease, color 0.4s ease; overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            padding-top: 95px; 
        }
        body.dark { background: var(--main); color: var(--light); }
        
        /* نقش الخلفية */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('https://raw.githubusercontent.com/ND-F/Q/main/images/icon-nadim.svg?v=2');
            background-size: 55px 55px; 
            background-position: center;
            opacity: 0.11; 
            pointer-events: none; z-index: -1; 
            transition: background-image 0.4s ease, opacity 0.4s ease;
        }
        body.dark::before { opacity: 0.09; }

        /* الهيدر */
        #museumHeader { 
            position: fixed; top: 0; left: 0; width: 100%; box-sizing: border-box; 
            background: #EAE8D8 !important; padding: 15px 20px; 
            display: flex; flex-direction: column; align-items: center; z-index: 1000; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.1); border-bottom: 1px solid var(--gold); 
            transition: all 0.3s ease; overflow: hidden; 
        }

        .header-pattern {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('images/NADIM+MIA-icon.svg?v=6');
            background-size: 85px auto; background-position: center; opacity: 0.07; 
            pointer-events: none; z-index: 0;
        }

        .header-inner {
            position: relative; z-index: 1;
            display: flex; align-items: center; justify-content: space-between; 
            width: 100%; max-width: 1400px; margin: 0 auto; /* العرض الموحد 1400 */
        }

        .logos-group {
            display: flex; align-items: center; gap: 0; 
            width: 320px; /* نفس عرض درج المعلومات بالظبط */
            flex-shrink: 0; 
        }
        /* محاذاة اللوجوهات: شمال في العربي (فوق المحتوى) ويمين في الإنجليزي (فوق المحتوى) */
        body.lang-ar .logos-group { justify-content: flex-start; }
        body.lang-en .logos-group { justify-content: flex-end; }

        .logos-group a:first-child { margin-inline-end: -15px; position: relative; z-index: 2; }

        .logo { 
            height: 65px; width: auto; cursor: pointer; 
            backface-visibility: hidden; will-change: transform;
            transition: transform 0.3s ease-out, filter 0.3s ease-out; 
        }
        .logo:hover { transform: scale(1.08); filter: drop-shadow(0 8px 15px rgba(0, 0, 0, 0.15)); }

        .header-title { 
            font-size: 28px; font-weight: 800; color: var(--main) !important; 
            line-height: 1.2; margin: 0; flex: 1;
        }
        body.lang-ar .header-title { text-align: right; }
        body.lang-en .header-title { text-align: left; }

        #museumHeader.header-small { padding: 8px 20px !important; }
        #museumHeader.header-small .logo { height: 40px !important; }
        #museumHeader.header-small .header-title { font-size: 22px !important; }

        /* موبايل */
        @media (max-width: 800px) {
            body { padding-top: 62px; }
            #museumHeader { padding: 10px 20px; } 
            .header-inner { gap: 10px; }
            .header-title { font-size: 17px; }
            .logos-group { width: auto; justify-content: flex-end; }
            .logo { height: 42px; }
            .cover-banner { height: 250px !important; }
        }

        /* المحتوى */
        .cover-banner { width: 100%; height: 400px; overflow: hidden; position: relative; display: none; background: var(--main); }
        .cover-banner img { width: 100%; height: 100%; object-fit: cover !important; display: block; }

        .container { 
            max-width: 1400px; margin: 40px auto 100px; padding: 0 20px; 
            display: flex; align-items: flex-start; gap: 60px; justify-content: center;
            opacity: 0; position: relative; transition: opacity 0.5s ease; box-sizing: border-box;
        }
        .container.ready { opacity: 1; }

        /* درج المعلومات */
        .article-header { width: 320px; flex-shrink: 0; position: sticky; top: 120px; }
        body.lang-ar .container { flex-direction: row; }
        body.lang-en .container { flex-direction: row-reverse; }

        .article-header h1 { font-size: 32px; color: var(--darkred) !important; margin: 0 0 10px 0; font-weight: 900; }
        body.dark .article-header h1 { color: var(--gold) !important; }
        .title-separator { border: none; border-top: 2px solid rgba(225, 169, 62, 0.5); width: 40px; margin: 0 0 20px 0; }
        .meta-group { display: flex; flex-direction: column; gap: 12px; font-size: 16px; font-weight: 500; }
        .meta-inv { margin-top: 25px; padding-top: 15px; border-top: 1px solid rgba(0,0,0,0.1); font-size: 18px; font-weight: 900; color: var(--darkred); }
        body.dark .meta-inv { color: var(--gold) !important; }

        /* شريط التحكم السفلي */
        .controls { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            background: rgba(10, 30, 35, 0.96) !important; backdrop-filter: blur(15px);
            padding: 12px 30px; border-radius: 50px; display: flex; align-items: center; gap: 25px; 
            z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.4); border: 1px solid var(--gold) !important; 
            direction: ltr !important;
        }
        .controls div:not(.sep) {
            font-size: 24px; cursor: pointer; color: white !important; 
            transition: transform 0.25s ease-out; will-change: transform;
        } 
        .controls div:not(.sep):hover { transform: scale(1.15); color: var(--gold) !important; }
        .controls .sep { width: 1px; height: 20px; background: rgba(225, 169, 62, 0.3) !important; }

        .article-content { flex-grow: 1; min-width: 0; max-width: 1050px; }
        .article-body p { font-size: 20px; line-height: 2.1; margin-bottom: 30px; text-align: justify; }
        footer { text-align: center; margin: 40px 0 120px 0; font-size: 13px; opacity: 0.4; }
    </style>
</head>

<body class="lang-ar">

<script>
    (function() {
        const savedTheme = localStorage.getItem("nadim_theme");
        if (savedTheme === "dark") document.body.classList.add("dark");
        const systemLang = navigator.language.startsWith("ar") ? "ar" : "en";
        const savedLang = localStorage.getItem("nadim_lang") || systemLang;
        if (savedLang === "en") { document.body.classList.replace("lang-ar", "lang-en"); document.documentElement.dir = "ltr"; }
    })();
</script>

<header id="museumHeader">
    <div class="header-pattern"></div>
    <div class="header-inner">
        <div class="header-title" id="headerTitle">من حياة التحفة</div>
        <div class="logos-group">
            <a href="https://nd-f.github.io/QR/"><img src="images/logo-nadim.svg" class="logo"></a>
            <a href="https://www.miaegypt.org/ar-eg/museum/collection/Collection" target="_blank"><img src="images/logo-mia.svg" class="logo"></a>
        </div>
    </div>
</header>

<div id="coverBanner" class="cover-banner"><img id="coverImage" src="" alt=""></div>

<div class="container" id="mainContainer">
    <aside class="article-header" id="articleHeader">
        <h1 id="title"></h1>
        <hr class="title-separator">
        <div class="meta-group">
            <div id="from"></div>
            <div id="date"></div>
            <div id="material"></div>
            <div id="dim"></div>
            <div class="meta-inv" id="inv"></div>
            <div id="hall" style="font-weight:800; margin-top:5px;"></div> 
        </div>
    </aside>
    <main class="article-content">
        <div id="heroSection"></div>
        <div class="article-body" id="articleBody"></div>
    </main>
</div>

<div class="controls">
    <div onclick="navigatePiece(-1)" class="nav-btn" data-ar="القطعة السابقة" data-en="Previous Piece">◀</div>
    <div class="sep"></div>
    <div onclick="toggleLang()">🌐</div>
    <div onclick="window.location.href='https://nd-f.github.io/QR/'" style="display:flex;"><img src="images/icon-nadim-gold.png" style="width:35px; height:35px;"></div>
    <div onclick="toggleTheme()" id="themeBtn">☀️</div>
    <div onclick="share()">🔗</div>
    <div class="sep"></div>
    <div onclick="navigatePiece(1)" class="nav-btn" data-ar="القطعة التالية" data-en="Next Piece">▶</div>
</div>

<footer> Nadim Foundation ©® 2018 </footer>

<script>
    const systemLang = navigator.language.startsWith("ar") ? "ar" : "en";
    let lang = localStorage.getItem("nadim_lang") || systemLang;
    let allArtworks = [], artwork;

    async function load() {
        try {
            const res = await fetch("data/artworks.json");
            allArtworks = await res.json();
            let id = new URLSearchParams(location.search).get("id");
            initPiece(id || allArtworks[0].id);
        } catch(e) { console.error(e); }
    }

    function initPiece(id) {
        artwork = allArtworks.find(a => String(a.id).toUpperCase() === String(id).toUpperCase()) || allArtworks[0];
        renderArticle();
        document.getElementById('mainContainer').classList.add('ready');
    }

    function renderArticle() {
        const ar = lang === "ar";
        document.documentElement.dir = ar ? "rtl" : "ltr";
        document.body.className = (ar ? "lang-ar" : "lang-en") + (document.body.classList.contains("dark") ? " dark" : "");
        document.getElementById("headerTitle").innerHTML = ar ? "من حياة التحفة" : "From the Life of an Artefact";
        
        let coverImg = document.getElementById("coverImage");
        coverImg.src = "images/" + artwork.id + "_cover.webp";
        coverImg.onload = () => document.getElementById("coverBanner").style.display = "block";

        document.getElementById("title").innerHTML = ar ? artwork.title_ar : artwork.title_en;
        document.getElementById("from").innerHTML = ar ? artwork.from_ar : artwork.from_en;
        document.getElementById("date").innerHTML = ar ? artwork.date_ar : artwork.date_en;
        document.getElementById("material").innerHTML = ar ? artwork.material_ar : artwork.material_en;
        document.getElementById("inv").innerHTML = artwork.inventory_number || "";
        document.getElementById("hall").innerHTML = ar ? artwork.hall_ar : artwork.hall_en;
        document.getElementById("articleBody").innerHTML = `<p>${(ar ? artwork.desc_ar : artwork.desc_en).replace(/\n/g, '<br>')}</p>`;
        
        updateThemeIcon();
    }

    function toggleLang() { lang = lang === "ar" ? "en" : "ar"; localStorage.setItem("nadim_lang", lang); renderArticle(); }
    function toggleTheme() { document.body.classList.toggle("dark"); localStorage.setItem("nadim_theme", document.body.classList.contains("dark") ? "dark" : "light"); updateThemeIcon(); }
    function updateThemeIcon() { document.getElementById("themeBtn").textContent = document.body.classList.contains("dark") ? "☀️" : "🌙"; }
    function share() { if (navigator.share) navigator.share({title: artwork.title_ar, url: location.href}); }
    function navigatePiece(step) {
        const idx = allArtworks.findIndex(a => a.id === artwork.id) + step;
        if(idx >= 0 && idx < allArtworks.length) initPiece(allArtworks[idx].id);
    }

    load();
</script>
</body>
</html>
