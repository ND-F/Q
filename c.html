<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    
    <title>NADIM in Museum of Islamic Arts - نديم في متحف الفن الإسلامي</title>
    
    <meta name="theme-color" content="#EAE8D8" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#06444C" media="(prefers-color-scheme: dark)">
    
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/ND-F/Q/main/images/icon-nadim-light.svg?v=2" media="(prefers-color-scheme: dark)">
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/ND-F/Q/main/images/icon-nadim.svg?v=2" media="(prefers-color-scheme: light)">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/ND-F/Q/main/images/icon-nadim-light.svg?v=2">
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RWD0WHS7EV"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RWD0WHS7EV');
    </script>

    <style>
        :root { --main: #06444C; --light: #EAE8D8; --gold: #E1A93E; --accent: #ADCAC9; --darkred: #4A121C; }
        
        body { 
            margin: 0; font-family: 'Tajawal', sans-serif; 
            font-weight: 500; /* إجبار كل نصوص الموقع على Medium كبداية */
            background: var(--light); color: var(--main); 
            transition: background 0.4s ease, color 0.4s ease; overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            padding-top: 95px; 
        }
        body.dark { background: var(--main); color: var(--light); }
        
        
        /* ========================================== */
        /* نقش الخلفية لكامل الشاشة (اللايت والدارك) */
        /* ========================================== */
        body::before {
            content: "";
            position: fixed; 
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            
            background-image: url('https://raw.githubusercontent.com/ND-F/Q/main/images/icon-nadim.svg?v=2');
            background-size: 80px 80px; 
            background-position: center;
            
            opacity: 0.03; 
            pointer-events: none; 
            z-index: -1; 
            transition: background-image 0.4s ease, opacity 0.4s ease;
        }

        body.dark::before {
            background-image: url('https://raw.githubusercontent.com/ND-F/Q/main/images/icon-nadim-light.svg?v=2');
            opacity: 0.02; 
        }
        
       
        /* ========================================== */
        /* الهيدر المطور */
        /* ========================================== */
        #museumHeader { 
            position: fixed; top: 0; left: 0; width: 100%; box-sizing: border-box; 
            background: #EAE8D8 !important; 
            /* التعديل 1: خلينا البادينج 20px عشان يتساوى مع حواف الصفحة */
            padding: 15px 20px; 
            display: flex; flex-direction: column; 
            align-items: center; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.1); 
            border-bottom: 1px solid var(--gold); 
            transition: all 0.3s ease;
            overflow: hidden; 
        }

        /* ========================================== */
        /* باترن الهيدر (متناسق مع الصورة المقصوصة) */
        /* ========================================== */
        .header-pattern {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('images/NADIM+MIA-icon.svg?v=6');
            background-size: 85px auto; 
            background-position: center; 
            opacity: 0.05; 
            pointer-events: none; z-index: 0;
        }

        .header-inner {
            position: relative; z-index: 1;
            display: flex; align-items: center; justify-content: space-between; 
            width: 100%; max-width: 1200px; margin: 0 auto;
        }

        .logos-group {
            display: flex; align-items: center; gap: 00px;
            flex-shrink: 0; 
        }
        .logos-group a:first-child {
            margin-inline-end: -15px; 
            position: relative;
            z-index: 2;
        }

        .logo { 
            height: 65px; 
            width: auto; 
            cursor: pointer; 
            backface-visibility: hidden;
            transform: translateZ(0);
            will-change: transform;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.4s ease; 
        }

        .logo:hover {
            transform: translateZ(0) scale(1.08); 
            filter: drop-shadow(0 8px 15px rgba(0, 0, 0, 0.15)); 
        }

        .header-title { 
            font-size: 28px; font-weight: 800;
            color: var(--main) !important; line-height: 1.2; 
            transition: all 0.3s ease; margin: 0;
            flex: 1 1 auto;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        body.lang-ar .header-title { text-align: right; }
        body.lang-en .header-title { text-align: left; }

        /* حالة السكرول للهيدر */
        #museumHeader.header-small { padding: 8px 20px !important; } /* وحدنا البادينج هنا كمان */
        #museumHeader.header-small .logo { height: 40px !important; }
        #museumHeader.header-small .header-title { font-size: 22px !important; }

        /* شاشات الموبايل */
        @media (max-width: 800px) {
            body { padding-top: 62px; } /* مسافة البودي للموبايل */
            
            #museumHeader { padding: 10px 20px; } 
            
            .header-inner { 
                display: flex; 
                flex-direction: row; 
                align-items: center; 
                justify-content: space-between; 
                gap: 10px;
            }
            
            .header-title { 
                font-size: 17px; 
                margin: 0; 
                flex: 1; 
            }
            
            .logos-group {
                position: static; width: auto;
                display: flex; flex-direction: row; justify-content: flex-end;
                gap: 10px; flex-shrink: 0;
            }
            
            .logo { height: 42px; }
            
            #museumHeader.header-small { padding: 6px 20px !important; }
            #museumHeader.header-small .logo { height: 32px !important; }
            #museumHeader.header-small .header-title { font-size: 14px !important; }

            /* مقاسات الكافر في الموبايل */
            .cover-banner { 
                height: 250px !important; 
            }
        }

       /* ========================================== */
        /* الكافر (Cover Banner) بوضعه الطبيعي (بينزل مع السكرول) */
        /* ========================================== */
        .cover-banner {
            width: 100%; /* 100% أفضل من 100vw لمنع سكرول العرض */
            height: 400px; 
            overflow: hidden; 
            position: relative; /* الكافر أصبح جزء من الصفحة وبيتحرك معاها */
            display: none;
            background: var(--main); margin: 0; padding: 0;
        }

        .cover-banner img { 
            width: 100%; height: 100%; 
            object-fit: cover !important; 
            object-position: center; 
            display: block; opacity: 1; 
        }

        .container { 
            max-width: 1200px; 
            /* المسافة هنا 40px هي المسافة بين الكافر والمحتوى */
            margin: 40px auto 100px; padding: 0 20px; 
            opacity: 0; position: relative;
            transition: opacity 0.5s ease; 
        }
        
        .container.ready { opacity: 1; }

        .info-toggle-btn {
            display: flex; position: fixed; top: 180px; 
            right: 0; left: auto;
            background: var(--gold); color: white; padding: 12px 15px;
            border-radius: 15px 0 0 15px; z-index: 990; cursor: pointer;
            box-shadow: -2px 2px 10px rgba(0,0,0,0.2); font-size: 20px;
            transform-origin: right center;
            transition: transform 0.3s ease, opacity 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
        }
        
        .info-toggle-btn::before {
            content: attr(data-tooltip); position: absolute; top: 50%; right: 120%; 
            transform: translateY(-50%) translateX(10px); 
            background: rgba(6, 68, 76, 0.50); /* الشفافية 50 */
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); /* تأثير الزجاج */
            color: var(--light); 
            padding: 8px 15px; border-radius: 12px; font-size: 14px; white-space: nowrap; font-weight: 800;
            opacity: 0; visibility: hidden; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; font-family: 'Tajawal', sans-serif;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); z-index: 1000;
        }
        
        .info-toggle-btn:hover::before,
        .info-toggle-btn.show-tooltip::before { 
            opacity: 1; visibility: visible; transform: translateY(-50%) translateX(0); 
        }

        .info-toggle-btn.mini:not(.close) {
            transform: scale(0.68);
            opacity: 0.24;
            background: rgba(225, 169, 62, 0.42);
            box-shadow: -2px 2px 8px rgba(0,0,0,0.08);
        }

        .info-toggle-btn.mini:not(.close):hover,
        .info-toggle-btn.mini:not(.close):focus-within {
            transform: scale(1);
            opacity: 1;
            background: var(--gold);
        }

        .info-toggle-btn.close {
            background: rgba(6, 68, 76, 0.22);
            color: rgba(255,255,255,0.92);
            box-shadow: -2px 2px 10px rgba(0,0,0,0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1002;
            transform: scale(1);
            opacity: 1;
        }

        body.dark .info-toggle-btn.close {
            background: rgba(234, 232, 216, 0.16);
            color: var(--light);
        }

        .info-toggle-btn.close::before {
            display: none;
        }
        
        /* عنوان القطعة (Tajawal Black) */
        .article-header h1 { 
            font-size: 32px; 
            color: var(--darkred) !important; 
            margin: 0 0 10px 0; 
            font-weight: 900; /* Black */
            line-height: 1.4; 
        }
        body.dark .article-header h1 { color: var(--gold) !important; }
        
        .title-separator { border: none; border-top: 2px solid rgba(225, 169, 62, 0.5); width: 40px; margin: 0 0 20px 0; }
        body.lang-ar .title-separator { margin-left: auto; margin-right: 0; }
        body.lang-en .title-separator { margin-left: 0; margin-right: auto; }

        /* مجموعة المعلومات الأساسية (Tajawal Medium) */
        .meta-group { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            font-size: 16px; 
            color: var(--main); 
            opacity: 0.9; 
            line-height: 1.6; 
            font-weight: 500; /* Medium */
        }
        body.dark .meta-group { color: var(--light); }
        .meta-item { display: block; }
        
        /* جعل الماتريال بنفس تنسيق المكان والتاريخ */
        .meta-material { 
            display: block; 
            /* شيلنا اللون الأحمر والخط التخين عشان يمشي مع الباقي */
        }

        /* القاعة (Tajawal Extra Bold) */
        #hall { 
            font-weight: 800; /* Extra Bold */
            color: var(--main); 
            font-size: 18px; 
            margin-top: 5px; 
        }
        body.dark #hall { color: var(--accent); }
        
        /* رقم الحفظ (بنفس روح العنوان Tajawal Black - وبحجم 18) */
        .meta-inv { 
            margin-top: 25px; 
            padding-top: 15px; 
            border-top: 1px solid rgba(0,0,0,0.1); 
            
            font-size: 18px; /* حجم الماتريال القديم */
            color: var(--darkred); /* لون العنوان */
            font-weight: 900; /* Black زي العنوان */
            font-family: 'Tajawal', serif; /* لغينا الـ sans-serif */
            opacity: 1; /* لغينا الشفافية */
        }
        
        /* رقم الحفظ في الدارك مود (لون ذهبي زي العنوان) */
        body.dark .meta-inv { 
            border-top-color: rgba(255,255,255,0.1); 
            color: var(--gold) !important;
        }

        @media (min-width: 1000px) {
            /* توحيد المقاسات بين الهيدر والكونتينر بالمللي */
            .header-inner { max-width: 1400px; width: 100%; box-sizing: border-box; }
            
            /* اللوجوهات هتاخد نفس عرض عمود النص، وتبدأ من الشمال معاه بالمسطرة */
            body.lang-en .logos-group { 
                width: 320px; 
                justify-content: flex-start; 
                transform: translateX( 00px);
                /* لو حسيت إن اللوجو لسه مرحل سيكا بسبب الفراغ اللي جوه الصورة نفسها، تقدر تزود السطر ده: */
                /* transform: translateX(-10px); */
            }

            /* ⚠️ التعديل الجذري هنا: ضفنا box-sizing عشان الـ padding ميكبرش الكونتينر ويبوظ المحاذاة */
            .container { display: flex; align-items: flex-start; gap: 60px; justify-content: center; max-width: 1400px; box-sizing: border-box; } 
            body.lang-ar .container { flex-direction: row; } 
            body.lang-en .container { flex-direction: row-reverse; } 

            .article-header {
                width: 320px; flex-shrink: 0; position: sticky; top: 120px; text-align: inherit;
                background: transparent !important; padding: 0 !important; margin-bottom: 0 !important; z-index: 10;
                box-shadow: none; transition: none; left: auto !important; right: auto !important;
                height: auto; overflow-y: visible; 
            }
            body.lang-ar .article-header { text-align: right; }
            body.lang-en .article-header { text-align: left; }
            
            body.lang-ar .meta-group { align-items: flex-start; } 
            
            /* كبرنا مساحة الكتابة لـ 1050px بدل 800px */
            .article-content { flex-grow: 1; min-width: 0; max-width: 1050px; margin: 0 auto; } 
            .info-toggle-btn { display: none !important; }
        }

        
        @media (max-width: 999px) {
            .container { display: block; max-width: 800px; padding-top: 20px; }
            
            .article-header { 
                position: fixed; top: 0; 
                right: -100%; left: auto;
                width: 80%; max-width: 350px; height: 100vh; overflow-y: auto;
                background: var(--light); z-index: 999; 
                padding: 100px 30px 40px; box-shadow: -5px 0 25px rgba(0,0,0,0.2);
                transition: right 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            }
            
            /* --- الووتر مارك الخاص بدرج المعلومات --- */
            .article-header::before {
                content: "";
                position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                background-image: url('https://raw.githubusercontent.com/ND-F/Q/main/images/icon-nadim.svg?v=2');
                background-size: 80px 80px; 
                background-position: center;
                opacity: 0.03; 
                pointer-events: none; z-index: 0;
            }
            body.dark .article-header::before {
                background-image: url('https://raw.githubusercontent.com/ND-F/Q/main/images/icon-nadim-light.svg?v=2');
                opacity: 0.02;
            }
            /* رفع الكلام فوق الووتر مارك عشان يفضل مقروء */
            .article-header > * {
                position: relative; z-index: 1;
            }
            /* -------------------------------------- */

            body.dark .article-header { background: var(--main); box-shadow: -5px 0 25px rgba(0,0,0,0.8); }
            body.lang-ar .article-header { text-align: right; }
            body.lang-en .article-header { text-align: left; }
            .article-header.open { right: 0; }
            .info-toggle-btn.hide { transform: scale(0); }
        }

        .image-pair-container { margin: 40px 0; width: 100%; text-align: center; display: block; }
        .image-pair-wrapper { display: flex; gap: 20px; justify-content: center; align-items: flex-start; flex-wrap: wrap; width: 100%; }
        
        .image-pair-wrapper img { 
            width: auto; max-width: 100%; height: auto; max-height: 65vh; object-fit: contain; 
            border-radius: 4px; box-shadow: none; border: none;
            cursor: zoom-in; transition: transform 0.3s;
        }
        body.dark .image-pair-wrapper img { box-shadow: none; border: none; }
        .image-pair-wrapper img:hover { transform: scale(1.02); }
        
        @media (min-width: 600px) {
            .image-pair-wrapper.has-double img { max-width: calc(50% - 10px); }
        }

        /* الشرح تحت الصور - باستخدام ألوان البراند مع شفافية بسيطة */
        figcaption { margin-top: 15px; font-size: 14px; color: var(--main); font-weight: 500; opacity: 0.8; line-height: 1.5; }
        body.dark figcaption { color: var(--light); opacity: 0.7; }
        body.lang-ar figcaption { text-align: right; border-right: 3px solid var(--gold); padding-right: 12px; }
        body.lang-en figcaption { text-align: left; border-left: 3px solid var(--gold); padding-left: 12px; }
        
        /* حقوق الصور - باستخدام ألوان البراند */
        .photo-credit { 
            display: block !important; margin-top: 15px; font-size: 13px; color: var(--main); opacity: 0.75;
            font-weight: 500; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 15px; 
            width: 100%; box-sizing: border-box; /* التعديل هنا: ضفنا box-sizing عشان الخط الدهبي ميحركش البوكس */
        }
        body.dark .photo-credit { color: var(--light); opacity: 0.65; border-bottom: 1px solid rgba(255,255,255,0.1); }
        body.lang-ar .photo-credit { text-align: right; border-right: 3px solid var(--gold); padding-right: 12px; }
        body.lang-en .photo-credit { text-align: left; border-left: 3px solid var(--gold); padding-left: 12px; }

        /* نصوص المقالة الأساسية - لون صريح وقوي من البراند */
        .article-body p { font-size: 20px; line-height: 2.1; margin-bottom: 30px; color: var(--main); text-align: justify; }
        body.dark .article-body p { color: var(--light); }
        body.lang-en .article-body { direction: ltr; }
        body.lang-ar .article-body { direction: rtl; }

        .video-container { 
            width: 100%; 
            padding-bottom: 56.25%; 
            height: 0; 
            margin-bottom: 40px; 
            border-radius: 15px; 
            overflow: hidden; 
            position: relative; 
            display: none; 
            border: 2px solid var(--gold); 
            box-shadow: 0 8px 30px rgba(0,0,0,0.5); 
        }
        
        .video-container iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
        .inline-video { margin-bottom: 30px !important; border-radius: 15px !important; }

        .main-figure { 
            width: 100%; margin: 0 0 30px 0; padding: 0; 
            display: block; text-align: center; /* التعديل هنا: لغينا الـ flex وخليناها block عشان الانفو بوكس ياخد راحته زي باقي الصور بالظبط */
        }
        .viewer { width: 100%; max-height: 65vh; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; background: transparent; }
        .viewer img { 
            max-width: 100%; max-height: 65vh; object-fit: contain; 
            box-shadow: none; border: none;
            border-radius: 4px; transition: opacity 0.4s ease; 
        }
        body.dark .viewer img { box-shadow: none; border: none; }

        
        .controls { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            background: rgba(10, 30, 35, 0.96) !important; backdrop-filter: blur(15px);
            padding: 12px 30px; border-radius: 50px; display: flex; align-items: center; gap: 25px; 
            z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.4); border: 1px solid var(--gold) !important; 
            direction: ltr !important; transition: transform 0.35s ease, opacity 0.35s ease, bottom 0.35s ease, background 0.35s ease, box-shadow 0.35s ease;
        }
        .controls div { font-size: 24px; cursor: pointer; color: white !important; transition: 0.2s; position: relative; } 
        .controls .nav-btn { color: var(--gold) !important; font-size: 28px; }
        .controls .nav-btn.disabled { opacity: 0.15; pointer-events: none; }
        .controls .sep { width: 1px; height: 20px; background: rgba(225, 169, 62, 0.3) !important; }
        
        /* شريط الكنترول */
        .controls div:not(.sep) {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            backface-visibility: hidden;
            transform: translateZ(0);
        }

        .controls div:not(.sep):hover {
            transform: translateZ(0) scale(1.15); 
            color: var(--gold) !important; 
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.3)); 
        }

        .controls div:not(.sep):hover img {
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.3));
        }

        .controls > div:not(.sep)::before {
            content: attr(data-tooltip); position: absolute; bottom: 125%; left: 50%;
            transform: translateX(-50%) translateY(10px); 
            background: rgba(6, 68, 76, 0.50); 
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); /* تأثير الزجاج */
            color: var(--light); 
            padding: 8px 15px; border-radius: 12px; font-size: 14px; white-space: nowrap; font-weight: 800;
            opacity: 0; visibility: hidden; transition: 0.3s; pointer-events: none; font-family: 'Tajawal', sans-serif;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        
        .controls > div:not(.sep):hover::before { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

        .controls.controls-mini {
            transform: translateX(-50%) scale(0.58);
            opacity: 0.16;
            bottom: 10px;
            background: rgba(10, 30, 35, 0.38) !important;
            border-color: rgba(225, 169, 62, 0.22) !important;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }

        .controls.controls-mini:hover,
        .controls.controls-mini:focus-within {
            transform: translateX(-50%) scale(1);
            opacity: 1;
            bottom: 25px;
            background: rgba(10, 30, 35, 0.96) !important;
            border-color: var(--gold) !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        #fullscreenModal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(255,255,255,0.50); z-index: 10001; }
        body.dark #fullscreenModal { background: rgba(6, 68, 76, 0.50); }
        #modalContent { display: flex; height: 100%; align-items: center; justify-content: center; overflow: hidden; }
        #modalImage { max-width: 95%; max-height: 95%; object-fit: contain; cursor: grab; transform-origin: center center; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.2)); }
        #modalClose { position: absolute; top: 25px; right: 25px; font-size: 40px; color: var(--main); cursor: pointer; z-index: 10002; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }

<script>
    const systemLang = navigator.language.startsWith("ar") ? "ar" : "en";
    let lang = localStorage.getItem("nadim_lang") || systemLang;
    let allArtworks = [], artwork;
    let zoomStartTime = 0, isZoomTracked = false;

    const modal = document.getElementById("fullscreenModal"), modalImage = document.getElementById("modalImage");
    let controlsTimer;
    const controlsEl = document.querySelector('.controls');

    function expandControls() {
        controlsEl.classList.remove('controls-mini');
        clearTimeout(controlsTimer);
    }

    function resetControlsTimer() {
        expandControls();
        controlsTimer = setTimeout(() => { controlsEl.classList.add('controls-mini'); }, 2500); 
    }

    window.addEventListener('scroll', resetControlsTimer, { passive: true });
    window.addEventListener('touchstart', resetControlsTimer, { passive: true });
    controlsEl.addEventListener('mouseenter', expandControls);
    controlsEl.addEventListener('mouseleave', resetControlsTimer);
    controlsEl.addEventListener('touchstart', resetControlsTimer, { passive: true });
    resetControlsTimer(); 

    const sidebar = document.getElementById("articleHeader");
    const infoBtn = document.getElementById("infoToggleBtn");
    let peekTimer;
    let infoMiniTimer;

    function expandInfoButton() {
        infoBtn.classList.remove("mini");
        clearTimeout(infoMiniTimer);
    }

    function resetInfoButtonTimer() {
        if (window.innerWidth >= 1000 || infoBtn.classList.contains("close")) return;
        expandInfoButton();
        infoMiniTimer = setTimeout(() => {
            if (!sidebar.classList.contains("open")) {
                infoBtn.classList.add("mini");
            }
        }, 2500);
    }

    function setInfoDrawer(open) {
        sidebar.classList.toggle("open", open);
        infoBtn.classList.toggle("close", open);
        infoBtn.classList.remove("show-tooltip", "mini");
        infoBtn.innerHTML = open ? '<i class="fas fa-times"></i>' : '<i class="fas fa-info-circle"></i>';

        if (open) clearTimeout(infoMiniTimer);
        else resetInfoButtonTimer();
    }

    infoBtn.onclick = () => {
        setInfoDrawer(!sidebar.classList.contains("open"));
    };

    infoBtn.addEventListener("mouseenter", expandInfoButton);
    infoBtn.addEventListener("mouseleave", resetInfoButtonTimer);
    infoBtn.addEventListener("touchstart", resetInfoButtonTimer, { passive: true });
    window.addEventListener("scroll", resetInfoButtonTimer, { passive: true });
    resetInfoButtonTimer();

    window.addEventListener("scroll", () => { 
        let isScrolled = window.scrollY > 40;
        document.body.classList.toggle("is-scrolled", isScrolled); 
        document.getElementById("museumHeader").classList.toggle("header-small", isScrolled); 
        
        if(sidebar.classList.contains("open") && window.scrollY > 50) {
            setInfoDrawer(false);
            clearTimeout(peekTimer);
        }
    }, { passive: true });

    
    function triggerMobilePeek() {
        if(window.innerWidth >= 1000) return;
        
        clearTimeout(peekTimer);
        setInfoDrawer(true);
        
        peekTimer = setTimeout(() => {
            if(sidebar.classList.contains("open")) {
                setInfoDrawer(false);
                
                setTimeout(() => {
                    infoBtn.classList.add("show-tooltip");
                    setTimeout(() => {
                        infoBtn.classList.remove("show-tooltip");
                        resetInfoButtonTimer();
                    }, 3000);
                }, 600);
            }
        }, 2500); 
    }

    async function load() {
        try {
            updateThemeIcon();
            const res = await fetch("data/artworks.json", { cache: "default" });
            allArtworks = await res.json();
            let id = new URLSearchParams(location.search).get("id");
            if (!id) {
                let pathName = window.location.pathname.replace(/\/$/, "");
                let fileName = pathName.split('/').pop().replace('.html', '');
                if (fileName && fileName !== "c" && fileName !== "Q") id = fileName;
            }
            if (!allArtworks || allArtworks.length === 0) return;
            const finalId = id || allArtworks[0].id;
            initPiece(finalId);
            if (window.location.search.includes("id=")) {
                let urlPath = String(finalId).toUpperCase().startsWith('V') ? 'VM' + String(finalId).substring(1) : 'M' + finalId;
                window.history.replaceState({id: finalId}, '', urlPath);
            }
        } catch(e) { console.error(e); }
    }

    function initPiece(id) {
        if (!allArtworks || allArtworks.length === 0) return;
        let targetId = String(id).trim().toUpperCase(); 
        artwork = allArtworks.find(a => a.id && String(a.id).trim().toUpperCase() === targetId);
        if(!artwork) artwork = allArtworks[0];
        if(!artwork) return;

        if (typeof gtag === 'function') {
            let actualId = String(artwork.id).toUpperCase();
            if (!actualId.startsWith('VN')) {
                if (actualId.startsWith('V')) gtag('event', 'view_craft_video', { 'video_id': actualId, 'video_title': artwork.title_ar || artwork.title_en });
                else gtag('event', 'view_artifact', { 'artifact_id': actualId, 'artifact_title': artwork.title_ar || artwork.title_en });
            }
        }
        
        if(sidebar.classList.contains("open")) setInfoDrawer(false);

        renderArticle();
        updateNavButtons();
        document.getElementById('mainContainer').classList.add('ready');

        if (window.innerWidth < 1000) {
            const firstImg = document.querySelector('#heroSection img');
            if (firstImg && !firstImg.complete) {
                const onLoad = () => { triggerMobilePeek(); firstImg.removeEventListener('load', onLoad); };
                firstImg.addEventListener('load', onLoad);
                setTimeout(() => { firstImg.removeEventListener('load', onLoad); triggerMobilePeek(); }, 2000);
            } else {
                setTimeout(triggerMobilePeek, 300);
            }
        }
    }

    function renderArticle() {
        const ar = lang === "ar";
        document.documentElement.dir = ar ? "rtl" : "ltr";
        document.body.className = (ar ? "lang-ar" : "lang-en") + (document.body.classList.contains("dark") ? " dark" : "");
        
        document.getElementById("headerTitle").innerHTML = ar ? "من حياة التحفة" : "From the Life of an Artefact";
        
        let coverBanner = document.getElementById("coverBanner");
        let coverImg = document.getElementById("coverImage");
        
        coverBanner.style.display = "none";
        document.body.classList.remove("has-cover");
        
        coverImg.src = "images/" + artwork.id + "_cover.webp";
        coverImg.onload = () => { coverBanner.style.display = "block"; document.body.classList.add("has-cover"); };
        coverImg.onerror = () => {
            coverImg.src = "images/" + artwork.id + "_cover.jpg";
            coverImg.onload = () => { coverBanner.style.display = "block"; document.body.classList.add("has-cover"); };
            coverImg.onerror = () => {
                 coverImg.src = "images/" + artwork.id + "_cover.png";
                 coverImg.onload = () => { coverBanner.style.display = "block"; document.body.classList.add("has-cover"); };
                 coverImg.onerror = () => { coverBanner.style.display = "none"; document.body.classList.remove("has-cover"); }
            }
        };

        document.getElementById("title").innerHTML = (ar ? artwork.title_ar : artwork.title_en) || "بدون عنوان";
        document.getElementById("from").innerHTML = (ar ? artwork.from_ar : artwork.from_en) || "";
        document.getElementById("date").innerHTML = (ar ? artwork.date_ar : artwork.date_en) || "";
        document.getElementById("material").innerHTML = (ar ? artwork.material_ar : artwork.material_en) || "";
        document.getElementById("dim").innerHTML = (ar ? artwork.dimensions_ar : artwork.dimensions_en) || "";
        document.getElementById("inv").innerHTML = artwork.inventory_number || "";
        document.getElementById("hall").innerHTML = (ar ? artwork.hall_ar : artwork.hall_en) || "";

        let rawVid = String(artwork.video_url || "").trim();
        let vidSlot = -1; let finalVidUrl = "";
        if (rawVid !== "") {
            let firstChar = rawVid.charAt(0).toLowerCase();
            if (['a', 'b', 'c', 'd', 'e'].includes(firstChar) && rawVid.length > 1 && (rawVid.charAt(1) === 'h' || rawVid.charAt(1) === '<')) {
                vidSlot = firstChar.charCodeAt(0) - 97; rawVid = rawVid.substring(1).trim(); 
            }
            finalVidUrl = rawVid;
            if (rawVid.includes("<iframe") && rawVid.includes("src=")) {
                let match = rawVid.match(/src="([^"]+)"/);
                if (match) finalVidUrl = match[1];
            }
        }

        let vidContainer = document.getElementById("videoContainer");
        if (finalVidUrl && vidSlot === -1) {
            vidContainer.style.display = "block";
            vidContainer.innerHTML = `<iframe width="100%" height="100%" src="${finalVidUrl}" frameborder="0" allowfullscreen></iframe>`;
        } else { vidContainer.style.display = "none"; }

        let potentialImages = [artwork.image1, artwork.image2, artwork.image3, artwork.image4, artwork.image5];
        let images = potentialImages.map(src => src && String(src).trim() !== "" ? String(src).replace(/\.[^/.]+$/, ".webp") : null);

        let heroSection = document.getElementById("heroSection");
        heroSection.innerHTML = "";
        
        if (images[0] || (vidSlot === 0 && finalVidUrl)) {
            let heroFig = document.createElement("figure");
            heroFig.className = "main-figure";
            if (vidSlot === 0 && finalVidUrl) {
                let vWrap = document.createElement("div"); vWrap.className = "video-container inline-video"; vWrap.style.display = "block"; vWrap.style.width = "100%";
                vWrap.innerHTML = `<iframe width="100%" height="100%" src="${finalVidUrl}" frameborder="0" allowfullscreen></iframe>`;
                heroFig.appendChild(vWrap);
            } else if (images[0]) {
                let viewer = document.createElement("div"); viewer.className = "viewer";
                let img = document.createElement("img"); img.src = images[0];
                img.onerror = function() { this.closest('.viewer').style.display = 'none'; };
                img.onclick = () => openModal(img.src);
                viewer.appendChild(img);
                setTimeout(() => { img.style.opacity = 1; }, 50);
                heroFig.appendChild(viewer);
            }
            let capText = (artwork[`info_${lang}1`] || "").trim();
            if (capText) {
                let cap = document.createElement("figcaption"); cap.className = "photo-credit"; cap.innerHTML = capText;
                heroFig.appendChild(cap);
            }
            heroSection.appendChild(heroFig);
        }

        let articleBody = document.getElementById("articleBody");
        articleBody.innerHTML = "";
        
        const splitDescParts = Array.from({ length: 5 }, (_, i) => {
            return (ar ? artwork[`dsc_ar${i + 1}`] : artwork[`dsc_en${i + 1}`]) || "";
        });

        const hasSplitDesc = splitDescParts.some(text => text.trim() !== "");
        let mainDesc = (ar ? artwork.desc_ar : artwork.desc_en) || "";

        if (!hasSplitDesc && mainDesc.trim() !== "") {
            let pMain = document.createElement("p");
            pMain.innerHTML = mainDesc.replace(/\n/g, '<br>');
            articleBody.appendChild(pMain);
        }

        for (let i = 0; i < 5; i++) {
            let pText = splitDescParts[i] || "";

            if (i === 0) {
                if (hasSplitDesc && pText.trim() !== "") {
                    let p = document.createElement("p");
                    p.innerHTML = pText.replace(/\n/g, '<br>');
                    articleBody.appendChild(p);
                }
            } else {
                if (images[i] || (vidSlot === i && finalVidUrl) || (hasSplitDesc && pText.trim() !== "")) {
                    if (vidSlot === i && finalVidUrl) articleBody.appendChild(createInlineVideo(finalVidUrl, i));
                    else if (images[i]) articleBody.appendChild(createInlineFigure(images[i], i));
                    
                    if (hasSplitDesc && pText.trim() !== "") {
                        let p = document.createElement("p");
                        p.innerHTML = pText.replace(/\n/g, '<br>');
                        articleBody.appendChild(p);
                    }
                }
            }
        }

        let isVideo = String(artwork.id).toUpperCase().startsWith('V');
        const prevBtn = document.getElementById("prevPiece"), nextBtn = document.getElementById("nextPiece");
        if (isVideo) { prevBtn.setAttribute("data-ar", "الحرفة السابقة"); prevBtn.setAttribute("data-en", "Previous Craft"); nextBtn.setAttribute("data-ar", "الحرفة التالية"); nextBtn.setAttribute("data-en", "Next Craft"); } 
        else { prevBtn.setAttribute("data-ar", "القطعة السابقة"); prevBtn.setAttribute("data-en", "Previous Piece"); nextBtn.setAttribute("data-ar", "القطعة التالية"); nextBtn.setAttribute("data-en", "Next Piece"); }
        document.querySelectorAll('[data-ar]').forEach(el => { el.setAttribute('data-tooltip', el.getAttribute(`data-${lang}`) || ''); });
        
        const infoBtnEl = document.getElementById("infoToggleBtn");
        if(infoBtnEl) infoBtnEl.setAttribute('data-tooltip', infoBtnEl.getAttribute(`data-${lang}`) || '');
    }

    function createInlineFigure(src, idx) {
        let fig = document.createElement("figure"); fig.className = "image-pair-container";
        let wrapper = document.createElement("div"); wrapper.className = "image-pair-wrapper"; fig.appendChild(wrapper);
        let img1 = document.createElement("img"); img1.src = src; img1.onerror = function() { this.style.display = 'none'; }; img1.onclick = () => openModal(src); wrapper.appendChild(img1);
        
        let doubleChar = String.fromCharCode(97 + idx); let doubleSrc = src.replace(/\.webp$/, "") + doubleChar + ".webp"; 
        let img2 = document.createElement("img"); img2.src = doubleSrc; img2.style.display = "none"; 
        img2.onload = function() { this.style.display = "block"; wrapper.classList.add("has-double"); };
        img2.onerror = function() { this.remove(); }; img2.onclick = () => openModal(doubleSrc); wrapper.appendChild(img2);
        
        let infoStr = (artwork[`info_${lang}${idx + 1}`] || "").trim();
        if (infoStr) { let cap = document.createElement("figcaption"); cap.className = "photo-credit"; cap.innerHTML = infoStr; fig.appendChild(cap); }
        return fig;
    }

        function createInlineVideo(url, idx) {
        let fig = document.createElement("figure"); 
        fig.className = "image-pair-container"; 

        let vWrap = document.createElement("div"); 
        vWrap.className = "video-container inline-video"; 
        vWrap.style.display = "block"; 
        vWrap.style.marginBottom = "0"; 
        vWrap.innerHTML = `<iframe width="100%" height="100%" src="${url}" frameborder="0" allowfullscreen></iframe>`; 
        fig.appendChild(vWrap);

        let infoStr = (artwork[`info_${lang}${idx + 1}`] || "").trim();
        if (infoStr) { 
            let cap = document.createElement("figcaption"); 
            cap.className = "photo-credit"; 
            cap.innerHTML = infoStr; 
            fig.appendChild(cap); 
        }
        return fig;
    }

    function toggleLang() { lang = lang === "ar" ? "en" : "ar"; localStorage.setItem("nadim_lang", lang); renderArticle(); if (typeof gtag === 'function') gtag('event', 'toggle_language', { 'language_selected': lang }); }
    function toggleTheme() { const isDark = document.body.classList.toggle("dark"); localStorage.setItem("nadim_theme", isDark ? "dark" : "light"); updateThemeIcon(); if (typeof gtag === 'function') gtag('event', 'toggle_theme', { 'theme_selected': isDark ? 'dark' : 'light' }); }
    function updateThemeIcon() { let isDark = document.body.classList.contains("dark"); document.getElementById("themeBtn").textContent = isDark ? "☀️" : "🌙"; }
    function share() { if (navigator.share) navigator.share({title: document.getElementById("title").innerText, url: location.href}); if (typeof gtag === 'function') gtag('event', 'share_click', { 'artifact_id': artwork ? artwork.id : 'unknown' }); }
    function trackContactUs() { if (typeof gtag === 'function') gtag('event', 'contact_us_click', { 'from_page_id': artwork ? artwork.id : 'unknown' }); setTimeout(() => { window.location.href = 'https://nd-f.github.io/QR/'; }, 150); }
    document.querySelector('[data-en="Contact Us"]').setAttribute("onclick", "trackContactUs()");

    function navigatePiece(step) {
        const idx = allArtworks.findIndex(a => String(a.id) === String(artwork.id)) + step;
        if(idx >= 0 && idx < allArtworks.length) {
            const nextId = allArtworks[idx].id;
            let urlPath = String(nextId).toUpperCase().startsWith('V') ? 'VM' + String(nextId).substring(1) : 'M' + nextId;
            window.history.pushState({id: nextId}, '', urlPath); initPiece(nextId); window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function updateNavButtons() {
        const idx = allArtworks.findIndex(a => String(a.id) === String(artwork.id));
        document.getElementById("prevPiece").classList.toggle("disabled", idx === 0); document.getElementById("nextPiece").classList.toggle("disabled", idx === allArtworks.length - 1);
    }

    let scale = 1, panning = false, pointX = 0, pointY = 0, startX = 0, startY = 0, startDist = 0, initialScale = 1, isPinching = false, tapStartX = 0, tapStartY = 0;
    function setTransform() { modalImage.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`; }
    function resetZoom() { scale = 1; pointX = 0; pointY = 0; setTransform(); }
    function trackIntentionalInteraction() { if (!isZoomTracked && artwork && typeof gtag === 'function') { if (Date.now() - zoomStartTime > 1500) { gtag('event', 'intentional_zoom_or_pan', { 'artifact_id': artwork.id }); isZoomTracked = true; } } }

    function openModal(src) { resetZoom(); modal.style.display = 'block'; document.body.style.overflow = 'hidden'; modalImage.src = src; history.pushState({modal: true}, ""); zoomStartTime = Date.now(); isZoomTracked = false; }

    modal.addEventListener("wheel", (e) => { if (modal.style.display !== 'block') return; e.preventDefault(); const clientX = e.clientX, clientY = e.clientY, delta = e.deltaY || -e.wheelDelta; let newScale = scale * (delta > 0 ? 0.85 : 1.15); if (newScale < 1) newScale = 1; if (newScale > 20) newScale = 20; const ratio = 1 - (newScale / scale), centerX = (window.innerWidth / 2) + pointX, centerY = (window.innerHeight / 2) + pointY; pointX += (clientX - centerX) * ratio; pointY += (clientY - centerY) * ratio; scale = newScale; if (scale === 1) { pointX = 0; pointY = 0; } setTransform(); if (scale > 1.1) trackIntentionalInteraction(); }, { passive: false });
    modalImage.addEventListener("mousedown", (e) => { if (scale > 1) { e.preventDefault(); startX = e.clientX; startY = e.clientY; panning = true; modalImage.style.cursor = "grabbing"; } });
    window.addEventListener("mouseup", () => { panning = false; modalImage.style.cursor = "grab"; });
    window.addEventListener("mousemove", (e) => { if (!panning || scale === 1) return; e.preventDefault(); pointX += e.clientX - startX; pointY += e.clientY - startY; startX = e.clientX; startY = e.clientY; setTransform(); trackIntentionalInteraction(); });
    modal.addEventListener('touchstart', (e) => { if (e.touches.length === 2) { e.preventDefault(); isPinching = true; startDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); initialScale = scale; } else if (e.touches.length === 1) { if (scale > 1) panning = true; startX = e.touches[0].clientX; startY = e.touches[0].clientY; tapStartX = e.touches[0].clientX; tapStartY = e.touches[0].clientY; } }, {passive: false});
    modal.addEventListener('touchmove', (e) => { if (modal.style.display !== 'block') return; if (e.touches.length === 2) { e.preventDefault(); let dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); let newScale = initialScale * (dist / startDist); if (newScale < 1) newScale = 1; if (newScale > 20) newScale = 20; const ratio = 1 - (newScale / scale), centerX = (window.innerWidth / 2) + pointX, centerY = (window.innerHeight / 2) + pointY; pointX += ((e.touches[0].clientX + e.touches[1].clientX) / 2 - centerX) * ratio; pointY += ((e.touches[0].clientY + e.touches[1].clientY) / 2 - centerY) * ratio; scale = newScale; if (scale === 1) { pointX = 0; pointY = 0; } setTransform(); if (scale > 1.1) trackIntentionalInteraction(); } else if (e.touches.length === 1 && panning && scale > 1) { e.preventDefault(); pointX += e.touches[0].clientX - startX; pointY += e.touches[0].clientY - startY; startX = e.touches[0].clientX; startY = e.touches[0].clientY; setTransform(); trackIntentionalInteraction(); } }, {passive: false});
    let lastTap = 0; modal.addEventListener('touchend', (e) => { panning = false; if (e.touches.length === 0) { if (isPinching) { isPinching = false; lastTap = 0; return; } let moveDist = e.changedTouches ? Math.hypot(e.changedTouches[0].clientX - tapStartX, e.changedTouches[0].clientY - tapStartY) : 0; if (moveDist < 10) { let currentTime = new Date().getTime(), tapLength = currentTime - lastTap; if (tapLength < 300 && tapLength > 0) { if (scale > 1) resetZoom(); else { scale = 3; setTransform(); } trackIntentionalInteraction(); } lastTap = currentTime; } } });
    document.addEventListener('keydown', (e) => { if (e.key === "Escape" && modal.style.display === 'block') { modal.style.display = 'none'; document.body.style.overflow = ''; resetZoom(); } });
    document.getElementById("modalClose").onclick = () => { modal.style.display = 'none'; document.body.style.overflow = ''; resetZoom(); };
    window.onpopstate = (e) => { if (modal.style.display === 'block') { modal.style.display = 'none'; document.body.style.overflow = ''; resetZoom(); } else if (e.state && e.state.id) initPiece(e.state.id); };
    window.addEventListener("scroll", () => { document.getElementById("museumHeader").classList.toggle("header-small", window.scrollY > 40); }, { passive: true });

    load();
</script>
</body>
</html>
