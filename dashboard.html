<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Tajawal;
background:#0b0b0b;
color:white;
padding:30px;
}

h1{
color:#0F5C5E;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:40px;
}

.card{
background:#111;
padding:20px;
border-radius:12px;
}

.stat{
font-size:32px;
margin-bottom:20px;
}

</style>

</head>

<body>

<h1>Visitor Analytics</h1>

<div class="stat">
Visits Today: <span id="today">0</span>
</div>

<div class="grid">

<div class="card">
<h3>🔥 Most Viewed Artworks</h3>
<canvas id="artChart"></canvas>
</div>

<div class="card">
<h3>🌍 Languages</h3>
<canvas id="langChart"></canvas>
</div>

<div class="card">
<h3>📱 Devices</h3>
<canvas id="deviceChart"></canvas>
</div>

</div>

<script>

const API="PUT_YOUR_API_LINK_HERE?stats=1";

fetch(API)
.then(r=>r.json())
.then(data=>{

document.getElementById("today").innerText=data.today;


// artworks chart

new Chart(
document.getElementById("artChart"),
{
type:'bar',
data:{
labels:Object.keys(data.artworks),
datasets:[{
label:'Views',
data:Object.values(data.artworks),
backgroundColor:'#0F5C5E'
}]
}
}
);


// languages chart

new Chart(
document.getElementById("langChart"),
{
type:'pie',
data:{
labels:Object.keys(data.languages),
datasets:[{
data:Object.values(data.languages),
backgroundColor:[
'#0F5C5E',
'#138a8d',
'#1db9bd',
'#46dede'
]
}]
}
}
);


// devices chart

new Chart(
document.getElementById("deviceChart"),
{
type:'doughnut',
data:{
labels:Object.keys(data.devices),
datasets:[{
data:Object.values(data.devices),
backgroundColor:[
'#0F5C5E',
'#138a8d',
'#1db9bd'
]
}]
}
}
);

});

</script>

</body>
</html>
