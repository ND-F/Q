<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Dashboard - NADIM x MIA</title>
    <link rel="icon" type="image/svg+xml" href="images/nadim-icon.svg">
    <link rel="apple-touch-icon" href="images/nadim-icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --main: #06444C;
            --dark-red: #4A121C;
            --gold: #E1A93E;
            --light: #EAE8D8;
            --accent: #ADCAC9;
        }

        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background: var(--main);
            color: var(--light);
            transition: 0.4s;
            -webkit-font-smoothing: antialiased;
        }

        /* كلاس الثيم الفاتح */
        body.light { background: var(--light); color: var(--main); }

        /* هيدر موحد */
        #museumHeader { 
            background: var(--light); padding: 15px 20px; 
            display: flex; align-items: center; justify-content: center; gap: 20px; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 1000;
        }
        .logo { height: 45px; }
        .header-title { 
            font-size: 16px; font-weight: 700; text-align: center; 
            color: var(--main) !important; line-height: 1.3; 
        }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        /* كارت إحصائية اليوم */
        .today-stat {
            background: var(--dark-red);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 40px;
            border: 2px solid var(--gold);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .today-stat h2 { margin: 0; font-size: 20px; opacity: 0.9; }
        .today-stat .count { font-size: 60px; font-weight: 800; color: var(--gold); margin: 10px 0; }

        /* شبكة الرسوم البيانية */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(225, 169, 62, 0.1);
            transition: 0.3s;
        }
        body.light .card { background: white; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .card h3 { color: var(--gold); margin-top: 0; border-bottom: 1px solid rgba(173, 202, 201, 0.2); padding-bottom: 10px; margin-bottom: 20px; }

        #loader { text-align: center; padding: 100px; color: var(--gold); font-size: 20px; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .today-stat .count { font-size: 45px; }
        }
    </style>
</head>

<body>

<header id="museumHeader">
    <img src="images/logo-nadim.png" class="logo">
    <div class="header-title">
        Management Dashboard & Metrics<br>لوحة الإدارة ومؤشرات الأداء
    </div>
    <img src="images/MIALOGO.png" class="logo">
</header>

<div class="container">
    <div id="loader">جاري تحليل بيانات المتحف...</div>

    <div id="dashboardContent" style="display: none;">
        <div class="today-stat">
            <h2>إجمالي زيارات اليوم / Today's Scans</h2>
            <div class="count" id="today">0</div>
        </div>

        <div class="grid">
            <div class="card">
                <h3>🔥 القطع الأكثر تفاعلاً (Top Artworks)</h3>
                <canvas id="artChart"></canvas>
            </div>

            <div class="card">
                <h3>🌍 توزيع اللغات (Languages)</h3>
                <canvas id="langChart"></canvas>
            </div>

            <div class="card">
                <h3>📱 أنواع الأجهزة (Devices)</h3>
                <canvas id="deviceChart"></canvas>
            </div>
        </div>
    </div>
</div>

<footer> 
    <p style="text-align:center; opacity:0.5; margin: 50px 0;">Nadim Foundation © Administrative Panel</p> 
</footer>

<script>
    // مزامنة الثيم
    if (localStorage.getItem("theme") === "light") { document.body.classList.add("light"); }

    const API = "https://script.google.com/macros/s/AKfycbxW__sGqYA7pI4KQFKrwSaV4eQ-p6YrTcAwoc8ORZLyl9NOdF1r2Y983_gGhpbkkdLv/exec?stats=1";

    fetch(API)
    .then(r => r.json())
    .then(data => {
        document.getElementById("loader").style.display = "none";
        document.getElementById("dashboardContent").style.display = "block";
        document.getElementById("today").innerText = data.today || 0;

        const isLight = document.body.classList.contains("light");
        const textColor = isLight ? "#06444C" : "#EAE8D8";

        // 1. Artworks Chart (Bar)
        new Chart(document.getElementById("artChart"), {
            type: 'bar',
            data: {
                labels: Object.keys(data.artworks).map(id => id.replace("MIA-", "")),
                datasets: [{
                    label: 'Views',
                    data: Object.values(data.artworks),
                    backgroundColor: '#E1A93E', // ذهبي
                    borderRadius: 5
                }]
            },
            options: {
                plugins: { legend: { labels: { color: textColor, font: { family: 'Tajawal' } } } },
                scales: { 
                    y: { ticks: { color: textColor } },
                    x: { ticks: { color: textColor } }
                }
            }
        });

        // 2. Languages Chart (Pie)
        new Chart(document.getElementById("langChart"), {
            type: 'pie',
            data: {
                labels: Object.keys(data.languages),
                datasets: [{
                    data: Object.values(data.languages),
                    backgroundColor: ['#06444C', '#ADCAC9', '#E1A93E', '#4A121C'],
                    borderWidth: 0
                }]
            },
            options: {
                plugins: { legend: { position: 'bottom', labels: { color: textColor, font: { family: 'Tajawal' } } } }
            }
        });

        // 3. Devices Chart (Doughnut)
        new Chart(document.getElementById("deviceChart"), {
            type: 'doughnut',
            data: {
                labels: Object.keys(data.devices),
                datasets: [{
                    data: Object.values(data.devices),
                    backgroundColor: ['#06444C', '#ADCAC9', '#4A121C'],
                    borderWidth: 0
                }]
            },
            options: {
                cutout: '70%',
                plugins: { legend: { position: 'bottom', labels: { color: textColor, font: { family: 'Tajawal' } } } }
            }
        });
    })
    .catch(err => {
        document.getElementById("loader").textContent = "Error fetching dashboard data.";
    });
</script>

</body>
</html>
