<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nadim Collection - مجموعة نديم</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <script>
        /* 1. نظام التحويل السريع (أول شيء ينفذ) */
        const query = window.location.search.substring(1); // بياخد اللي بعد علامة الاستفهام
        if (query && !isNaN(query) && query.length >= 1) {
            // لو اللي مكتوب رقم (مثلاً 0001)، يحول فوراً لصفحة الـ scan
            window.location.replace("scan.html?id=MIA-" + query);
        }
    </script>

    <style>
        :root {
            --main: #06444C;   /* الكحلي */
            --light: #EAE8D8;  /* الكريمي */
            --gold: #E1A93E;   /* الذهبي */
        }

        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background: var(--main);
            color: var(--light);
            text-align: center;
        }

        .logoHeader {
            background: var(--light);
            padding: 20px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.2);
        }

        .mainLogo {
            width: 150px;
            max-width: 80%;
            height: auto;
            display: block;
            margin: 10px auto;
        }

        .search {
            margin: 30px auto;
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .search input {
            padding: 12px 20px;
            width: 80%;
            max-width: 400px;
            border-radius: 30px;
            border: 2px solid var(--gold);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-family: 'Tajawal';
            font-size: 16px;
            backdrop-filter: blur(10px);
            outline: none;
        }

        .search input::placeholder { color: rgba(233, 246, 247, 0.5); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(225, 169, 62, 0.1);
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .title {
            padding: 15px;
            font-weight: bold;
            color: var(--light);
            font-size: 16px;
        }

        .id-badge {
            background: var(--gold);
            color: var(--main);
            display: inline-block;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* Loading Spinner */
        #loader { margin: 50px; color: var(--gold); }
    </style>
</head>

<body>

<div class="logoHeader">
    <img src="images/logo-nadim.png" class="mainLogo">
</div>

<div class="search">
    <input id="search" placeholder="ابحث عن قطعة... Search...">
</div>

<div id="loader">جاري تحميل المجموعة...</div>
<div class="grid" id="grid"></div>

<script>
    let artworks = [];

    /* استخدام ملف JSON المحلي لسرعة خارقة */
    fetch("data/artworks.json?v=" + new Date().getTime())
        .then(r => r.json())
        .then(data => {
            artworks = data;
            document.getElementById("loader").style.display = "none";
            render(data);
        })
        .catch(err => {
            document.getElementById("loader").textContent = "حدث خطأ في تحميل البيانات.";
            console.error(err);
        });

    function render(list) {
        const grid = document.getElementById("grid");
        grid.innerHTML = "";

        list.forEach(a => {
            // نأكد إن فيه صورة، لو مفيش نحط صورة افتراضية
            const imgPath = a.image1 ? a.image1 : 'images/no-image.jpg';
            
            const card = document.createElement("div");
            card.className = "card";
            card.onclick = () => {
                location.href = "scan.html?id=" + a.id;
            };

            card.innerHTML = `
                <img src="${imgPath}" onerror="this.src='images/no-image.jpg'">
                <div class="title">
                    ${a.title_ar || a.title_en || "تحفة متحفية"}
                </div>
                <div class="id-badge">${a.id}</div>
            `;
            grid.appendChild(card);
        });
    }

    /* نظام البحث الذكي */
    document.getElementById("search").oninput = (e) => {
        let q = e.target.value.toLowerCase();
        const filtered = artworks.filter(a => 
            (a.title_ar || "").toLowerCase().includes(q) || 
            (a.title_en || "").toLowerCase().includes(q) ||
            (a.id || "").toLowerCase().includes(q)
        );
        render(filtered);
    };
</script>

</body>
</html>
