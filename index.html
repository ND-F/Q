<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Nadim Foundation - مؤسسة نديم</title>

    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/ND-F/Q/main/images/nadim-icon.svg">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/ND-F/Q/main/images/nadim-icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root { --main: #06444C; --light: #EAE8D8; --gold: #E1A93E; }

        body {
            margin: 0; font-family: 'Tajawal', sans-serif; 
            background: var(--main); color: var(--light); 
            transition: background 0.4s ease;
            -webkit-font-smoothing: antialiased;
        }

        .light { background: var(--light) !important; color: var(--main) !important; }

        /* HEADER المطور */
        #museumHeader { 
            position: sticky; top: 0; 
            background: var(--light) !important; 
            padding: 15px 20px; z-index: 1000; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.2); 
            border-radius: 0 0 30px 30px;
        }
        .logo-row { display: flex; align-items: center; justify-content: center; gap: 20px; }
        .logo { height: 40px; cursor: pointer; transition: 0.3s; }
        .header-title { font-size: 15px; font-weight: 700; color: var(--main) !important; }

        .container { max-width: 1400px; margin: auto; padding: 20px; display: flex; flex-direction: column; }

        /* VIEWER - تم تعديله لصور PNG الشفافة */
        .viewer { 
            width: 100%; height: 50vh; position: relative; 
            display: flex; align-items: center; justify-content: center; 
            margin-bottom: 15px; overflow: hidden; 
            background: transparent; /* خلفية شفافة عشان الـ PNG */
            cursor: zoom-in;
        }
        .viewer img { 
            max-width: 95%; max-height: 95%; 
            object-fit: contain; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2)); /* ظل ناعم للقطعة الشفافة */
        }

        /* THUMBS المحدثة */
        .thumbs { display: flex; gap: 12px; overflow-x: auto; padding: 10px 5px; scrollbar-width: none; }
        .thumbs img { 
            width: 75px; height: 75px; object-fit: contain; 
            background: rgba(255,255,255,0.05);
            border-radius: 15px; cursor: pointer; opacity: 0.5; 
            border: 2px solid transparent;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .thumbs img.active { 
            border-color: var(--gold); 
            opacity: 1; 
            transform: scale(1.1); 
            background: rgba(225, 169, 62, 0.1);
        }

        .info h1 { font-size: 24px; color: var(--gold); margin: 0 0 10px 0; }
        .details { margin-top: 25px; border-top: 1px solid rgba(225, 169, 62, 0.2); padding-top: 20px; line-height: 1.8; }

        /* FLOATING BAR (نفس تصميم QR) */
        .floatingBar {
            position: fixed;
            bottom: calc(25px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 25px;
            border-radius: 50px;
            display: flex; gap: 20px;
            background: rgba(10, 30, 35, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            z-index: 9999;
        }
        .ctrl { 
            position: relative; font-size: 22px; cursor: pointer; 
            color: white; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .ctrl:hover { transform: scale(1.2) translateY(-5px); color: var(--gold); }
        .ctrl:active { transform: scale(0.9); }

        /* Tooltip */
        .ctrl::before {
            content: attr(data-tooltip);
            position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%);
            background: var(--light); color: var(--main);
            padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 700;
            white-space: nowrap; opacity: 0; visibility: hidden; transition: 0.2s;
        }
        .ctrl:hover::before { opacity: 1; visibility: visible; }

        /* MODAL */
        #fullscreenModal { 
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: var(--main); z-index: 10001; 
        }
        #modalImage { max-width: 95%; max-height: 95%; object-fit: contain; }

        @media(min-width:1100px) {
            .container { 
                display: grid; grid-template-columns: 100px 1fr 400px; 
                grid-template-areas: "thumb viewer info" "thumb details details";
                gap: 40px; margin-top: 50px;
            }
            .viewer { grid-area: viewer; height: 70vh; }
            .thumbs { grid-area: thumb; flex-direction: column; }
        }

        footer { text-align: center; margin: 40px 0 120px 0; font-size: 13px; opacity: 0.4; }
    </style>
</head>

<body class="lang-ar">

<header id="museumHeader">
    <div class="logo-row">
        <a href="https://nd-f.github.io/QR/"><img src="https://raw.githubusercontent.com/ND-F/Q/main/images/logo-nadim.png" class="logo"></a>
        <div class="header-title" id="headerTitle"></div>
        <img src="https://raw.githubusercontent.com/ND-F/Q/main/images/MIALOGO.png" class="logo" style="height: 35px;">
    </div>
</header>

<div class="container">
    <div class="viewer" id="mainViewer"><img id="mainImage"></div>
    <div class="thumbs" id="thumbs"></div>
    <div class="info">
        <div id="inv" style="opacity: 0.6; font-size: 14px;"></div>
        <h1 id="title"></h1>
        <div id="material" style="color: var(--gold); font-weight: 600;"></div>
        <div id="date"></div>
    </div>
    <div class="details">
        <div id="desc"></div>
    </div>
</div>

<div class="floatingBar">
    <div class="ctrl" onclick="navigatePiece(-1)" data-ar="القطعة السابقة" data-en="Previous">◀</div>
    <div class="ctrl" onclick="toggleLang()" data-ar="اللغة" data-en="Language">🌐</div>
    <div class="ctrl" onclick="toggleTheme()" data-ar="المظهر" data-en="Theme">☀️</div>
    <div class="ctrl" onclick="share()" data-ar="مشاركة" data-en="Share">🔗</div>
    <div class="ctrl" onclick="navigatePiece(1)" data-ar="القطعة التالية" data-en="Next">▶</div>
</div>

<footer> Nadim Foundation © ® </footer>

<script>
    // السيستم الذكي للغة والثيم من مشروع QR
    const systemLang = navigator.language.startsWith('ar') ? 'ar' : 'en';
    let lang = systemLang;
    let allArtworks = [], validImages = [], currentIdx = 0, artwork;

    async function load() {
        try {
            const res = await fetch("data/artworks.json?t=" + new Date().getTime());
            allArtworks = await res.json();
            const id = new URLSearchParams(location.search).get("id");
            initPiece(id || allArtworks[0].id);
        } catch(e) { console.error("Data Load Failed"); }
    }

    function initPiece(id) {
        artwork = allArtworks.find(a => a.id === id);
        if(!artwork) return;
        render();
        prepareImages();
    }

    function prepareImages() {
        // هنا المنطق بيقرأ أسماء الصور من الـ JSON سواء كانت PNG أو غيره
        const potential = [artwork.image1, artwork.image2, artwork.image3, artwork.image4, artwork.image5];
        const thumbs = document.getElementById("thumbs");
        thumbs.innerHTML = ""; validImages = [];

        potential.forEach((src) => {
            if (!src) return;
            const img = document.createElement("img");
            img.src = src;
            img.onload = () => {
                validImages.push(src);
                if (validImages.length === 1) show(0);
            };
            img.onclick = () => show(validImages.indexOf(src));
            thumbs.appendChild(img);
        });
    }

    function show(i) {
        currentIdx = i;
        const src = validImages[i];
        document.getElementById("mainImage").src = src;
        document.querySelectorAll(".thumbs img").forEach(t => t.classList.toggle("active", t.src === src));
    }

    function render() {
        document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
        document.body.className = lang === "ar" ? "lang-ar" : "lang-en";
        
        document.getElementById("headerTitle").textContent = lang === "ar" ? "مجموعة سعد نديم" : "Saad Nadim Collection";
        document.getElementById("title").textContent = lang === "ar" ? artwork.title_ar : artwork.title_en;
        document.getElementById("desc").textContent = lang === "ar" ? artwork.desc_ar : artwork.desc_en;
        document.getElementById("inv").textContent = artwork.inventory_number;
        
        // تحديث البالونات
        document.querySelectorAll('[data-ar]').forEach(el => {
            el.setAttribute('data-tooltip', el.getAttribute(`data-${lang}`));
        });
    }

    function toggleLang() { lang = lang === "ar" ? "en" : "ar"; render(); }
    function toggleTheme() { document.body.classList.toggle("light"); }
    function share() { navigator.share({url: location.href}); }
    
    function navigatePiece(step) {
        const idx = allArtworks.findIndex(a => a.id === artwork.id) + step;
        if(idx >= 0 && idx < allArtworks.length) {
            const nextId = allArtworks[idx].id;
            window.history.pushState({id: nextId}, '', '?id=' + nextId);
            initPiece(nextId);
        }
    }

    load();
</script>
</body>
</html>
