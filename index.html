<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<title>Nadim Collection</title>

<style>

body{
margin:0;
font-family:Tajawal;
background:#0f2024;
color:#e9f6f7;
text-align:center;
}

.header{
background:#e9f6f7;
padding:25px;
}

.logo{
width:260px;
}

.search{
margin:25px auto;
}

.search input{
padding:10px;
width:250px;
border:1px solid #0f6c75;
background:#0f2024;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:30px;
padding:40px;
}

.card{
background:#111;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.title{
padding:10px;
font-weight:bold;
color:#e9f6f7;
}

.id{
color:#0f6c75;
padding-bottom:15px;
}

</style>

</head>

<body>

<div class="logoHeader">
<img src="images/logo-nadim.png">

</div>

<div class="search">

<input id="search" placeholder="Search...">

</div>

<div class="grid" id="grid"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbz0zgMLLmtC4NPZNJylRPgD7Q8aNjhfsZh6YdCJ55p8E-Bt7heKvDvkKkwutoiuwTSG/exec";

let artworks=[];

fetch(API)
.then(r=>r.json())
.then(data=>{
artworks=data;
render(data);
});

function render(list){

const grid=document.getElementById("grid");

grid.innerHTML="";

list.forEach(a=>{

const card=document.createElement("div");

card.className="card";

card.onclick=()=>{

location.href="scan.html?id="+a.id;

};

card.innerHTML=`

<img src="${a.image || 'images/no-image.jpg'}">

<div class="title">

${a.title_ar || a.title_en || "قطعة متحف"}

</div>

<div class="id">

${a.id}

</div>

`;

grid.appendChild(card);

});

}

document.getElementById("search").oninput=(e)=>{

let q=e.target.value.toLowerCase();

render(

artworks.filter(a=>

(a.title_ar||"").toLowerCase().includes(q) ||

(a.title_en||"").toLowerCase().includes(q)

)

);

};

</script>

</body>
</html>
