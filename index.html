<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NADIM in Museum of Islamic Arts - نديم في متحف الفن الإسلامي</title>
    <link rel="icon" type="image/svg+xml" href="images/nadim-icon.svg">
    <link rel="apple-touch-icon" href="images/nadim-icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <script>
        /* 1. نظام التحويل السريع */
        const query = window.location.search.substring(1);
        if (query && !isNaN(query) && query.length >= 1) {
            window.location.replace("scan.html?id=MIA-" + query);
        }

        /* 2. مزامنة الثيم قبل تحميل الصفحة لمنع الوميض */
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "light") {
            document.documentElement.classList.add("light-theme-applied");
        }
    </script>

    <style>
        :root {
            --main: #06444C;
            --light: #EAE8D8;
            --gold: #E1A93E;
        }

        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background: var(--main);
            color: var(--light);
            transition: background 0.4s ease;
            -webkit-font-smoothing: antialiased;
        }

        /* كلاس الثيم الفاتح */
        body.light { background: var(--light); color: var(--main); }
        .light-theme-applied body { background: var(--light); color: var(--main); }

        /* HEADER (موحد مع صفحة scan) */
        #museumHeader { 
            background: var(--light); 
            padding: 15px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.2); 
            position: sticky; top: 0; z-index: 1000;
        }
        .logo-row { display: flex; align-items: center; justify-content: center; gap: 20px; width: 100%; max-width: 1200px; }
        .logo { height: 45px; }
        .header-title { 
            font-size: 16px; font-weight: 700; text-align: center; 
            color: var(--main) !important; line-height: 1.3; 
        }

        /* SEARCH SECTION */
        .search-container {
            margin: 40px auto;
            text-align: center;
            padding: 0 20px;
        }
        .search-container input {
            padding: 14px 25px;
            width: 100%;
            max-width: 500px;
            border-radius: 40px;
            border: 2px solid var(--gold);
            background: rgba(255, 255, 255, 0.1);
            color: inherit;
            font-family: 'Tajawal';
            font-size: 18px;
            backdrop-filter: blur(10px);
            outline: none;
            transition: 0.3s;
        }
        body.light .search-container input { background: rgba(0,0,0,0.05); color: var(--main); }
        .search-container input:focus { box-shadow: 0 0 15px rgba(225, 169, 62, 0.4); }

        /* GRID & CARDS */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 20px;
            max-width: 1300px;
            margin: auto;
        }

        .card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(225, 169, 62, 0.1);
            position: relative;
        }
        body.light .card { background: white; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        .card:hover {
            transform: translateY(-12px);
            border-color: var(--gold);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: 0.5s;
        }
        .card:hover img { transform: scale(1.05); }

        .card-body { padding: 20px; text-align: right; direction: rtl; }
        .lang-en .card-body { text-align: left; direction: ltr; }

        .card-title {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 10px;
            color: var(--gold);
            min-height: 50px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        .id-badge {
            background: var(--gold);
            color: var(--main);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 800;
            display: inline-block;
        }

        #loader { margin: 100px auto; color: var(--gold); font-size: 20px; }

        footer { text-align: center; margin: 60px 0; font-size: 14px; opacity: 0.5; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; padding: 15px; }
            .logo { height: 35px; }
        }
    </style>
</head>

<body>

<header id="museumHeader">
    <div class="logo-row">
        <img src="images/logo-nadim.png" class="logo">
        <div class="header-title" id="headerTitle">
            NADIM in Museum of Islamic Arts<br>نديم في متحف الفن الإسلامي
        </div>
        <img src="images/MIALOGO.png" class="logo">
    </div>
</header>

<div class="search-container">
    <input id="search" placeholder="ابحث عن قطعة... Search...">
</div>

<div id="loader">جاري تحميل المعرض...</div>
<div class="grid" id="grid"></div>

<footer> Nadim Foundation © ® </footer>

<script>
    let artworks = [];
    
    /* مزامنة الثيم عند التحميل */
    if (localStorage.getItem("theme") === "light") {
        document.body.classList.add("light");
    }

    /* تحميل البيانات */
    fetch("data/artworks.json?v=" + new Date().getTime())
        .then(r => r.json())
        .then(data => {
            artworks = data;
            document.getElementById("loader").style.display = "none";
            render(data);
        })
        .catch(err => {
            document.getElementById("loader").textContent = "Error loading exhibition data.";
        });

    function render(list) {
        const grid = document.getElementById("grid");
        grid.innerHTML = "";

        list.forEach(a => {
            const imgPath = a.image1 ? a.image1 : 'images/no-image.jpg';
            
            const card = document.createElement("div");
            card.className = "card";
            card.onclick = () => {
                location.href = "scan.html?id=" + a.id;
            };

            card.innerHTML = `
                <img src="${imgPath}" onerror="this.src='images/no-image.jpg'">
                <div class="card-body">
                    <div class="card-title">${a.title_ar}</div>
                    <div class="id-badge">${a.id}</div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    /* نظام البحث الذكي (يبحث في الاسم العربي، الإنجليزي، والكود) */
    document.getElementById("search").oninput = (e) => {
        let q = e.target.value.toLowerCase();
        const filtered = artworks.filter(a => 
            (a.title_ar || "").toLowerCase().includes(q) || 
            (a.title_en || "").toLowerCase().includes(q) ||
            (a.id || "").toLowerCase().includes(q)
        );
        render(filtered);
    };
</script>

</body>
</html>
