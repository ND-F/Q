<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QR Print System</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:'Tajawal';
background:#eee;
margin:0;
padding:20px;
}

button{
padding:12px 25px;
background:#0F5C5E;
color:white;
border:none;
cursor:pointer;
margin-bottom:20px;
font-size:16px;
}

.page{
width:794px;
height:1123px;
background:white;
margin:20px auto;
padding:30px;
box-sizing:border-box;
display:grid;
grid-template-columns:repeat(2,1fr);
grid-template-rows:repeat(3,1fr);
gap:25px;
position:relative;
}

.sticker{
border:3px solid #0F5C5E;
display:flex;
flex-direction:column;
justify-content:space-between;
padding:15px;
position:relative;
}

.title{
text-align:center;
font-weight:700;
color:#0F5C5E;
font-size:18px;
}

.qr{
flex:1;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.logo{
position:absolute;
width:45px;
height:45px;
background:white;
padding:4px;
}

.scan{
text-align:center;
color:#0F5C5E;
font-weight:500;
}

.id{
text-align:center;
font-size:12px;
color:#0F5C5E;
}

.crop{
position:absolute;
width:20px;
height:20px;
border-color:black;
}

.crop.tl{top:-3px;left:-3px;border-top:2px solid;border-left:2px solid;}
.crop.tr{top:-3px;right:-3px;border-top:2px solid;border-right:2px solid;}
.crop.bl{bottom:-3px;left:-3px;border-bottom:2px solid;border-left:2px solid;}
.crop.br{bottom:-3px;right:-3px;border-bottom:2px solid;border-right:2px solid;}

</style>
</head>

<body>

<button onclick="downloadPDF()">Download Print PDF</button>

<div id="printArea"></div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbzIH8SdUGDWYqlvHfExOBU0fbhQX729NKKAvqtPGygrjvCGX2ge2jQRFqLQIVW1OqUj/exec";

fetch(API)
.then(r=>r.json())
.then(data=>{

data.sort((a,b)=>a.order-b.order);

let page;

data.forEach((a,i)=>{

if(i%6===0){
page=document.createElement("div");
page.className="page";
document.getElementById("printArea").appendChild(page);
}

const sticker=document.createElement("div");
sticker.className="sticker";

sticker.innerHTML=`
<div class="crop tl"></div>
<div class="crop tr"></div>
<div class="crop bl"></div>
<div class="crop br"></div>

<div class="title">${a.title_en}</div>

<div class="qr" id="qr${a.order}"></div>

<div class="scan">⬇ Scan Me</div>
<div class="id">${a.id}</div>
`;

page.appendChild(sticker);

const url=
"https://nd-f.github.io/Q/scan.html?id="+a.order;

new QRCode(document.getElementById("qr"+a.order),{
text:url,
width:170,
height:170,
colorDark:"#0F5C5E",
colorLight:"#ffffff",
correctLevel:QRCode.CorrectLevel.H
});

const logo=document.createElement("img");
logo.src="images/qr-logo.png";
logo.className="logo";

document.getElementById("qr"+a.order).appendChild(logo);

});

});

function downloadPDF(){

html2pdf().from(document.getElementById("printArea")).set({
margin:0,
filename:"Museum_QR_Print.pdf",
image:{type:'jpeg',quality:1},
html2canvas:{scale:2},
jsPDF:{unit:'px',format:'a4',orientation:'portrait'}
}).save();

}

</script>

</body>
</html>
