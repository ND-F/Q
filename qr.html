<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/qr-code-styling/lib/qr-code-styling.js"></script>

<style>

body{
font-family:Tajawal;
background:white;
margin:0;
}

/* صفحة الطباعة */

.page{
width:210mm;
height:297mm;

display:grid;
grid-template-columns:repeat(2,1fr);
grid-template-rows:repeat(3,1fr);

gap:12mm;

padding:18mm;

box-sizing:border-box;
page-break-after:always;
}

/* الاستيكر */

.sticker{
border:2.5px solid #05444B;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

/* مكان QR */

.qrWrap{
width:85mm;
height:85mm;
display:flex;
align-items:center;
justify-content:center;
}

/* crop marks */

.crop{
position:absolute;
width:6mm;
height:6mm;
border-color:black;
}

.tl{top:-4mm;left:-4mm;border-top:1px solid;border-left:1px solid;}
.tr{top:-4mm;right:-4mm;border-top:1px solid;border-right:1px solid;}
.bl{bottom:-4mm;left:-4mm;border-bottom:1px solid;border-left:1px solid;}
.br{bottom:-4mm;right:-4mm;border-bottom:1px solid;border-right:1px solid;}

</style>
</head>

<body>

<div id="container"></div>

<script>

const base =
"https://nd-f.github.io/Q/scan.html?id=";

let total = 30;
let perPage = 6;

/* إنشاء الصفحات أولاً */

for(let p=0;p<Math.ceil(total/perPage);p++){

let page=document.createElement("div");
page.className="page";

for(let i=1;i<=perPage;i++){

let num=p*perPage+i;

if(num>total) break;

let sticker=document.createElement("div");
sticker.className="sticker";

sticker.innerHTML=`

<div class="crop tl"></div>
<div class="crop tr"></div>
<div class="crop bl"></div>
<div class="crop br"></div>

<div class="qrWrap">
<div id="qr${num}"></div>
</div>

`;

page.appendChild(sticker);

}

document.getElementById("container").appendChild(page);

}

/* توليد QR بعد بناء الصفحة */

for(let num=1;num<=total;num++){

const qrCode = new QRCodeStyling({

width:360,
height:360,

data: base+"EGY-MIA-"+String(num).padStart(4,'0'),

image:"images/qr-logo.png",

dotsOptions:{
color:"#05444B",
type:"classy-rounded"
},

backgroundOptions:{
color:"#ffffff"
},

imageOptions:{
crossOrigin:"anonymous",
margin:8
},

cornersSquareOptions:{
type:"extra-rounded",
color:"#05444B"
},

cornersDotOptions:{
type:"dot",
color:"#05444B"
}

});

qrCode.append(document.getElementById("qr"+num));

}

</script>

</body>
</html>
