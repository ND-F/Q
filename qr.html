<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<style>

body{
font-family:Tajawal;
background:white;
margin:0;
}

/* صفحة الطباعة */

.page{
width:210mm;
height:297mm;
display:grid;
grid-template-columns:repeat(2,1fr);
grid-template-rows:repeat(3,1fr);
gap:5mm;
padding:10mm;
box-sizing:border-box;
page-break-after:always;
}

/* الاستيكر */

.sticker{
border:2px solid #05444B;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

/* QR */

.qrWrap{
position:relative;
width:75mm;
height:75mm;
display:flex;
align-items:center;
justify-content:center;
}

.qr{
width:75mm;
height:75mm;
}

/* لوجو داخل QR */

.qrLogo{
position:absolute;
width:18mm;
height:18mm;
background:white;
padding:2mm;
border-radius:5mm;
}

/* علامات القص */

.crop{
position:absolute;
width:6mm;
height:6mm;
border-color:black;
}

.tl{top:-2mm;left:-2mm;border-top:1px solid;border-left:1px solid;}
.tr{top:-2mm;right:-2mm;border-top:1px solid;border-right:1px solid;}
.bl{bottom:-2mm;left:-2mm;border-bottom:1px solid;border-left:1px solid;}
.br{bottom:-2mm;right:-2mm;border-bottom:1px solid;border-right:1px solid;}

</style>
</head>

<body>

<div id="container"></div>

<script>

/* رابط صفحة القطعة */

const base =
"https://nd-f.github.io/Q/scan.html?id=";

/* عدد القطع */

let total = 30;

/* عدد الاستيكرات في الصفحة */

let perPage = 6;

/* توليد الصفحات */

for(let p=0;p<Math.ceil(total/perPage);p++){

let page = document.createElement("div");
page.className="page";

/* توليد الاستيكرات */

for(let i=1;i<=perPage;i++){

let num = p*perPage+i;

if(num>total) break;

let sticker = document.createElement("div");
sticker.className="sticker";

sticker.innerHTML = `

<div class="crop tl"></div>
<div class="crop tr"></div>
<div class="crop bl"></div>
<div class="crop br"></div>

<div class="qrWrap">
<div id="qr${num}" class="qr"></div>
<img src="images/qr-logo.png" class="qrLogo">
</div>

`;

page.appendChild(sticker);

/* توليد QR */

setTimeout(()=>{

new QRCode(
document.getElementById("qr"+num),
{
text: base+"EGY-MIA-"+String(num).padStart(4,'0'),

width:280,
height:280,

colorDark:"#05444B",
colorLight:"#ffffff",

correctLevel:QRCode.CorrectLevel.H
});

},100);

}

document.getElementById("container").appendChild(page);

}

</script>

</body>
</html>
