<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QR Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<style>

body{
font-family:'Tajawal';
background:#eee;
margin:0;
padding:40px;
}

h1{
text-align:center;
}

#wrap{
display:flex;
flex-wrap:wrap;
gap:30px;
justify-content:center;
}

.sticker{
width:378px; /* 10cm print */
height:378px;
background:white;
border:4px solid #0F5C5E;
position:relative;
padding:20px;
box-sizing:border-box;
}

.title{
font-weight:700;
color:#0F5C5E;
text-align:center;
font-size:20px;
height:50px;
overflow:hidden;
}

.qr{
display:flex;
justify-content:center;
margin-top:10px;
position:relative;
}

.logo{
position:absolute;
width:60px;
height:60px;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:6px;
}

.scan{
position:absolute;
bottom:40px;
left:0;
width:100%;
text-align:center;
font-weight:500;
color:#0F5C5E;
}

.id{
position:absolute;
bottom:10px;
left:0;
width:100%;
text-align:center;
font-size:14px;
color:#0F5C5E;
}

</style>
</head>

<body>

<h1>QR Generator</h1>

<div id="wrap"></div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbzIH8SdUGDWYqlvHfExOBU0fbhQX729NKKAvqtPGygrjvCGX2ge2jQRFqLQIVW1OqUj/exec";

fetch(API)
.then(r=>r.json())
.then(data=>{

data.sort((a,b)=>a.order-b.order);

data.forEach(a=>{

const box=document.createElement("div");
box.className="sticker";

box.innerHTML=`
<div class="title">${a.title_en}</div>

<div class="qr" id="qr${a.order}"></div>

<div class="scan">⬇ Scan Me</div>
<div class="id">${a.id}</div>
`;

document.getElementById("wrap").appendChild(box);

const url =
"https://nd-f.github.io/Q/scan.html?id="+a.order;

new QRCode(document.getElementById("qr"+a.order),{
text:url,
width:220,
height:220,
colorDark:"#0F5C5E",
colorLight:"#ffffff",
correctLevel:QRCode.CorrectLevel.H
});

const logo=document.createElement("img");
logo.src="images/qr-logo.png";
logo.className="logo";

document.getElementById("qr"+a.order).appendChild(logo);

});

});

</script>

</body>
</html>
