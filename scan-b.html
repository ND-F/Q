<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    
    <title>NADIM in Museum of Islamic Arts - نديم في متحف الفن الإسلامي</title>
    
    <meta name="theme-color" content="#EAE8D8" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#06444C" media="(prefers-color-scheme: dark)">
    
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/ND-F/Q/main/images/icon-nadim-light.svg?v=2" media="(prefers-color-scheme: dark)">
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/ND-F/Q/main/images/icon-nadim.svg?v=2" media="(prefers-color-scheme: light)">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/ND-F/Q/main/images/icon-nadim-light.svg?v=2">
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RWD0WHS7EV"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RWD0WHS7EV');
    </script>

    <style>
        :root { --main: #06444C; --light: #EAE8D8; --gold: #E1A93E; --accent: #ADCAC9; }
        
        body { 
            margin: 0; font-family: 'Tajawal', serif; 
            background: var(--light); color: var(--main); 
            transition: background 0.4s ease, color 0.4s ease; overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        body.dark { background: var(--main); color: var(--light); }

        #museumHeader { 
            position: sticky; top: 0; background: var(--light) !important; 
            padding: 0px 20px; display: flex; flex-direction: column; 
            align-items: center; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.1); 
            border-radius: 0 0 20px 20px; transition: padding 0.3s ease;
        }
        #museumHeader.header-small { padding: 5px 20px !important; }
        #museumHeader.header-small .logo { height: 40px !important; transition: height 0.3s ease; }
        #museumHeader.header-small .header-title { font-size: 14px !important; transition: font-size 0.3s ease; }
        
        .logo-row { display: flex; align-items: center; justify-content: center; gap: 15px; width: 100%; direction: rtl !important; }
        .logo { height: 70px; width: auto; cursor: pointer; transition: height 0.3s ease; }
        .header-title { font-size: 21px; font-weight: 700; text-align: center; color: var(--main) !important; transition: font-size 0.3s ease; line-height: 1.4; }

        @media (max-width: 800px) {
            #museumHeader { padding: 5px 10px; }
            .logo { height: 45px; } 
            .header-title { font-size: 14px; line-height: 1.3; } 
            .logo-row { gap: 8px; }
            
            #museumHeader.header-small { padding: 3px 10px !important; border-radius: 0 0 10px 10px; }
            #museumHeader.header-small .logo { height: 25px !important; } 
            #museumHeader.header-small .header-title { font-size: 10.5px !important; line-height: 1.1; } 
        }

        .cover-banner {
            width: 100%; height: 35vh; min-height: 250px; 
            overflow: hidden; position: relative; display: none;
            background: var(--main);
        }
        .cover-banner img {
            width: 100%; height: 100%; object-fit: cover; opacity: 0.9;
        }

        .container { 
            max-width: 760px; 
            margin: 40px auto 100px; padding: 0 20px; 
            opacity: 0; transition: opacity 0.5s ease; position: relative;
        }
        .container.ready { opacity: 1; }

        /* التعديل الجذري لبوكس المعلومات والمحاذاة */
        .article-header { 
            margin-bottom: 40px;
            background: var(--light); 
            padding: 30px 20px; border-radius: 8px;
            position: relative; z-index: 10;
            transition: all 0.3s ease;
        }
        body.dark .article-header { background: var(--main); }
        
        body.lang-en .article-header { text-align: left; }
        body.lang-ar .article-header { text-align: right; }

        .article-header h1 { 
            font-size: 34px; color: var(--gold) !important; margin: 0 0 20px 0; 
            font-weight: 800; line-height: 1.3;
        }

        /* المحاذاة مع الديسكريبشن بدل السنترة */
        .meta-group { display: flex; flex-wrap: wrap; justify-content: flex-start; gap: 8px 15px; font-size: 16px; color: var(--main); opacity: 0.85; }
        body.dark .meta-group { color: var(--light); }
        
        .meta-material { font-weight: 700; color: var(--gold); margin: 15px 0; font-size: 18px; }
        
        .meta-inv { margin-top: 25px; font-size: 14px; opacity: 0.5; font-family: sans-serif; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 15px; }
        body.dark .meta-inv { border-top-color: rgba(255,255,255,0.1); }

        /* ========================================== */
        /* تنسيقات الصور الفردية والمزدوجة (تمت إضافتها) */
        /* ========================================== */
        .image-pair-container { margin: 40px 0; width: 100%; text-align: center; display: block; }
        .image-pair-wrapper { display: flex; gap: 20px; justify-content: center; align-items: flex-start; flex-wrap: wrap; width: 100%; }
        
        .image-pair-wrapper img { 
            width: auto; max-width: 100%; height: auto; max-height: 60vh; object-fit: contain; 
            border-radius: 4px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); 
            cursor: zoom-in; transition: transform 0.3s;
        }
        body.dark .image-pair-wrapper img { box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .image-pair-wrapper img:hover { transform: scale(1.02); }
        
        @media (min-width: 600px) {
            .image-pair-wrapper.has-double img { max-width: calc(50% - 10px); }
        }

        figcaption { 
            margin-top: 12px; font-size: 14px; color: #555; 
            font-style: italic; opacity: 0.9; line-height: 1.5;
        }
        body.dark figcaption { color: #aaa; }
        body.lang-ar figcaption { text-align: right; border-right: 3px solid var(--gold); padding-right: 12px; }
        body.lang-en figcaption { text-align: left; border-left: 3px solid var(--gold); padding-left: 12px; }

        #hall { font-weight: 700; color: var(--main); margin-bottom: 15px; font-size: 18px; }
        body.dark #hall { color: var(--accent); }
        body.lang-en #hall { text-align: left; direction: ltr; }
        body.lang-ar #hall { text-align: right; direction: rtl; }
        
        .article-body p { 
            font-size: 20px; line-height: 2.1; margin-bottom: 30px; 
            color: #222; text-align: justify;
        }
        body.dark .article-body p { color: #e0e0e0; }
        body.lang-en .article-body { direction: ltr; }
        body.lang-ar .article-body { direction: rtl; }

        .video-container {
            width: 100%; padding-bottom: 56.25%; height: 0;
            margin-bottom: 40px; border-radius: 8px; overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15); display: none; position: relative;
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .inline-video { margin-bottom: 0 !important; border-radius: 4px !important; }

        .main-figure { width: 100%; margin: 0 0 30px 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .viewer { width: 100%; max-height: 60vh; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; background: transparent; }
        .viewer img { max-width: 100%; max-height: 60vh; object-fit: contain; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 4px; transition: opacity 0.4s ease; }
        body.dark .viewer img { box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .photo-credit { display: block !important; margin-top: 15px; font-size: 13px; color: #666; text-align: center; font-style: italic; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 15px; width: 80%; }
        body.dark .photo-credit { color: #aaa; border-bottom: 1px solid rgba(255,255,255,0.1); }

        .controls { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            background: rgba(10, 30, 35, 0.96) !important; backdrop-filter: blur(15px);
            padding: 12px 30px; border-radius: 50px; display: flex; align-items: center; gap: 25px; 
            z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.4); border: 1px solid var(--gold) !important; 
            direction: ltr !important; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
        }
        .controls div { font-size: 24px; cursor: pointer; color: white !important; transition: 0.2s; position: relative; } 
        .controls .nav-btn { color: var(--gold) !important; font-size: 28px; }
        .controls .nav-btn.disabled { opacity: 0.15; pointer-events: none; }
        .controls .sep { width: 1px; height: 20px; background: rgba(225, 169, 62, 0.3) !important; }

        .controls > div:not(.sep)::before {
            content: attr(data-tooltip); position: absolute; bottom: 125%; left: 50%;
            transform: translateX(-50%) translateY(10px); background: rgba(6, 68, 76, 0.98); color: var(--light); 
            padding: 8px 15px; border-radius: 12px; font-size: 14px; white-space: nowrap; font-weight: 700;
            opacity: 0; visibility: hidden; transition: 0.3s; pointer-events: none; font-family: 'Tajawal', sans-serif;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .controls > div:not(.sep):hover::before { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
        
        @media (max-width: 800px) {
            .controls.controls-mini { transform: translateX(-50%) scale(0.75); opacity: 0.55; bottom: 15px; }
        }

        #fullscreenModal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(255,255,255,0.98); z-index: 10001; }
        body.dark #fullscreenModal { background: rgba(6, 68, 76, 0.98); }
        #modalContent { display: flex; height: 100%; align-items: center; justify-content: center; overflow: hidden; }
        #modalImage { max-width: 95%; max-height: 95%; object-fit: contain; cursor: grab; transform-origin: center center; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.2)); }
        #modalClose { position: absolute; top: 25px; right: 25px; font-size: 40px; color: var(--main); cursor: pointer; z-index: 10002; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        body.dark #modalClose { color: white; }

        footer { display: block; width: 100%; clear: both; text-align: center; margin: 40px 0 120px 0; font-size: 13px; opacity: 0.4; }

    </style>
</head>

<script>
    (function() {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const savedTheme = localStorage.getItem("nadim_theme");
        if (savedTheme === "dark") document.body.classList.add("dark");
        else if (savedTheme === "light") document.body.classList.remove("dark");
        
        const systemLang = navigator.language.startsWith("ar") ? "ar" : "en";
        const savedLang = localStorage.getItem("nadim_lang") || systemLang;
        if (savedLang === "en") { document.body.classList.replace("lang-ar", "lang-en"); document.documentElement.dir = "ltr"; }
    })();
</script>

<script>
    const systemLang = navigator.language.startsWith("ar") ? "ar" : "en";
    let lang = localStorage.getItem("nadim_lang") || systemLang;
    
    let allArtworks = [], artwork;
    let zoomStartTime = 0, isZoomTracked = false;

    const modal = document.getElementById("fullscreenModal"), modalImage = document.getElementById("modalImage");

    let controlsTimer;
    const controlsEl = document.querySelector('.controls');

    function resetControlsTimer() {
        if(window.innerWidth > 800) return;
        controlsEl.classList.remove('controls-mini');
        clearTimeout(controlsTimer);
        controlsTimer = setTimeout(() => { controlsEl.classList.add('controls-mini'); }, 2500); 
    }

    window.addEventListener('scroll', resetControlsTimer, { passive: true });
    window.addEventListener('touchstart', resetControlsTimer, { passive: true });
    controlsEl.addEventListener('touchstart', () => {
         controlsEl.classList.remove('controls-mini');
         clearTimeout(controlsTimer);
    }, { passive: true });
    resetControlsTimer(); 

    async function load() {
        try {
            updateThemeIcon();
            const res = await fetch("data/artworks.json?t=" + new Date().getTime());
            allArtworks = await res.json();
            
            let id = new URLSearchParams(location.search).get("id");
            if (!id) {
                let pathName = window.location.pathname.replace(/\/$/, "");
                let fileName = pathName.split('/').pop().replace('.html', '');
                if (fileName && fileName !== "scan-b" && fileName !== "Q") id = fileName;
            }
            if (!allArtworks || allArtworks.length === 0) return;

            const finalId = id || allArtworks[0].id;
            initPiece(finalId);
            
            if (window.location.search.includes("id=")) {
                let urlPath = String(finalId).toUpperCase().startsWith('V') ? 'VQ' + String(finalId).substring(1) : 'Q' + finalId;
                window.history.replaceState({id: finalId}, '', urlPath);
            }
        } catch(e) { console.error(e); }
    }

    function initPiece(id) {
        if (!allArtworks || allArtworks.length === 0) return;

        let targetId = String(id).trim().toUpperCase(); 
        artwork = allArtworks.find(a => a.id && String(a.id).trim().toUpperCase() === targetId);
        if(!artwork) artwork = allArtworks[0];
        if(!artwork) return;

        if (typeof gtag === 'function') {
            let actualId = String(artwork.id).toUpperCase();
            if (!actualId.startsWith('VN')) {
                if (actualId.startsWith('V')) gtag('event', 'view_craft_video', { 'video_id': actualId, 'video_title': artwork.title_ar || artwork.title_en });
                else gtag('event', 'view_artifact', { 'artifact_id': actualId, 'artifact_title': artwork.title_ar || artwork.title_en });
            }
        }
        
        renderArticle();
        updateNavButtons();

        setTimeout(() => { document.getElementById('mainContainer').classList.add('ready'); }, 50);
    }

    function renderArticle() {
        const ar = lang === "ar";
        document.documentElement.dir = ar ? "rtl" : "ltr";
        document.body.className = (ar ? "lang-ar" : "lang-en") + (document.body.classList.contains("dark") ? " dark" : "");
        
        let coverBanner = document.getElementById("coverBanner");
        let coverImg = document.getElementById("coverImage");
        let articleHeader = document.getElementById("articleHeader");
        
        coverBanner.style.display = "none";
        articleHeader.style.marginTop = "0";
        articleHeader.style.boxShadow = "none";

        coverImg.src = "images/" + artwork.id + "_cover.webp";
        coverImg.onload = () => { 
            coverBanner.style.display = "block"; 
            articleHeader.style.marginTop = "-50px"; 
            articleHeader.style.boxShadow = "0 10px 30px rgba(0,0,0,0.05)";
        };
        coverImg.onerror = () => {
            coverImg.src = "images/" + artwork.id + "_cover.jpg";
            coverImg.onload = () => { 
                coverBanner.style.display = "block"; 
                articleHeader.style.marginTop = "-50px";
                articleHeader.style.boxShadow = "0 10px 30px rgba(0,0,0,0.05)";
            };
            coverImg.onerror = () => {
                 coverImg.src = "images/" + artwork.id + "_cover.png";
                 coverImg.onload = () => { 
                     coverBanner.style.display = "block"; 
                     articleHeader.style.marginTop = "-50px";
                     articleHeader.style.boxShadow = "0 10px 30px rgba(0,0,0,0.05)";
                 };
                 coverImg.onerror = () => { 
                     coverBanner.style.display = "none"; 
                     articleHeader.style.marginTop = "0";
                     articleHeader.style.boxShadow = "none";
                 }
            }
        };

        document.getElementById("title").innerHTML = (ar ? artwork.title_ar : artwork.title_en) || "بدون عنوان";
        document.getElementById("from").innerHTML = (ar ? artwork.from_ar : artwork.from_en) ? ((ar ? artwork.from_ar : artwork.from_en) + " | ") : "";
        document.getElementById("date").innerHTML = (ar ? artwork.date_ar : artwork.date_en) || "";
        document.getElementById("dim").innerHTML = (ar ? artwork.dimensions_ar : artwork.dimensions_en) ? (" | " + (ar ? artwork.dimensions_ar : artwork.dimensions_en)) : "";
        document.getElementById("material").innerHTML = (ar ? artwork.material_ar : artwork.material_en) || "";
        document.getElementById("hall").innerHTML = (ar ? artwork.hall_ar : artwork.hall_en) || "";
        document.getElementById("inv").innerHTML = artwork.inventory_number || "";

        let rawVid = String(artwork.video_url || "").trim();
        let vidSlot = -1; 
        let finalVidUrl = "";

        if (rawVid !== "") {
            let firstChar = rawVid.charAt(0).toLowerCase();
            if (['a', 'b', 'c', 'd', 'e'].includes(firstChar) && rawVid.length > 1 && (rawVid.charAt(1) === 'h' || rawVid.charAt(1) === '<')) {
                vidSlot = firstChar.charCodeAt(0) - 97; 
                rawVid = rawVid.substring(1).trim(); 
            }
            finalVidUrl = rawVid;
            if (rawVid.includes("<iframe") && rawVid.includes("src=")) {
                let match = rawVid.match(/src="([^"]+)"/);
                if (match) finalVidUrl = match[1];
            }
        }

        let vidContainer = document.getElementById("videoContainer");
        if (finalVidUrl && vidSlot === -1) {
            vidContainer.style.display = "block";
            vidContainer.innerHTML = `<iframe width="100%" height="100%" src="${finalVidUrl}" frameborder="0" allowfullscreen></iframe>`;
        } else {
            vidContainer.style.display = "none";
        }

        let potentialImages = [artwork.image1, artwork.image2, artwork.image3, artwork.image4, artwork.image5];
        let images = potentialImages.map(src => src && String(src).trim() !== "" ? String(src).replace(/\.[^/.]+$/, ".webp") : null);

        let heroSection = document.getElementById("heroSection");
        heroSection.innerHTML = "";
        
        if (images[0] || (vidSlot === 0 && finalVidUrl)) {
            let heroFig = document.createElement("figure");
            heroFig.className = "main-figure";
            
            if (vidSlot === 0 && finalVidUrl) {
                let vWrap = document.createElement("div");
                vWrap.className = "video-container inline-video";
                vWrap.style.display = "block";
                vWrap.style.width = "100%";
                vWrap.innerHTML = `<iframe width="100%" height="100%" src="${finalVidUrl}" frameborder="0" allowfullscreen></iframe>`;
                heroFig.appendChild(vWrap);
            } 
            else if (images[0]) {
                let viewer = document.createElement("div");
                viewer.className = "viewer";
                let img = document.createElement("img");
                img.src = images[0];
                img.onerror = function() { this.closest('.viewer').style.display = 'none'; };
                img.onclick = () => openModal(img.src);
                viewer.appendChild(img);
                setTimeout(() => { img.style.opacity = 1; }, 50);
                heroFig.appendChild(viewer);
            }

            let capText = (artwork[`info_${lang}1`] || "").trim();
            if (capText) {
                let cap = document.createElement("figcaption");
                cap.className = "photo-credit";
                cap.innerHTML = capText;
                heroFig.appendChild(cap);
            }
            heroSection.appendChild(heroFig);
        }

        let articleBody = document.getElementById("articleBody");
        articleBody.innerHTML = "";
        
        let mainDesc = (ar ? artwork.desc_ar : artwork.desc_en) || "";
        if (mainDesc.trim() !== "") {
            let pMain = document.createElement("p");
            pMain.innerHTML = mainDesc.replace(/\n/g, '<br>');
            articleBody.appendChild(pMain);
        }

        for (let i = 0; i < 5; i++) {
            let pText = (ar ? artwork[`dsc_ar${i+1}`] : artwork[`dsc_en${i+1}`]) || "";
            
            if (i === 0) {
                if (pText.trim() !== "") {
                    let p = document.createElement("p");
                    p.innerHTML = pText.replace(/\n/g, '<br>');
                    articleBody.appendChild(p);
                }
            } else {
                if (images[i] || (vidSlot === i && finalVidUrl) || pText.trim() !== "") {
                    if (vidSlot === i && finalVidUrl) {
                        articleBody.appendChild(createInlineVideo(finalVidUrl, i));
                    } 
                    else if (images[i]) {
                        // استدعاء دالة الصورة الفردية/المزدوجة
                        articleBody.appendChild(createInlineFigure(images[i], i));
                    }
                    
                    if (pText.trim() !== "") {
                        let p = document.createElement("p");
                        p.innerHTML = pText.replace(/\n/g, '<br>');
                        articleBody.appendChild(p);
                    }
                }
            }
        }

        let isVideo = String(artwork.id).toUpperCase().startsWith('V');
        const prevBtn = document.getElementById("prevPiece"), nextBtn = document.getElementById("nextPiece");
        if (isVideo) {
            prevBtn.setAttribute("data-ar", "الحرفة السابقة"); prevBtn.setAttribute("data-en", "Previous Craft");
            nextBtn.setAttribute("data-ar", "الحرفة التالية"); nextBtn.setAttribute("data-en", "Next Craft");
        } else {
            prevBtn.setAttribute("data-ar", "القطعة السابقة"); prevBtn.setAttribute("data-en", "Previous Piece");
            nextBtn.setAttribute("data-ar", "القطعة التالية"); nextBtn.setAttribute("data-en", "Next Piece");
        }
        document.querySelectorAll('[data-ar]').forEach(el => { el.setAttribute('data-tooltip', el.getAttribute(`data-${lang}`) || ''); });
    }

    // الدالة الذكية لزرع الصورة وتفقد وجود وجه آخر
    function createInlineFigure(src, idx) {
        let fig = document.createElement("figure");
        fig.className = "image-pair-container";
        
        let wrapper = document.createElement("div");
        wrapper.className = "image-pair-wrapper";
        fig.appendChild(wrapper);

        let img1 = document.createElement("img");
        img1.src = src;
        img1.onerror = function() { this.style.display = 'none'; }; 
        img1.onclick = () => openModal(src);
        wrapper.appendChild(img1);
        
        let doubleChar = String.fromCharCode(97 + idx); 
        let doubleSrc = src.replace(/\.webp$/, "") + doubleChar + ".webp"; 
        
        let img2 = document.createElement("img");
        img2.src = doubleSrc;
        img2.style.display = "none"; 
        img2.onload = function() { 
            this.style.display = "block"; 
            wrapper.classList.add("has-double"); 
        };
        img2.onerror = function() { this.remove(); };
        img2.onclick = () => openModal(doubleSrc);
        wrapper.appendChild(img2);
        
        let infoStr = (artwork[`info_${lang}${idx + 1}`] || "").trim();
        if (infoStr) {
            let cap = document.createElement("figcaption");
            cap.innerHTML = infoStr;
            fig.appendChild(cap);
        }
        return fig;
    }

    function createInlineVideo(url, idx) {
        let fig = document.createElement("figure");
        let vWrap = document.createElement("div");
        vWrap.className = "video-container inline-video";
        vWrap.style.display = "block";
        vWrap.style.marginBottom = "15px";
        vWrap.innerHTML = `<iframe width="100%" height="100%" src="${url}" frameborder="0" allowfullscreen></iframe>`;
        fig.appendChild(vWrap);

        let infoStr = (artwork[`info_${lang}${idx + 1}`] || "").trim();
        if (infoStr) {
            let cap = document.createElement("figcaption");
            cap.innerHTML = infoStr;
            fig.appendChild(cap);
        }
        return fig;
    }

    function toggleLang() { 
        lang = lang === "ar" ? "en" : "ar"; localStorage.setItem("nadim_lang", lang); renderArticle(); 
        if (typeof gtag === 'function') gtag('event', 'toggle_language', { 'language_selected': lang });
    }
    
    function toggleTheme() { 
        const isDark = document.body.classList.toggle("dark"); localStorage.setItem("nadim_theme", isDark ? "dark" : "light"); updateThemeIcon(); 
        if (typeof gtag === 'function') gtag('event', 'toggle_theme', { 'theme_selected': isDark ? 'dark' : 'light' });
    }
    
    function updateThemeIcon() { 
        let isDark = document.body.classList.contains("dark");
        document.getElementById("themeBtn").textContent = isDark ? "☀️" : "🌙"; 
    }
    
    function share() { 
        if (navigator.share) navigator.share({title: document.getElementById("title").innerText, url: location.href}); 
        if (typeof gtag === 'function') gtag('event', 'share_click', { 'artifact_id': artwork ? artwork.id : 'unknown' });
    }

    function trackContactUs() {
        if (typeof gtag === 'function') gtag('event', 'contact_us_click', { 'from_page_id': artwork ? artwork.id : 'unknown' });
        setTimeout(() => { window.location.href = 'https://nd-f.github.io/QR/'; }, 150);
    }
    document.querySelector('[data-en="Contact Us"]').setAttribute("onclick", "trackContactUs()");

    function navigatePiece(step) {
        const idx = allArtworks.findIndex(a => String(a.id) === String(artwork.id)) + step;
        if(idx >= 0 && idx < allArtworks.length) {
            const nextId = allArtworks[idx].id;
            let urlPath = String(nextId).toUpperCase().startsWith('V') ? 'VQ' + String(nextId).substring(1) : 'Q' + nextId;
            window.history.pushState({id: nextId}, '', urlPath);
            initPiece(nextId);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function updateNavButtons() {
        const idx = allArtworks.findIndex(a => String(a.id) === String(artwork.id));
        document.getElementById("prevPiece").classList.toggle("disabled", idx === 0);
        document.getElementById("nextPiece").classList.toggle("disabled", idx === allArtworks.length - 1);
    }

    let scale = 1, panning = false, pointX = 0, pointY = 0, startX = 0, startY = 0, startDist = 0, initialScale = 1, isPinching = false, tapStartX = 0, tapStartY = 0;

    function setTransform() { modalImage.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`; }
    function resetZoom() { scale = 1; pointX = 0; pointY = 0; setTransform(); }

    function trackIntentionalInteraction() {
        if (!isZoomTracked && artwork && typeof gtag === 'function') {
            if (Date.now() - zoomStartTime > 1500) { gtag('event', 'intentional_zoom_or_pan', { 'artifact_id': artwork.id }); isZoomTracked = true; }
        }
    }

    function openModal(src) {
        resetZoom(); modal.style.display = 'block'; document.body.style.overflow = 'hidden'; 
        modalImage.src = src; history.pushState({modal: true}, "");
        zoomStartTime = Date.now(); isZoomTracked = false;
    }

    modal.addEventListener("wheel", (e) => {
        if (modal.style.display !== 'block') return; e.preventDefault();
        const clientX = e.clientX, clientY = e.clientY, delta = e.deltaY || -e.wheelDelta;
        let newScale = scale * (delta > 0 ? 0.85 : 1.15);
        if (newScale < 1) newScale = 1; if (newScale > 20) newScale = 20; 
        const ratio = 1 - (newScale / scale), centerX = (window.innerWidth / 2) + pointX, centerY = (window.innerHeight / 2) + pointY;
        pointX += (clientX - centerX) * ratio; pointY += (clientY - centerY) * ratio;
        scale = newScale; if (scale === 1) { pointX = 0; pointY = 0; }
        setTransform(); if (scale > 1.1) trackIntentionalInteraction();
    }, { passive: false });

    modalImage.addEventListener("mousedown", (e) => { if (scale > 1) { e.preventDefault(); startX = e.clientX; startY = e.clientY; panning = true; modalImage.style.cursor = "grabbing"; } });
    window.addEventListener("mouseup", () => { panning = false; modalImage.style.cursor = "grab"; });
    window.addEventListener("mousemove", (e) => {
        if (!panning || scale === 1) return; e.preventDefault();
        pointX += e.clientX - startX; pointY += e.clientY - startY; startX = e.clientX; startY = e.clientY; setTransform(); trackIntentionalInteraction();
    });

    modal.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            e.preventDefault(); isPinching = true; startDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); initialScale = scale;
        } else if (e.touches.length === 1) {
            if (scale > 1) panning = true;
            startX = e.touches[0].clientX; startY = e.touches[0].clientY; tapStartX = e.touches[0].clientX; tapStartY = e.touches[0].clientY;
        }
    }, {passive: false});

    modal.addEventListener('touchmove', (e) => {
        if (modal.style.display !== 'block') return;
        if (e.touches.length === 2) {
            e.preventDefault();
            let dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            let newScale = initialScale * (dist / startDist); if (newScale < 1) newScale = 1; if (newScale > 20) newScale = 20;
            const ratio = 1 - (newScale / scale), centerX = (window.innerWidth / 2) + pointX, centerY = (window.innerHeight / 2) + pointY;
            pointX += ((e.touches[0].clientX + e.touches[1].clientX) / 2 - centerX) * ratio; pointY += ((e.touches[0].clientY + e.touches[1].clientY) / 2 - centerY) * ratio;
            scale = newScale; if (scale === 1) { pointX = 0; pointY = 0; }
            setTransform(); if (scale > 1.1) trackIntentionalInteraction();
        } else if (e.touches.length === 1 && panning && scale > 1) {
            e.preventDefault(); pointX += e.touches[0].clientX - startX; pointY += e.touches[0].clientY - startY; startX = e.touches[0].clientX; startY = e.touches[0].clientY;
            setTransform(); trackIntentionalInteraction();
        }
    }, {passive: false});

    let lastTap = 0;
    modal.addEventListener('touchend', (e) => {
        panning = false;
        if (e.touches.length === 0) {
            if (isPinching) { isPinching = false; lastTap = 0; return; }
            let moveDist = e.changedTouches ? Math.hypot(e.changedTouches[0].clientX - tapStartX, e.changedTouches[0].clientY - tapStartY) : 0;
            if (moveDist < 10) { 
                let currentTime = new Date().getTime(), tapLength = currentTime - lastTap;
                if (tapLength < 300 && tapLength > 0) { if (scale > 1) resetZoom(); else { scale = 3; setTransform(); } trackIntentionalInteraction(); }
                lastTap = currentTime;
            }
        }
    });

    document.addEventListener('keydown', (e) => { if (e.key === "Escape" && modal.style.display === 'block') { modal.style.display = 'none'; document.body.style.overflow = ''; resetZoom(); } });
    document.getElementById("modalClose").onclick = () => { modal.style.display = 'none'; document.body.style.overflow = ''; resetZoom(); };
    window.onpopstate = (e) => { if (modal.style.display === 'block') { modal.style.display = 'none'; document.body.style.overflow = ''; resetZoom(); } else if (e.state && e.state.id) initPiece(e.state.id); };

    window.addEventListener("scroll", () => { document.getElementById("museumHeader").classList.toggle("header-small", window.scrollY > 40); }, { passive: true });

    load();
</script>
</body>
