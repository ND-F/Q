<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    
    <title>NADIM in Museum of Islamic Arts - نديم في متحف الفن الإسلامي</title>
    
    <meta name="theme-color" content="#EAE8D8" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#06444C" media="(prefers-color-scheme: dark)">
    
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/ND-F/Q/main/images/icon-nadim.svg?v=2">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/ND-F/Q/main/images/icon-nadim.svg?v=2">
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RWD0WHS7EV"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

    <style>
        :root { --main: #06444C; --light: #EAE8D8; --gold: #E1A93E; --accent: #ADCAC9; }
        
        /* 1. التأسيس الأكاديمي (الخلفية فاتحة والنص غامق) */
        body { 
            margin: 0; font-family: 'Tajawal', serif; 
            background: var(--light); color: var(--main); 
            transition: background 0.4s ease, color 0.4s ease; overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        body.dark { background: var(--main); color: var(--light); }

        /* 2. الهيدر (الشريط العلوي) */
        #museumHeader { 
            position: sticky; top: 0; background: var(--light); 
            padding: 15px 20px; display: flex; flex-direction: column; 
            align-items: center; z-index: 1000; 
            border-bottom: 1px solid rgba(6, 68, 76, 0.15);
            transition: all 0.3s ease;
        }
        body.dark #museumHeader { background: var(--main); border-bottom-color: rgba(234, 232, 216, 0.15); }
        
        /* تصغير الهيدر في الموبايل */
        @media (max-width: 800px) {
            #museumHeader { padding: 8px 15px; }
            .logo { height: 40px; }
            .header-title { font-size: 13px; line-height: 1.3; }
            
            #museumHeader.header-small { padding: 4px 10px !important; border-bottom: 1px solid rgba(6, 68, 76, 0.3); }
            #museumHeader.header-small .logo { height: 25px !important; }
            #museumHeader.header-small .header-title { font-size: 11px !important; }
        }

        .logo-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%; max-width: 1000px; direction: rtl !important; }
        .logo { height: 60px; width: auto; cursor: pointer; transition: height 0.3s ease; }
        .header-title { font-size: 18px; font-weight: 700; text-align: center; color: var(--main); transition: font-size 0.3s ease; }
        body.dark .header-title { color: var(--light); }

        /* 3. حاوية المقال (Article Container) */
        .container { 
            max-width: 760px; /* مقاس القراءة المريح للعين */
            margin: 40px auto 100px; padding: 0 20px; 
            opacity: 0; transition: opacity 0.5s ease; 
        }
        .container.ready { opacity: 1; }

        /* 4. تنسيق العنوان والبيانات */
        .article-header { margin-bottom: 40px; text-align: center; }
        body.lang-en .article-header { text-align: left; }
        body.lang-ar .article-header { text-align: right; }

        .article-header h1 { 
            font-size: 34px; color: var(--main); margin: 0 0 20px 0; 
            font-weight: 800; line-height: 1.3;
        }
        body.dark .article-header h1 { color: var(--gold); }

        .meta { font-size: 16px; margin-bottom: 8px; color: var(--main); opacity: 0.85; }
        body.dark .meta { color: var(--light); }
        .meta-material { font-weight: 700; color: #b38020; margin: 15px 0; font-size: 18px; }
        body.dark .meta-material { color: var(--gold); }
        .meta-inv { margin-top: 25px; font-size: 14px; opacity: 0.5; font-family: sans-serif; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 15px; }
        body.dark .meta-inv { border-top-color: rgba(255,255,255,0.1); }

        /* 5. تنسيق الصور وسط الكلام (Figures) */
        figure { margin: 40px 0; padding: 0; display: block; width: 100%; text-align: center; }
        figure img { 
            max-width: 100%; height: auto; object-fit: contain; 
            border-radius: 4px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); 
            cursor: zoom-in; transition: transform 0.3s;
        }
        body.dark figure img { box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        figure img:hover { transform: scale(1.02); }

        figcaption { 
            margin-top: 12px; font-size: 14px; color: #555; 
            font-style: italic; opacity: 0.9; line-height: 1.5;
        }
        body.dark figcaption { color: #aaa; }
        
        body.lang-ar figcaption { text-align: right; border-right: 3px solid var(--gold); padding-right: 12px; }
        body.lang-en figcaption { text-align: left; border-left: 3px solid var(--gold); padding-left: 12px; }

        /* 6. تنسيق الشرح (Paragraphs) */
        .article-body p { 
            font-size: 20px; line-height: 2.1; margin-bottom: 30px; 
            color: #222; text-align: justify;
        }
        body.dark .article-body p { color: #e0e0e0; }
        body.lang-en .article-body { direction: ltr; }
        body.lang-ar .article-body { direction: rtl; }

        /* 7. مربع الفيديو */
        .video-container {
            width: 100%; padding-bottom: 56.25%; height: 0;
            margin-bottom: 40px; border-radius: 8px; overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15); display: none; position: relative;
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* 8. شريط التحكم الثابت بالأسفل */
        .controls { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: white; padding: 10px 25px; border-radius: 50px; 
            display: flex; align-items: center; gap: 20px; z-index: 2000; 
            box-shadow: 0 5px 25px rgba(0,0,0,0.15); border: 1px solid rgba(0,0,0,0.05);
            direction: ltr !important;
        }
        body.dark .controls { background: var(--main); border-color: rgba(255,255,255,0.1); box-shadow: 0 5px 25px rgba(0,0,0,0.5); }
        .controls div { font-size: 20px; cursor: pointer; color: var(--main); transition: 0.2s; position: relative; } 
        body.dark .controls div { color: var(--light); }
        .controls .nav-btn { color: #b38020; font-size: 24px; }
        body.dark .controls .nav-btn { color: var(--gold); }
        .controls .nav-btn.disabled { opacity: 0.2; pointer-events: none; }
        .controls .sep { width: 1px; height: 20px; background: rgba(0,0,0,0.1); }
        body.dark .controls .sep { background: rgba(255,255,255,0.2); }

        /* التول تيبس */
        .controls > div:not(.sep)::before {
            content: attr(data-tooltip); position: absolute; bottom: 130%; left: 50%;
            transform: translateX(-50%) translateY(5px); background: var(--main); color: white; 
            padding: 6px 12px; border-radius: 6px; font-size: 12px; white-space: nowrap; 
            opacity: 0; visibility: hidden; transition: 0.3s; pointer-events: none; font-family: 'Tajawal', sans-serif;
        }
        body.dark .controls > div:not(.sep)::before { background: white; color: var(--main); }
        .controls > div:not(.sep):hover::before { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

        /* نافذة الزووم (Fullscreen) */
        #fullscreenModal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(255,255,255,0.98); z-index: 10001; }
        body.dark #fullscreenModal { background: rgba(6, 68, 76, 0.98); }
        #modalContent { display: flex; height: 100%; align-items: center; justify-content: center; overflow: hidden; }
        #modalImage { max-width: 95%; max-height: 95%; object-fit: contain; cursor: grab; transform-origin: center center; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.2)); }
        #modalClose { position: absolute; top: 25px; right: 25px; font-size: 40px; color: var(--main); cursor: pointer; z-index: 10002; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        body.dark #modalClose { color: white; }

        footer { display: block; width: 100%; text-align: center; margin: 40px 0 100px; font-size: 13px; opacity: 0.4; }

    </style>
</head>

<body class="lang-ar">

<script>
    (function() {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const savedTheme = localStorage.getItem("nadim_theme");
        if (savedTheme === "dark") document.body.classList.add("dark");
        else if (savedTheme === "light") document.body.classList.remove("dark");
        
        const systemLang = navigator.language.startsWith("ar") ? "ar" : "en";
        const savedLang = localStorage.getItem("nadim_lang") || systemLang;
        if (savedLang === "en") { document.body.classList.replace("lang-ar", "lang-en"); document.documentElement.dir = "ltr"; }
    })();
</script>
