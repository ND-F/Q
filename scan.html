<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>NADIM in Museum of Islamic Arts - نديم في متحف الفن الإسلامي</title>

    <link rel="icon" type="image/svg+xml" href="images/nadim-icon.svg">
    <link rel="apple-touch-icon" href="images/nadim-icon.svg">

    <!-- فونت non-blocking: الصفحة ترسم فوراً، الفونت يتحمل في الخلفية -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" onload="this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap"></noscript>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root { --main: #06444C; --light: #EAE8D8; --gold: #E1A93E; }

        /* ─── BASE ─── */
        body {
            margin: 0; font-family: 'Tajawal', sans-serif;
            background: var(--main); color: var(--light);
            transition: background 0.4s ease, color 0.4s ease;
            overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }
        .light { background: var(--light) !important; color: var(--main) !important; }

        /* ─── HEADER ─── */
        #museumHeader {
            position: -webkit-sticky; position: sticky; top: 0;
            background: var(--light) !important;
            padding: 15px 20px; display: flex; flex-direction: column;
            align-items: center; z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.12);
            border-radius: 0 0 40px 40px;
        }
        .logo-row { display: flex; align-items: center; justify-content: center; gap: 20px; width: 100%; }
        .logo { height: 45px; cursor: pointer; transition: opacity 0.3s; -webkit-user-drag: none; }
        .logo:hover { opacity: 0.8; }
        .header-title { font-size: 16px; font-weight: 700; text-align: center; color: var(--main) !important; line-height: 1.3; }

        /* ─── LAYOUT ─── */
        .container { max-width: 1400px; margin: auto; padding: 20px; display: flex; flex-direction: column; }

        /* ─── VIEWER ─── */
        .viewer {
            width: 100%; height: 50vh; position: relative;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 15px; overflow: hidden;
            background: transparent; border-radius: 12px;
            cursor: zoom-in; touch-action: pan-y;
        }
        /* Skeleton shimmer أثناء تحميل الصورة */
        .viewer::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg,
                rgba(255,255,255,0.03) 25%,
                rgba(255,255,255,0.08) 50%,
                rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: skeleton 1.5s infinite;
            border-radius: 12px; pointer-events: none;
            opacity: 1; transition: opacity 0.5s ease;
        }
        .viewer.loaded::before { opacity: 0; }
        @keyframes skeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .viewer img {
            max-width: 95%; max-height: 95%;
            object-fit: contain; pointer-events: none;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.3));
            transition: opacity 0.35s ease;
        }

        /* بالونة معلومات الصورة */
        .photo-credit {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            color: white !important; padding: 35px 15px 15px; font-size: 13px;
            z-index: 10; opacity: 0; transition: opacity 0.4s;
            pointer-events: none; text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }
        .viewer:hover .photo-credit,
        .viewer.info-active .photo-credit { opacity: 1 !important; }

        /* ─── THUMBNAILS ─── */
        .thumbs {
            display: flex; gap: 12px; overflow-x: auto;
            padding: 10px 5px; scrollbar-width: none; margin-bottom: 20px;
        }
        .thumbs::-webkit-scrollbar { display: none; }
        .thumbs img {
            width: 75px; height: 75px; object-fit: contain;
            border-radius: 15px; cursor: pointer; opacity: 0.4;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0; display: none;
            background: rgba(255,255,255,0.05);
            border: 2px solid transparent;
        }
        .thumbs img.active {
            border-color: var(--gold); opacity: 1;
            transform: scale(1.1);
            background: rgba(225, 169, 62, 0.1);
        }

        /* ─── INFO & DETAILS ─── */
        .info h1 { font-size: 26px; color: var(--gold); margin: 0 0 10px 0; line-height: 1.25; }
        .meta { font-size: 17px; margin: 5px 0; opacity: 0.9; }
        .details {
            margin-top: 25px; border-top: 1px solid rgba(225, 169, 62, 0.2);
            padding-top: 20px; line-height: 1.8;
        }

        /* ─── TOOLTIP على أزرار الـ controls ─── */
        [data-tooltip] { position: relative; }
        [data-tooltip]::before {
            content: attr(data-tooltip);
            position: absolute; bottom: 140%; left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: var(--light); color: var(--main);
            padding: 7px 14px; border-radius: 10px;
            font-size: 13px; font-weight: 700; white-space: nowrap;
            opacity: 0; visibility: hidden;
            transition: opacity 0.25s, transform 0.25s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 9999;
        }
        [data-tooltip]:hover::before {
            opacity: 1; visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
        .light [data-tooltip]::before { background: var(--main); color: var(--light); }

        /* ─── DESKTOP GRID ─── */
        @media(min-width: 1100px) {
            .container {
                display: grid;
                grid-template-columns: 120px 1fr 450px;
                grid-template-areas: "thumb viewer info" "thumb details details";
                gap: 50px; align-items: start; direction: ltr;
            }
            .viewer { grid-area: viewer; height: 70vh; }
            .thumbs { grid-area: thumb; flex-direction: column; position: sticky; top: 150px; margin-top: 120px; }
            .thumbs img { width: 90px; height: 90px; }
            .info { grid-area: info; margin-top: 120px; }
            .details { grid-area: details; margin-top: 20px; max-width: 95%; }
            body.lang-ar .info, body.lang-ar .details { direction: rtl; text-align: right; }
            body.lang-en .info, body.lang-en .details { direction: ltr; text-align: left; }
        }

        /* ─── FULLSCREEN MODAL ─── */
        #fullscreenModal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--main); z-index: 10001; overflow: auto;
        }
        #modalContent { display: flex; min-height: 100%; align-items: center; justify-content: center; width: 100%; }
        #modalImage {
            max-width: 95%; max-height: 95%;
            object-fit: contain; transition: transform 0.15s ease-out;
        }
        #fullscreenModal.desktop-view  #modalImage { cursor: zoom-in; }
        #fullscreenModal.desktop-zoomed #modalImage { cursor: grab; transform: scale(2.5); }
        #modalClose {
            position: absolute; top: 25px; right: 25px;
            font-size: 40px; color: var(--light); cursor: pointer; z-index: 10002;
            transition: opacity 0.2s;
        }
        #modalClose:hover { opacity: 0.7; }

        /* ─── CONTROLS BAR ─── */
        .controls {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 30, 35, 0.95);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 12px 30px; border-radius: 50px;
            display: flex; align-items: center; gap: 25px;
            z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(225, 169, 62, 0.2);
            direction: ltr !important;
        }
        .controls div {
            font-size: 24px; cursor: pointer; transition: opacity 0.2s, transform 0.2s;
            color: white; display: flex; align-items: center;
        }
        .controls div:hover { opacity: 0.75; transform: scale(1.1); }
        .controls .nav-btn { color: var(--gold); font-size: 28px; }
        .controls .nav-btn.disabled { opacity: 0.15 !important; cursor: default; pointer-events: none; transform: none !important; }
        .controls .sep { width: 1px; height: 22px; background: rgba(225, 169, 62, 0.3); cursor: default; }
        .controls .sep:hover { opacity: 1; transform: none; }

        footer { text-align: center; margin: 40px 0 120px 0; font-size: 13px; opacity: 0.4; }
    </style>
</head>

<body class="lang-ar">

<!-- Fullscreen Modal -->
<div id="fullscreenModal">
    <div id="modalClose">×</div>
    <div id="modalContent"><img id="modalImage" alt=""></div>
</div>

<!-- Header -->
<header id="museumHeader">
    <div class="logo-row">
        <a href="https://nd-f.github.io/QR/"><img src="images/logo-nadim.png" class="logo" alt="Nadim"></a>
        <div class="header-title" id="headerTitle"></div>
        <img src="images/MIALOGO.png" class="logo" alt="MIA" style="height: 35px;">
    </div>
</header>

<!-- Main Content -->
<div class="container">
    <div class="viewer" id="mainViewer">
        <img id="mainImage" alt="">
        <div class="photo-credit" id="photoCredit"></div>
    </div>

    <div class="thumbs" id="thumbs"></div>

    <div class="info">
        <div class="meta" id="inv"></div>
        <h1 id="title"></h1>
        <div class="meta" id="from"></div>
        <div class="meta" id="date"></div>
        <div class="meta" id="dim"></div>
    </div>

    <div class="details">
        <div class="meta" id="hall"></div>
        <div class="meta" id="material" style="font-weight: 600; color: var(--gold);"></div>
        <div id="desc"></div>
    </div>
</div>

<!-- Controls Bar -->
<div class="controls">
    <div onclick="navigatePiece(-1)" id="prevPiece" class="nav-btn"
         data-ar="القطعة السابقة" data-en="Previous Piece">◀</div>
    <div class="sep"></div>
    <div onclick="toggleLang()"  data-ar="تغيير اللغة"  data-en="Change Language">🌐</div>
    <div onclick="toggleTheme()" data-ar="تغيير المظهر" data-en="Change Theme" id="themeBtn">☀️</div>
    <div onclick="share()"       data-ar="مشاركة"        data-en="Share">🔗</div>
    <div class="sep"></div>
    <div onclick="navigatePiece(1)" id="nextPiece" class="nav-btn"
         data-ar="القطعة التالية" data-en="Next Piece">▶</div>
</div>

<footer>Nadim Foundation © ®</footer>

<script>
    // ════════════════════════════════════════════════
    // 1. الإعدادات الأولية
    // ════════════════════════════════════════════════
    const systemLang  = navigator.language.startsWith("ar") ? "ar" : "en";
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    const isMobile    = window.innerWidth < 1100;

    let lang        = systemLang;
    let allArtworks = [];
    let validImages = [];   // مصفوفة مُفلترة بالصور الصالحة فقط، بدون nulls، بالترتيب
    let currentIdx  = 0;    // index داخل validImages (مش داخل sources)
    let artwork;
    let infoTimer;

    const mainViewer  = document.getElementById("mainViewer");
    const mainImage   = document.getElementById("mainImage");
    const photoCredit = document.getElementById("photoCredit");
    const modal       = document.getElementById("fullscreenModal");
    const modalImage  = document.getElementById("modalImage");

    // ════════════════════════════════════════════════
    // 2. تحميل البيانات
    // ════════════════════════════════════════════════
    async function load() {
        try {
            // بدون ?t= عشان المتصفح يكاش الـ JSON بدل ما يحمّله كل زيارة
            const res = await fetch("data/artworks.json");
            allArtworks = await res.json();

            if (!prefersDark) document.body.classList.add("light");
            updateThemeIcon();

            const id = new URLSearchParams(location.search).get("id");
            initPiece(id || allArtworks[0].id);
        } catch (e) {
            console.error("فشل تحميل البيانات:", e);
        }
    }

    // ════════════════════════════════════════════════
    // 3. تهيئة قطعة جديدة
    // ════════════════════════════════════════════════
    function initPiece(id) {
        artwork = allArtworks.find(a => a.id === id);
        if (!artwork) return;

        currentIdx  = 0;
        validImages = [];   // ← مسح صور القطعة السابقة قبل أي شيء

        prepareImages();
        render();
        updateNavButtons();
    }

    // ════════════════════════════════════════════════
    // 4. تحضير الصور — قلب المنطق
    // ════════════════════════════════════════════════
    function prepareImages() {
        const thumbsEl = document.getElementById("thumbs");
        thumbsEl.innerHTML = "";
        mainViewer.classList.remove("loaded");

        // قائمة المصادر بترتيبها الأصلي مع تحويل الامتداد لـ .png
        const sources = [
            artwork.image1, artwork.image2, artwork.image3,
            artwork.image4, artwork.image5
        ].map(src => (src && src.trim()) ? src.replace(/\.[^/.]+$/, ".png") : null);

        // مصفوفة مؤقتة لحفظ المواضع الأصلية ريثما تتحقق كل صورة
        const pending   = new Array(5).fill(null);
        // thumbnail elements مرتبة بنفس الترتيب عشان نقدر نعرضهم بعدين
        const thumbEls  = new Array(5).fill(null);
        let   firstShown = false;

        sources.forEach((pngSrc, originalIndex) => {
            if (!pngSrc) return;

            // ── إنشاء عنصر الـ thumbnail في الـ DOM ──
            const thumbImg = document.createElement("img");
            // لا lazy هنا — الـ thumbnail مش في الـ viewport دايماً
            // وبالتالي lazy يمنع onload من الإطلاق ويكسر كل المنطق
            thumbImg.onclick = (e) => {
                e.stopPropagation();
                const idx = validImages.indexOf(pngSrc);
                if (idx !== -1) show(idx);
            };
            thumbsEl.appendChild(thumbImg);
            thumbEls[originalIndex] = thumbImg;

            // ── كائن Image() منفصل للتحقق من وجود الصورة ──
            // الفصل ده ضروري: التحقق يحصل بغض النظر عن موضع الـ thumbnail في الـ viewport
            const probe = new Image();

            probe.onload = () => {
                // الصورة موجودة — سجّلها وأظهر الـ thumbnail
                pending[originalIndex] = pngSrc;
                validImages = pending.filter(Boolean);

                thumbImg.src               = pngSrc;
                thumbImg.style.display     = "block";

                // أول صورة تتأكد = حمّل الـ viewer فوراً
                if (!firstShown) {
                    firstShown = true;
                    show(0);
                }
            };

            probe.onerror = () => {
                // الصورة مش موجودة — امسح الـ thumbnail من الـ DOM
                thumbImg.remove();
            };

            probe.src = pngSrc;
        });
    }

    // ════════════════════════════════════════════════
    // 5. عرض صورة بمؤشرها في validImages
    // ════════════════════════════════════════════════
    function show(i) {
        if (!validImages.length) return;

        // تقييد المؤشر داخل الحدود
        i = Math.max(0, Math.min(i, validImages.length - 1));
        currentIdx = i;

        const src = validImages[i];

        // تحديث الـ viewer فقط لو الصورة مختلفة
        // (getAttribute يرجع الـ src النسبي كما أُسند، عكس .src الذي يُصبح URL كامل)
        if (mainImage.getAttribute("src") !== src) {
            mainViewer.classList.remove("loaded");
            mainImage.onload  = () => mainViewer.classList.add("loaded");
            mainImage.onerror = () => mainViewer.classList.add("loaded");
            mainImage.setAttribute("src", src);
        } else {
            // الصورة نفسها — تأكد من إظهار الـ loaded state
            mainViewer.classList.add("loaded");
        }

        // تمييز الـ thumbnail النشط
        document.querySelectorAll(".thumbs img").forEach(t => {
            // مقارنة بالـ src النسبي للـ thumbnail أيضاً
            t.classList.toggle("active", t.getAttribute("src") === src);
        });

        // بالونة معلومات الصورة (info_ar1 / info_en1 ...)
        const imgNum  = i + 1;
        const infoKey = `info_${lang}${imgNum}`;
        const infoText = (artwork[infoKey] || "").trim();

        photoCredit.textContent   = infoText;
        photoCredit.style.opacity = infoText ? "1" : "0";

        if (infoText && isMobile) triggerInfoMobile();
    }

    // ════════════════════════════════════════════════
    // 6. رسم محتوى القطعة (نص + اتجاه)
    // ════════════════════════════════════════════════
    function render() {
        // toggle بدل className= عشان لا يُمسح كلاس "light"
        document.body.classList.toggle("lang-ar", lang === "ar");
        document.body.classList.toggle("lang-en", lang === "en");
        document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";

        const siteTitle = lang === "ar"
            ? "معرض من حياة التحفة"
            : "From the Life of an Artifact Exhibition";
        document.title = siteTitle;
        document.getElementById("headerTitle").textContent = siteTitle;

        const ar = lang === "ar";
        document.getElementById("inv").textContent      = artwork.inventory_number || "";
        document.getElementById("title").textContent    = ar ? artwork.title_ar       : artwork.title_en;
        document.getElementById("from").textContent     = ar ? artwork.from_ar        : artwork.from_en;
        document.getElementById("date").textContent     = ar ? artwork.date_ar        : artwork.date_en;
        document.getElementById("dim").textContent      = ar ? artwork.dimensions_ar  : artwork.dimensions_en;
        document.getElementById("hall").textContent     = ar ? artwork.hall_ar        : artwork.hall_en;
        document.getElementById("material").textContent = (ar ? artwork.material_ar   : artwork.material_en) || "";
        document.getElementById("desc").textContent     = ar ? artwork.desc_ar        : artwork.desc_en;

        // تحديث نصوص بالونات الأزرار
        document.querySelectorAll("[data-ar]").forEach(el => {
            el.setAttribute("data-tooltip", el.getAttribute(`data-${lang}`));
        });
    }

    // ════════════════════════════════════════════════
    // 7. التنقل بين القطع
    // ════════════════════════════════════════════════
    function navigatePiece(step) {
        const idx     = allArtworks.findIndex(a => a.id === artwork.id);
        const nextIdx = idx + step;
        if (nextIdx < 0 || nextIdx >= allArtworks.length) return;

        const nextId = allArtworks[nextIdx].id;
        window.history.pushState({ id: nextId }, "", "?id=" + nextId);
        initPiece(nextId);
        window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function updateNavButtons() {
        const idx = allArtworks.findIndex(a => a.id === artwork.id);
        document.getElementById("prevPiece").classList.toggle("disabled", idx === 0);
        document.getElementById("nextPiece").classList.toggle("disabled", idx === allArtworks.length - 1);
    }

    // ════════════════════════════════════════════════
    // 8. الثيم واللغة والمشاركة
    // ════════════════════════════════════════════════
    function toggleLang() {
        lang = lang === "ar" ? "en" : "ar";
        render();
        show(currentIdx);   // تحديث بالونة الصورة الحالية فوراً
    }

    function toggleTheme() {
        document.body.classList.toggle("light");
        updateThemeIcon();
    }

    function updateThemeIcon() {
        document.getElementById("themeBtn").textContent =
            document.body.classList.contains("light") ? "🌙" : "☀️";
    }

    function share() {
        if (navigator.share) {
            navigator.share({ title: artwork[lang === "ar" ? "title_ar" : "title_en"], url: location.href });
        } else {
            try {
                navigator.clipboard.writeText(location.href).then(() => {
                    alert(lang === "ar" ? "تم نسخ الرابط!" : "Link copied!");
                });
            } catch {
                alert(lang === "ar" ? "تم نسخ الرابط!" : "Link copied!");
            }
        }
    }

    // ════════════════════════════════════════════════
    // 9. التفاعل بالسحب (Swipe) على الموبايل
    // ════════════════════════════════════════════════
    function triggerInfoMobile() {
        clearTimeout(infoTimer);
        mainViewer.classList.add("info-active");
        infoTimer = setTimeout(() => mainViewer.classList.remove("info-active"), 3500);
    }

    let startX = 0;
    mainViewer.addEventListener("touchstart", e => {
        if (e.touches.length === 1) startX = e.touches[0].clientX;
        triggerInfoMobile();
    }, { passive: true });

    mainViewer.addEventListener("touchend", e => {
        if (validImages.length <= 1) return;
        const diff = startX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 70) {
            const next = diff > 0
                ? (currentIdx + 1) % validImages.length
                : (currentIdx - 1 + validImages.length) % validImages.length;
            show(next);
        }
    }, { passive: true });

    // ════════════════════════════════════════════════
    // 10. Fullscreen Modal
    // ════════════════════════════════════════════════
    mainViewer.onclick = () => {
        // نقل الـ src للـ modal عند الفتح فقط، لا في كل show()
        modalImage.setAttribute("src", mainImage.getAttribute("src"));
        modal.style.display = "block";
        document.body.style.overflow = "hidden";
        history.pushState({ modal: true }, "");
        if (!isMobile) { modal.classList.add("desktop-view"); initDesktopZoom(); }
    };

    document.getElementById("modalClose").onclick = () => history.back();

    window.onpopstate = (e) => {
        if (modal.style.display === "block") {
            modal.style.display = "none";
            document.body.style.overflow = "";
            resetModal();
        } else if (e.state && e.state.id) {
            initPiece(e.state.id);
        }
    };

    document.addEventListener("keydown", e => {
        if (e.key === "Escape" && modal.style.display === "block") history.back();
        if (e.key === "ArrowRight" && modal.style.display !== "block") navigatePiece(lang === "ar" ? 1 : -1);
        if (e.key === "ArrowLeft"  && modal.style.display !== "block") navigatePiece(lang === "ar" ? -1 : 1);
    });

    // ════════════════════════════════════════════════
    // 11. Zoom على الديسكتوب داخل الـ Modal
    // ════════════════════════════════════════════════
    let dz = false;

    function initDesktopZoom() {
        if (isMobile) return;
        dz = false;
        modalImage.onclick = e => {
            dz = !dz;
            modal.classList.toggle("desktop-zoomed", dz);
            if (dz) moveZoom(e); else resetModal();
        };
        modalImage.onmousemove = moveZoom;
    }

    function moveZoom(e) {
        if (!dz || isMobile) return;
        const rect = modalImage.getBoundingClientRect();
        const x = ((e.clientX - rect.left)  / rect.width)  * 100;
        const y = ((e.clientY - rect.top)   / rect.height) * 100;
        modalImage.style.transformOrigin = `${x}% ${y}%`;
    }

    function resetModal() {
        modalImage.style.transform       = "scale(1)";
        modalImage.style.transformOrigin = "center center";
        dz = false;
        modal.classList.remove("desktop-view", "desktop-zoomed");
    }

    // ════════════════════════════════════════════════
    // 12. تصغير الهيدر عند الـ Scroll
    // ════════════════════════════════════════════════
    window.addEventListener("scroll", () => {
        document.getElementById("museumHeader")
            .classList.toggle("header-small", window.scrollY > 40);
    }, { passive: true });

    // ════════════════════════════════════════════════
    // بدء التطبيق
    // ════════════════════════════════════════════════
    load();
</script>
</body>
</html>
