<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>NADIM in M.I.A.</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--main:#06444C;
--light:#EAE8D8;
--accent:#ADCAC9;
--gold:#E1A93E;
}

body{
margin:0;
font-family:Tajawal;
background:var(--main);
color:white;
}

.light{
background:var(--light);
color:#111;
}

header{
background:#ADCAC9;
padding:20px;
text-align:center;
}

.logo{
width:120px;
cursor:pointer;
}

.page-title{
text-align:center;
font-size:30px;
margin:20px 0;
}

.container{

display:grid;
grid-template-columns:100px 1fr 420px;
gap:40px;
max-width:1500px;
margin:auto;
padding:40px;

}

.viewer{

text-align:center;

}

.viewer img{

max-width:100%;
border-radius:12px;
touch-action:none;

}

.thumbs{

display:flex;
flex-direction:column;
gap:12px;

}

.thumbs img{

width:80px;
cursor:pointer;
border-radius:6px;
opacity:.7;

}

.thumbs img.active{

border:3px solid var(--gold);
opacity:1;

}

.info h1{

font-size:30px;
margin:10px 0;

}

.meta{

font-size:20px;
margin:6px 0;

}

.details{

font-size:20px;
line-height:1.8;
margin-top:40px;

}

footer{

text-align:center;
margin:80px 0;
font-size:18px;

}

.controls{

position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,.35);
padding:10px 22px;
border-radius:40px;
display:flex;
gap:16px;

}

.controls div{

cursor:pointer;
font-size:22px;

}

/* MOBILE */

@media(max-width:900px){

.container{

display:flex;
flex-direction:column;
padding:20px;

}

.thumbs{

flex-direction:row;
overflow-x:auto;
order:2;

}

.viewer{

order:1;

}

.info{

order:3;

}

.details{

order:4;

}

.thumbs img{

width:70px;
flex-shrink:0;

}

}

</style>

</head>

<body>

<header>

<a href="https://nd-f.github.io/QR/">

<img src="images/logo-nadim.png" class="logo">

</a>

</header>

<div class="page-title" id="pageTitle"></div>

<div class="container">

<div class="thumbs" id="thumbs"></div>

<div class="viewer">

<img id="mainImage">

</div>

<div class="info">

<div class="meta" id="inv"></div>

<h1 id="title"></h1>

<div class="meta" id="from"></div>

<div class="meta" id="date"></div>

<div class="meta" id="dim"></div>

<div class="meta" id="hall"></div>

<div class="details" id="desc"></div>

</div>

</div>

<div class="controls">

<div onclick="toggleLang()">🌐</div>

<div onclick="toggleTheme()">☀️</div>

<div onclick="share()">🔗</div>

</div>

<footer>

Nadim Foundation - مؤسسة نديم © ®

</footer>

<script>

let lang = navigator.language.startsWith("ar") ? "ar":"en"

if(window.matchMedia("(prefers-color-scheme: light)").matches){

document.body.classList.add("light")

}

const params=new URLSearchParams(location.search)

const id=params.get("id")

let images=[]

let current=0

let artwork

async function load(){

const res=await fetch("data/artworks.json")

const data=await res.json()

artwork=data.find(a=>a.id===id)

if(!artwork){

document.body.innerHTML="<h2 style='text-align:center'>Artwork not found</h2>"

return

}

prepareImages()

render()

}

function prepareImages(){

images=[

artwork.image1,
artwork.image2,
artwork.image3,
artwork.image4,
artwork.image5

].filter(img=>img && img.trim()!=="")

const thumbs=document.getElementById("thumbs")

thumbs.innerHTML=""

images.forEach((src,i)=>{

const img=document.createElement("img")

img.src=src

img.onclick=()=>show(i)

img.onerror=function(){this.remove()}

thumbs.appendChild(img)

})

}

function show(i){

current=i

document.getElementById("mainImage").src=images[i]

document.querySelectorAll(".thumbs img").forEach((t,k)=>{

t.classList.toggle("active",k===i)

})

}

function render(){

document.getElementById("inv").textContent=artwork.inventory_number

document.getElementById("title").textContent=
lang=="ar"?artwork.title_ar:artwork.title_en

document.getElementById("from").textContent=
lang=="ar"?artwork.from_ar:artwork.from_en

document.getElementById("date").textContent=
lang=="ar"?artwork.date_ar:artwork.date_en

document.getElementById("dim").textContent=
lang=="ar"?artwork.dimensions_ar:artwork.dimensions_en

document.getElementById("hall").textContent=
lang=="ar"?artwork.hall_ar:artwork.hall_en

document.getElementById("desc").textContent=
lang=="ar"?artwork.desc_ar:artwork.desc_en

document.getElementById("pageTitle").textContent=
lang==="ar"
? "معرض من حياة التحفة، متحف الفن الإسلامي بالقاهرة ونديم"
: "From the life of an Artifact Exhibition, Museum of Islamic Arts in Cairo and NADIM"

show(0)

}

function toggleLang(){

lang=lang==="ar"?"en":"ar"

render()

}

function toggleTheme(){

document.body.classList.toggle("light")

}

function share(){

navigator.share?.({

title:document.title,
url:location.href

})

}

/* SWIPE */

let startX=0

const viewer=document.getElementById("mainImage")

viewer.addEventListener("touchstart",e=>{

startX=e.touches[0].clientX

})

viewer.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

let diff=startX-endX

if(Math.abs(diff)>60){

if(diff>0) next()

else prev()

}

})

function next(){

current=(current+1)%images.length

show(current)

}

function prev(){

current=(current-1+images.length)%images.length

show(current)

}

load()

</script>

</body>
</html>
