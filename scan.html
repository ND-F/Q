<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Museum Artwork</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Tajawal',sans-serif;
background:#0b0b0b;
color:white;
}

.header{
background:#0F5C5E;
padding:15px;
text-align:center;
}

.header img{
height:60px;
}

.container{
display:flex;
flex-wrap:wrap;
min-height:90vh;
}

.image{
flex:1;
background:black;
display:flex;
align-items:center;
justify-content:center;
}

.image img{
max-width:90%;
max-height:80vh;
object-fit:contain;
}

.info{
flex:1;
padding:40px;
}

h1{
margin-top:0;
font-size:40px;
}

.row{
border-bottom:1px solid #0F5C5E;
padding:12px 0;
font-size:18px;
}

.desc{
margin-top:25px;
font-size:18px;
line-height:1.6;
}

.controls{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}

.btn{
background:#0F5C5E;
border:none;
color:white;
padding:15px 25px;
font-size:18px;
cursor:pointer;
border-radius:8px;
}

.btn:hover{
background:#138a8d;
}

@media(max-width:900px){
.container{
flex-direction:column;
}
.info{
padding:20px;
}
h1{
font-size:28px;
}
}

</style>
</head>

<body>

<div class="header">
<img src="images/logo-full.png">
</div>

<div class="container">

<div class="image">
<img id="img" src="images/no-image.jpg">
</div>

<div class="info">

<h1 id="title">Loading...</h1>

<div class="row">رقم القطعة: <span id="id"></span></div>
<div class="row">التاريخ: <span id="date"></span></div>
<div class="row">الخامة: <span id="material"></span></div>
<div class="row">الارتفاع: <span id="height"></span></div>
<div class="row">العرض: <span id="width"></span></div>

<div class="desc" id="desc"></div>

</div>

</div>

<div class="controls">
<button class="btn" onclick="prev()">◀ السابق</button>
<button class="btn" onclick="gallery()">الجاليري</button>
<button class="btn" onclick="next()">التالي ▶</button>
</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbzIH8SdUGDWYqlvHfExOBU0fbhQX729NKKAvqtPGygrjvCGX2ge2jQRFqLQIVW1OqUj/exec";

let artworks=[];
let index=0;

function getID(){
let url = new URL(window.location.href);
return url.searchParams.get("id");
}

fetch(API)
.then(r=>r.json())
.then(data=>{
artworks=data;

let id = getID();

index = artworks.findIndex(a=>a.id==id);

if(index<0) index=0;

load();

trackVisit(id);

});

function load(){

let a = artworks[index];

document.getElementById("title").innerText=a.title;
document.getElementById("id").innerText=a.id;
document.getElementById("date").innerText=a.date;
document.getElementById("material").innerText=a.material;
document.getElementById("height").innerText=a.height;
document.getElementById("width").innerText=a.width;
document.getElementById("desc").innerText=a.description;

document.getElementById("img").src =
a.image || "images/no-image.jpg";

}

function next(){
index=(index+1)%artworks.length;
load();
}

function prev(){
index=(index-1+artworks.length)%artworks.length;
load();
}

function gallery(){
window.location="index.html";
}

function trackVisit(id){

fetch(
"https://script.google.com/macros/s/AKfycbzIH8SdUGDWYqlvHfExOBU0fbhQX729NKKAvqtPGygrjvCGX2ge2jQRFqLQIVW1OqUj/exec?track="+id+
"&lang="+navigator.language+
"&device="+navigator.userAgent
);

}

</script>

</body>
</html>
