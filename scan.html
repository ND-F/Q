<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NADIM in Museum of Islamic Arts - نديم في متحف الفن الإسلامي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #06444C; --light: #EAE8D8; --gold: #E1A93E; }
        body { margin: 0; font-family: 'Tajawal', sans-serif; background: var(--main); color: var(--light); transition: 0.4s; overflow-x: hidden; }
        .light { background: var(--light); color: var(--main); }
        
        #museumHeader { position: sticky; top: 0; background: var(--light) !important; color: var(--main) !important; padding: 15px 20px; display: flex; flex-direction: column; align-items: center; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
        .logo-row { display: flex; align-items: center; justify-content: center; gap: 25px; }
        .logo { height: 50px; cursor: pointer; }
        .header-title { font-size: 18px; color: var(--main) !important; text-align: center; font-weight: 700; }

        .container { max-width: 1400px; margin: auto; padding: 20px; display: flex; flex-direction: column; }
        
        /* VIEWER AREA */
        .viewer { 
            width: 100%; height: 55vh; position: relative; 
            display: flex; align-items: center; justify-content: center; 
            margin-bottom: 15px; overflow: hidden; 
            background: rgba(0,0,0,0.15); border-radius: 12px; 
            border: 1px solid rgba(225, 169, 62, 0.1);
            cursor: pointer; 
        }
        
        .viewer img { max-width: 100%; max-height: 100%; object-fit: contain; pointer-events: none; }

        /* الطبقة المظللة للمعلومات أسفل الصورة */
        .photo-credit { 
            position: absolute; bottom: 0; left: 0; right: 0; 
            background: linear-gradient(transparent, rgba(0,0,0,0.8)); 
            color: white; padding: 25px 15px 10px; font-size: 14px; 
            z-index: 10; text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            display: none; /* تظهر فقط لو فيه نص */
        }
        .lang-ar .photo-credit { text-align: right; direction: rtl; }
        .lang-en .photo-credit { text-align: left; direction: ltr; }
        
        .thumbs { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 20px; }
        .thumbs img { width: 75px; height: 75px; object-fit: cover; border-radius: 8px; cursor: pointer; opacity: .5; transition: 0.3s; flex-shrink: 0; display: none; }
        .thumbs img.active { border: 3px solid var(--gold); opacity: 1; transform: scale(1.05); }
        
        .info h1 { font-size: 30px; color: var(--gold); margin: 0 0 10px 0; }
        .meta { font-size: 18px; margin: 6px 0; opacity: 0.9; }

        /* DETAILS (الوصف والخامة) */
        .details { margin-top: 30px; border-top: 1px solid rgba(225, 169, 62, 0.2); padding-top: 20px; line-height: 1.8; }
        .lang-ar .info, .lang-ar .details { text-align: right; direction: rtl; }
        .lang-en .info, .lang-en .details { text-align: left; direction: ltr; }

        /* DESKTOP LAYOUT - الإصلاح الجذري هنا */
        @media(min-width:1100px) {
            .container {
                display: grid;
                direction: ltr !important; 
                grid-template-columns: 100px 1fr 450px;
                grid-template-areas: 
                    "thumb viewer info"
                    "thumb details details"; /* جعل الوصف يفرش تحت الصورة والنص الجانبي */
                gap: 40px;
                align-items: start;
            }
            .viewer { grid-area: viewer; height: 75vh; }
            .thumbs { 
                grid-area: thumb; 
                flex-direction: column; 
                margin-top: 150px; 
                overflow: visible;
                position: sticky; top: 180px; /* جعل الثامنيلز تتحرك معاك */
            }
            .thumbs img { width: 85px; height: 85px; }

            .info { grid-area: info; margin-top: 150px; }
            .details { 
                grid-area: details; 
                margin-top: 20px; 
                max-width: 95%; /* عشان الكلام ميبقاش لازق في الحافة */
            }
        }
        
        .controls { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: rgba(10, 30, 35, 0.85); backdrop-filter: blur(10px); padding: 10px 25px; border-radius: 40px; display: flex; gap: 25px; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .controls div { font-size: 24px; cursor: pointer; transition: 0.2s; }

        /* FULLSCREEN MODAL */
        #fullscreenModal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; background: rgba(0,0,0,0.95);
            z-index: 9999; overflow: hidden; touch-action: none;
        }
        #fullscreenModal #modalImage { width: 100%; height: 100%; object-fit: contain; transition: transform 0.1s ease-out; }
        #fullscreenModal:not(.mobile-pinch) #modalImage { cursor: zoom-in; }
        #fullscreenModal.desktop-zoomed #modalImage { cursor: grab; transform: scale(2.5); }
        #modalClose { position: absolute; top: 20px; right: 20px; font-size: 35px; color: white; cursor: pointer; z-index: 10001; }

        footer { text-align: center; margin: 50px 0 100px 0; font-size: 14px; opacity: 0.5; }
    </style>
</head>
<body class="lang-ar">

<div id="fullscreenModal">
    <div id="modalClose">×</div>
    <img id="modalImage">
</div>

<header id="museumHeader">
    <div class="logo-row">
        <a href="https://nd-f.github.io/QR/"><img src="images/logo-nadim.png" class="logo"></a>
        <div class="header-title" id="headerTitle"></div>
        <img src="images/MIALOGO.png" class="logo">
    </div>
</header>

<div class="container">
    <div class="viewer" id="mainViewer">
        <img id="mainImage">
        <div class="photo-credit" id="photoCredit"></div>
    </div>

    <div class="thumbs" id="thumbs"></div>

    <div class="info">
        <div class="meta" id="inv"></div><h1 id="title"></h1>
        <div class="meta" id="from"></div><div class="meta" id="date"></div><div class="meta" id="dim"></div>
    </div>

    <div class="details">
        <div class="meta" id="hall"></div>
        <div class="meta" id="material" style="font-weight: bold; color: var(--gold);"></div>
        <div id="desc"></div>
    </div>
</div>

<div class="controls">
    <div onclick="toggleLang()">🌐</div><div onclick="toggleTheme()" id="themeBtn">☀️</div><div onclick="share()">🔗</div>
</div>

<footer> Nadim Foundation © ® </footer>

<script>
    let lang = navigator.language.startsWith("ar") ? "ar" : "en";
    let images = [], currentIdx = 0, artwork;
    const isMobile = window.innerWidth < 1100;

    const mainViewer = document.getElementById("mainViewer"), mainImage = document.getElementById("mainImage"), photoCredit = document.getElementById("photoCredit");
    const modal = document.getElementById("fullscreenModal"), modalImage = document.getElementById("modalImage");

    async function load() {
        const res = await fetch("data/artworks.json?t=" + new Date().getTime());
        const data = await res.json();
        
        const params = new URLSearchParams(location.search);
        let id = params.get("id");
        if(!id) {
            const pathParts = window.location.pathname.split('/');
            const lastPart = pathParts.pop() || pathParts.pop();
            if(lastPart !== 'scan.html') id = "MIA-" + lastPart;
        }

        artwork = data.find(a => a.id === id);
        if(!artwork) { document.body.innerHTML = "<h2 style='text-align:center;margin-top:100px'>Artwork Not Found</h2>"; return; }
        prepareImages(); render();
    }

    function prepareImages() {
        images = [artwork.image1, artwork.image2, artwork.image3, artwork.image4, artwork.image5].filter(img => img && img.trim() !== "");
        const thumbs = document.getElementById("thumbs");
        thumbs.innerHTML = "";
        images.forEach((src, i) => {
            const img = document.createElement("img");
            img.src = src; img.onload = () => img.style.display = 'block'; img.onerror = () => img.remove();
            img.onclick = (e) => { e.stopPropagation(); show(i); }; thumbs.appendChild(img);
        });
    }

    function show(i) {
        if(images.length === 0) return;
        currentIdx = i; mainImage.src = images[i];
        modalImage.src = images[i];
        document.querySelectorAll(".thumbs img").forEach((t, k) => t.classList.toggle("active", k === i));
        
        const infoKey = lang === "ar" ? `info_ar${i+1}` : `info_en${i+1}`;
        const info = artwork[infoKey] || "";
        photoCredit.textContent = info;
        photoCredit.style.display = info.trim() ? "block" : "none";
    }

    // --- SWIPE LOGIC ---
    let touchStartX = 0;
    mainViewer.addEventListener('touchstart', e => { if (e.touches.length === 1) touchStartX = e.touches[0].clientX; }, {passive: true});
    mainViewer.addEventListener('touchend', e => {
        if (e.changedTouches.length === 1) {
            let diff = touchStartX - e.changedTouches[0].clientX;
            if(Math.abs(diff) > 70) diff > 0 ? show((currentIdx+1)%images.length) : show((currentIdx-1+images.length)%images.length);
        }
    }, {passive: true});

    // --- FULLSCREEN & ZOOM ---
    mainViewer.addEventListener('click', () => {
        modalImage.src = images[currentIdx];
        modal.style.display = 'block';
        document.body.style.overflow = 'hidden';
        if(isMobile) initMobilePinch(); else initDesktopZoom();
    });

    document.getElementById("modalClose").onclick = () => {
        modal.style.display = 'none';
        document.body.style.overflow = '';
        resetModal();
    };

    // Mobile Pinch (Simplified)
    let pinchScale = 1;
    function initMobilePinch() { pinchScale = 1; modalImage.style.transform = `scale(1)`; }

    // Desktop Zoom
    let dz = false;
    function initDesktopZoom() {
        dz = false; modalImage.onclick = (e) => {
            dz = !dz; modal.classList.toggle('desktop-zoomed', dz);
            if(dz) moveZoom(e); else resetModal();
        };
        modalImage.onmousemove = moveZoom;
    }
    function moveZoom(e) {
        if(!dz) return;
        const rect = modalImage.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        modalImage.style.transformOrigin = `${x}% ${y}%`;
    }
    function resetModal() { modalImage.style.transform = "scale(1)"; dz = false; modal.classList.remove('desktop-zoomed'); }

    // --- RENDERING ---
    function render() {
        document.body.classList.remove('lang-ar', 'lang-en');
        document.body.classList.add(lang === 'ar' ? 'lang-ar' : 'lang-en');
        document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";

        document.getElementById("inv").textContent = artwork.inventory_number || "";
        document.getElementById("title").textContent = lang === "ar" ? artwork.title_ar : artwork.title_en;
        document.getElementById("from").textContent = lang === "ar" ? artwork.from_ar : artwork.from_en;
        document.getElementById("date").textContent = lang === "ar" ? artwork.date_ar : artwork.date_en;
        document.getElementById("dim").textContent = lang === "ar" ? artwork.dimensions_ar : artwork.dimensions_en;
        document.getElementById("hall").textContent = lang === "ar" ? artwork.hall_ar : artwork.hall_en;
        document.getElementById("material").textContent = (lang === "ar" ? artwork.material_ar : artwork.material_en) || "";
        document.getElementById("desc").textContent = lang === "ar" ? artwork.desc_ar : artwork.desc_en;
        document.getElementById("headerTitle").textContent = lang === "ar" ? "معرض من حياة التحفة" : "From the Life of an Artefact Exhibition";
        show(currentIdx);
    }

    function toggleLang() { lang = lang === "ar" ? "en" : "ar"; render(); }
    function toggleTheme() { 
        const isLight = document.body.classList.toggle("light");
        document.getElementById("themeBtn").textContent = isLight ? "🌙" : "☀️";
    }
    function share() {
        if (navigator.share) navigator.share({ url: location.href });
        else alert(lang === "ar" ? "تم نسخ الرابط!" : "Link copied!");
    }

    window.addEventListener("scroll", () => {
        const header = document.getElementById("museumHeader");
        if(window.scrollY > 40) header.classList.add("header-small");
        else header.classList.remove("header-small");
    });

    load();
</script>
</body>
</html>
