<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nadim Museum</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600&display=swap" rel="stylesheet">

<style>

:root{

--dark:#06444C;
--bg:#EAE8D8;
--soft:#ADCAC9;
--accent:#4A121C;
--gold:#E1A93E;

}

body{

margin:0;
font-family:'Tajawal',sans-serif;
background:var(--bg);
color:var(--dark);

}

/* layout */

.container{

max-width:1300px;
margin:auto;
padding:40px;

display:grid;
grid-template-columns:90px 1fr 380px;
gap:30px;

}

/* thumbnails */

.thumbs{

display:flex;
flex-direction:column;
gap:10px;

}

.thumbs img{

width:100%;
cursor:pointer;
border-radius:6px;
opacity:.7;
border:2px solid transparent;

}

.thumbs img.active{

opacity:1;
border:2px solid var(--gold);

}

/* main image */

.viewer{

position:relative;

}

.viewer img{

width:100%;
border-radius:10px;
cursor:zoom-in;

}

/* arrows */

.arrow{

position:absolute;
top:50%;
transform:translateY(-50%);
font-size:30px;
background:rgba(0,0,0,.3);
color:white;
padding:10px 15px;
cursor:pointer;
user-select:none;

}

.arrow.left{

left:10px;

}

.arrow.right{

right:10px;

}

/* info */

.info{

direction:rtl;

}

.inventory{

font-size:14px;
margin-bottom:6px;

}

.title{

font-size:16px;
font-weight:600;
margin-bottom:8px;

}

.meta{

font-size:14px;
margin-bottom:4px;

}

/* details */

.details{

max-width:900px;
margin:auto;
padding:30px;

border-top:1px solid var(--soft);

}

.details p{

font-size:14px;
line-height:1.7;

}

/* zoom */

.zoom{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);

display:none;
align-items:center;
justify-content:center;

}

.zoom img{

max-width:90%;
max-height:90%;

}

/* mobile */

@media(max-width:900px){

.container{

grid-template-columns:1fr;

}

.thumbs{

flex-direction:row;
order:2;

}

.viewer{

order:1;

}

.info{

order:3;

}

}

</style>

</head>

<body>

<div class="container">

<div class="thumbs" id="thumbs"></div>

<div class="viewer">

<div class="arrow left" onclick="prev()">‹</div>

<img id="mainImage">

<div class="arrow right" onclick="next()">›</div>

</div>

<div class="info">

<div class="inventory" id="inventory"></div>

<div class="title" id="title"></div>

<div class="meta" id="from"></div>

<div class="meta" id="date"></div>

</div>

</div>

<div class="details">

<p id="desc"></p>

<p id="dimensions"></p>

<p id="section"></p>

<p id="hall"></p>

</div>

<div class="zoom" id="zoom" onclick="closeZoom()">

<img id="zoomImg">

</div>

<script>

const params=new URLSearchParams(location.search)
const id=params.get("id")

let lang="ar"
let images=[]
let index=0

async function loadData(){

const res=await fetch("data/artworks.json")
const data=await res.json()

const art=data.find(a=>a.id===id)

renderInfo(art)
loadImages(art)

}

function renderInfo(a){

document.getElementById("inventory").textContent=a.inventory_number

document.getElementById("title").textContent=
lang==="ar"?a.title_ar:a.title_en

document.getElementById("from").textContent=
lang==="ar"?a.from_ar:a.from_en

document.getElementById("date").textContent=
lang==="ar"?a.date_ar:a.date_en

document.getElementById("desc").textContent=
lang==="ar"?a.desc_ar:a.desc_en

document.getElementById("dimensions").textContent=
lang==="ar"?a.dimensions_ar:a.dimensions_en

document.getElementById("section").textContent=
lang==="ar"?a.section_ar:a.section_en

document.getElementById("hall").textContent=
lang==="ar"?a.hall_ar:a.hall_en

}

function loadImages(a){

images=[
a.image1,
a.image2,
a.image3,
a.image4,
a.image5
].filter(i=>i)

const thumbs=document.getElementById("thumbs")

images.forEach((src,i)=>{

const img=document.createElement("img")

img.src=src

img.onclick=()=>show(i)

thumbs.appendChild(img)

})

show(0)

}

function show(i){

index=i

document.getElementById("mainImage").src=images[i]

document.getElementById("zoomImg").src=images[i]

document.querySelectorAll(".thumbs img").forEach((t,n)=>{

t.classList.toggle("active",n===i)

})

}

function next(){

index=(index+1)%images.length
show(index)

}

function prev(){

index=(index-1+images.length)%images.length
show(index)

}

document.getElementById("mainImage").onclick=function(){

document.getElementById("zoom").style.display="flex"

}

function closeZoom(){

document.getElementById("zoom").style.display="none"

}

loadData()

</script>

</body>

</html>
