<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nadim Museum</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--main:#05444B;
--dark:#071f21;
--light:#f4f7f8;
}

/* PAGE */

body{
margin:0;
font-family:'Tajawal',sans-serif;
background:linear-gradient(180deg,#031d20,#071f21);
color:#e9f6f7;
text-align:center;
direction:rtl;
opacity:0;
transform:translateY(20px);
animation:pageIn 1s forwards;
padding-bottom:120px;
}

@keyframes pageIn{
to{
opacity:1;
transform:translateY(0);
}
}

/* LIGHT MODE */

.light{
background:#f4f7f8;
color:#0c4f57;
}

/* HEADER */

.header{
background:#e9f6f7;
padding:25px;
border-radius:0 0 40px 40px;
}

.logo{
width:140px;
}

/* MAIN CARD */

.card{
width:92%;
max-width:900px;
margin:40px auto;
padding:30px;

background:rgba(255,255,255,.06);
backdrop-filter:blur(16px);

border-radius:24px;

box-shadow:
0 10px 40px rgba(0,0,0,.45),
inset 0 1px 0 rgba(255,255,255,.08);
}

/* IMAGE */

.image img{
width:100%;
border-radius:16px;
box-shadow:0 10px 40px rgba(0,0,0,.4);
}

/* TITLE */

h1{
font-size:32px;
margin:25px 0 10px;
color:#d6f5f6;
}

/* META */

.meta{
font-size:18px;
opacity:.85;
margin:6px 0;
}

/* DESCRIPTION */

.desc{
margin-top:25px;
font-size:19px;
line-height:1.9;
}

/* VIEWS */

.counter{
margin-top:25px;
font-size:14px;
opacity:.65;
}

/* FLOAT BAR */

.controls{
position:fixed;
bottom:18px;
left:50%;
transform:translateX(-50%);

background:rgba(255,255,255,.15);
backdrop-filter:blur(14px);

padding:12px 22px;
border-radius:40px;

display:flex;
gap:22px;

box-shadow:0 8px 30px rgba(0,0,0,.25);
}

.btn{
font-size:22px;
cursor:pointer;
transition:.3s;
}

.btn:active{
transform:scale(.8) rotate(180deg);
}

</style>

</head>

<body>

<div class="header">
<img class="logo" src="images/logo-nadim.png">
</div>

<div class="card">

<div class="image">
<img id="img">
</div>

<h1 id="title"></h1>

<div class="meta" id="id"></div>
<div class="meta" id="date"></div>

<div class="desc" id="desc"></div>

<div class="counter" id="views"></div>

</div>

<div class="controls">

<div class="btn" onclick="toggleTheme()">☀️</div>
<div class="btn" onclick="toggleLang()">🌐</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbz0zgMLLmtC4NPZNJylRPgD7Q8aNjhfsZh6YdCJ55p8E-Bt7heKvDvkKkwutoiuwTSG/exec"

let lang="ar"

const params=new URLSearchParams(location.search)
const id=params.get("id")

let artwork

fetch(API)
.then(r=>r.json())
.then(data=>{

artwork=data.find(a=>a.id==id)

if(!artwork){
document.body.innerHTML="<h2 style='padding:40px'>Artwork not found</h2>"
return
}

render()

})

function render(){

document.getElementById("img").src=artwork.image || "images/no-image.jpg"

if(lang=="ar"){

document.documentElement.lang="ar"
document.body.dir="rtl"

document.getElementById("title").innerText=artwork.title_ar || ""

document.getElementById("id").innerText="رقم القطعة: "+artwork.id
document.getElementById("date").innerText="التاريخ: "+(artwork.date || "")

document.getElementById("desc").innerText=artwork.desc_ar || ""

document.getElementById("views").innerText="تمت مشاهدة هذه القطعة "+(artwork.views || 0)+" مرة"

}

else{

document.documentElement.lang="en"
document.body.dir="ltr"

document.getElementById("title").innerText=artwork.title_en || ""

document.getElementById("id").innerText="Item ID: "+artwork.id
document.getElementById("date").innerText="Date: "+(artwork.date || "")

document.getElementById("desc").innerText=artwork.desc_en || ""

document.getElementById("views").innerText="This item was viewed "+(artwork.views || 0)+" times"

}

}

function toggleLang(){
lang=(lang=="ar")?"en":"ar"
render()
}

function toggleTheme(){
document.body.classList.toggle("light")
}

fetch(API+"?track="+id)

</script>

</body>
</html>
