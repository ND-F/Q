<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nadim Museum</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600&display=swap" rel="stylesheet">

<style>

:root{

--main:#06444C;
--bg:#EAE8D8;
--soft:#ADCAC9;
--accent:#4A121C;
--gold:#E1A93E;

}

body{

margin:0;
font-family:'Tajawal',sans-serif;
background:var(--bg);
color:var(--main);

}

.container{

max-width:1200px;
margin:auto;
padding:40px;
display:grid;
grid-template-columns:1fr 1fr;
gap:50px;

}

/* gallery */

.gallery img{

width:100%;
border-radius:12px;
margin-bottom:20px;

}

/* info */

.info{

direction:rtl;

}

.inventory{

font-size:14px;
color:var(--accent);
margin-bottom:10px;

}

.title{

font-size:16px;
font-weight:600;
margin-bottom:6px;

}

.subtitle{

font-size:14px;
color:#333;
margin-bottom:6px;

}

.section{

margin-top:30px;
font-size:14px;
line-height:1.8;

}

.extra{

margin-top:40px;
padding-top:20px;
border-top:1px solid var(--soft);

}

.extra p{

font-size:14px;
margin-bottom:10px;

}

/* responsive */

@media(max-width:900px){

.container{

grid-template-columns:1fr;

}

.gallery{

order:1;

}

.info{

order:2;

}

}

</style>

</head>

<body>

<div class="container">

<div class="gallery" id="gallery"></div>

<div class="info">

<div class="inventory" id="inventory"></div>

<div class="title" id="title"></div>

<div class="subtitle" id="from"></div>

<div class="subtitle" id="date"></div>

<div class="extra">

<p id="desc"></p>

<p id="dimensions"></p>

<p id="section"></p>

<p id="hall"></p>

</div>

</div>

</div>

<script>

const params=new URLSearchParams(location.search)
const id=params.get("id")

let lang="ar"

async function loadData(){

const res=await fetch("data/artworks.json")
const data=await res.json()

const artwork=data.find(a=>a.id===id)

if(!artwork){

document.body.innerHTML="Artwork not found"
return

}

render(artwork)

}

function render(a){

/* inventory */

document.getElementById("inventory").textContent=a.inventory_number

/* title */

document.getElementById("title").textContent=
lang==="ar"?a.title_ar:a.title_en

/* from */

document.getElementById("from").textContent=
lang==="ar"?a.from_ar:a.from_en

/* date */

document.getElementById("date").textContent=
lang==="ar"?a.date_ar:a.date_en

/* description */

document.getElementById("desc").textContent=
lang==="ar"?a.desc_ar:a.desc_en

/* dimensions */

document.getElementById("dimensions").textContent=
lang==="ar"?a.dimensions_ar:a.dimensions_en

/* section */

document.getElementById("section").textContent=
lang==="ar"?a.section_ar:a.section_en

/* hall */

document.getElementById("hall").textContent=
lang==="ar"?a.hall_ar:a.hall_en

/* images */

const gallery=document.getElementById("gallery")

const images=[
a.image1,
a.image2,
a.image3,
a.image4,
a.image5
]

images.forEach(src=>{

if(!src) return

const img=document.createElement("img")
img.src=src

gallery.appendChild(img)

})

}

loadData()

</script>

</body>

</html>
