<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museum of Islamic Arts - متحف الفن الإسلامي ونديم</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --main: #06444C;   /* الكحلي */
            --light: #EAE8D8;  /* الكريمي */
            --gold: #E1A93E;   /* الذهبي */
        }

        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background: var(--main);
            color: var(--light);
            transition: background 0.4s ease, color 0.4s ease;
        }

        .light {
            background: var(--light);
            color: var(--main);
        }

        /* HEADER - ثابت دائماً باللون الفاتح */
        #museumHeader {
            position: sticky;
            top: 0;
            background: var(--light) !important; 
            color: var(--main) !important;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        .logo-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
        }

        /* تنسيق الهيدر حسب لغة المتصفح أو الاختيار */
        .lang-ar #museumHeader { direction: rtl; }
        .lang-en #museumHeader { direction: ltr; }

        .logo { height: 50px; cursor: pointer; transition: 0.3s; }
        .header-title { font-size: 18px; color: var(--main) !important; text-align: center; font-weight: 700; }

        .header-small .logo { height: 35px; }

        /* CONTAINER LAYOUT */
        .container {
            max-width: 1400px;
            margin: auto;
            padding: 20px;
            display: flex;
            flex-direction: column; /* الترتيب الافتراضي للموبايل */
        }

        /* MAIN VIEWER */
        .viewer {
            width: 100%;
            height: 50vh; /* مقاس مناسب للموبايل */
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .viewer img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        /* THUMBS */
        .thumbs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
            margin-bottom: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .thumbs img {
            width: 75px;
            height: 75px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            opacity: .6;
            transition: 0.3s;
            flex-shrink: 0;
            display: none; /* إخفاء مبدئي لمنع البروكن ايمدج */
        }

        .thumbs img.active {
            border: 3px solid var(--gold);
            opacity: 1;
        }

        /* TEXT STYLING */
        .info h1 { font-size: 28px; color: var(--gold); margin: 0 0 10px 0; }
        .meta { font-size: 18px; margin: 6px 0; opacity: 0.9; }
        .details { margin-top: 30px; border-top: 1px solid rgba(225, 169, 62, 0.2); padding-top: 20px; line-height: 1.7; }

        /* محاذاة النصوص حسب اللغة */
        .lang-ar .info, .lang-ar .details { text-align: right; direction: rtl; }
        .lang-en .info, .lang-en .details { text-align: left; direction: ltr; }

        /* DESKTOP LAYOUT (1100px+) */
        @media(min-width:1100px) {
            .container {
                display: grid;
                direction: ltr !important; /* تثبيت التخطيط: ثامنيل يسار | نص يمين */
                grid-template-columns: 100px 1fr 450px;
                grid-template-areas: 
                    "thumb viewer info"
                    ". details details"; 
                gap: 40px;
                align-items: start;
            }

            .viewer { grid-area: viewer; height: 70vh; }
            .thumbs { 
                grid-area: thumb; 
                flex-direction: column; 
                margin-top: 150px; /* تماثل مع بداية النص */
                overflow: visible;
            }
            .thumbs img { width: 85px; height: 85px; }

            .info { grid-area: info; margin-top: 150px; }
            .details { grid-area: details; margin-top: 40px; }
        }

        /* CONTROLS */
        .controls {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 30, 35, 0.85);
            backdrop-filter: blur(10px);
            padding: 10px 25px;
            border-radius: 40px;
            display: flex;
            gap: 25px;
            z-index: 2000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .controls div { font-size: 24px; cursor: pointer; transition: 0.2s; }
        .controls div:hover { transform: scale(1.2); }

        footer { text-align: center; margin: 50px 0 100px 0; font-size: 14px; opacity: 0.5; }
    </style>
</head>

<body class="lang-ar">

<header id="museumHeader">
    <div class="logo-row">
        <a href="https://nd-f.github.io/QR/">
            <img src="images/logo-nadim.png" class="logo">
        </a>
        <div class="header-title" id="headerTitle"></div>
        <img src="images/MIALOGO.png" class="logo">
    </div>
</header>

<div class="container">
    <div class="viewer">
        <img id="mainImage" src="">
    </div>

    <div class="thumbs" id="thumbs"></div>

    <div class="info">
        <div class="meta" id="inv"></div>
        <h1 id="title"></h1>
        <div class="meta" id="from"></div>
        <div class="meta" id="date"></div>
        <div class="meta" id="dim"></div>
    </div>

    <div class="details">
        <div class="meta" id="hall"></div>
        <div id="desc"></div>
    </div>
</div>

<div class="controls">
    <div onclick="toggleLang()" title="اللغة">🌐</div>
    <div onclick="toggleTheme()" id="themeBtn" title="الثيم">☀️</div>
    <div onclick="share()" title="مشاركة">🔗</div>
</div>

<footer>
    Nadim Foundation - مؤسسة نديم © ®
</footer>

<script>
    let lang = navigator.language.startsWith("ar") ? "ar" : "en";
    
    // ضبط اللغة الابتدائية
    function updateLangClass() {
        document.body.classList.remove('lang-ar', 'lang-en');
        document.body.classList.add(lang === 'ar' ? 'lang-ar' : 'lang-en');
    }

    const themeBtn = document.getElementById("themeBtn");
    if(window.matchMedia("(prefers-color-scheme: light)").matches){
        document.body.classList.add("light");
        themeBtn.textContent = "🌙";
    }

    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    const mainImage = document.getElementById("mainImage");
    let images = [];
    let artwork;

    async function load() {
        try {
            const res = await fetch("data/artworks.json");
            const data = await res.json();
            artwork = data.find(a => a.id === id);

            if(!artwork) {
                document.body.innerHTML = "<h2 style='text-align:center; margin-top:100px;'>التحفة غير موجودة</h2>";
                return;
            }
            prepareImages();
            render();
        } catch (e) { console.error(e); }
    }

    function prepareImages() {
        images = [artwork.image1, artwork.image2, artwork.image3, artwork.image4, artwork.image5]
                 .filter(img => img && img.trim() !== "");

        const thumbs = document.getElementById("thumbs");
        thumbs.innerHTML = "";
        images.forEach((src, i) => {
            const img = document.createElement("img");
            img.src = src;
            img.onload = () => img.style.display = 'block'; 
            img.onerror = () => img.remove();
            img.onclick = () => show(i);
            thumbs.appendChild(img);
        });
    }

    function show(i) {
        if(images.length === 0) return;
        mainImage.src = images[i];
        document.querySelectorAll(".thumbs img").forEach((t, k) => {
            t.classList.toggle("active", k === i);
        });
    }

    function render() {
        updateLangClass();
        document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";

        document.getElementById("inv").textContent = artwork.inventory_number;
        document.getElementById("title").textContent = lang === "ar" ? artwork.title_ar : artwork.title_en;
        document.getElementById("from").textContent = lang === "ar" ? artwork.from_ar : artwork.from_en;
        document.getElementById("date").textContent = lang === "ar" ? artwork.date_ar : artwork.date_en;
        document.getElementById("dim").textContent = lang === "ar" ? artwork.dimensions_ar : artwork.dimensions_en;
        document.getElementById("hall").textContent = lang === "ar" ? artwork.hall_ar : artwork.hall_en;
        document.getElementById("desc").textContent = lang === "ar" ? artwork.desc_ar : artwork.desc_en;
        document.getElementById("headerTitle").textContent = lang === "ar" ? "معرض من حياة التحفة" : "From the Life of an Artefact Exhibition";
        show(0);
    }

    function toggleLang() {
        lang = lang === "ar" ? "en" : "ar";
        render();
    }

    function toggleTheme() {
        const isLight = document.body.classList.toggle("light");
        themeBtn.textContent = isLight ? "🌙" : "☀️";
    }

    function share() {
        if (navigator.share) navigator.share({ url: location.href });
        else alert("تم نسخ الرابط: " + location.href);
    }

    window.addEventListener("scroll", () => {
        const header = document.getElementById("museumHeader");
        if(window.scrollY > 40) header.classList.add("header-small");
        else header.classList.remove("header-small");
    });

    load();
</script>

</body>
</html>
