<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title> NADIM in M.I.A. </title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600&display=swap" rel="stylesheet">

<style>

:root{

--dark:#06444C;
--light:#EAE8D8;
--soft:#ADCAC9;
--accent:#4A121C;
--gold:#E1A93E;

}

body{

margin:0;
font-family:Tajawal;
background:var(--light);
color:var(--dark);

}

.dark{

background:var(--dark);
color:var(--light);

}

/* header */

.header{

background:#ADCAC9;
text-align:center;
padding:22px;

}

.logo{

height:70px;

}

/* layout */

.container{

max-width:1300px;
margin:auto;
padding:40px;

display:grid;
grid-template-columns:90px 1fr 420px;
gap:30px;

}

/* thumbnails */

.thumbs{

display:flex;
flex-direction:column;
gap:12px;

}

.thumbs img{

width:100%;
cursor:pointer;
border-radius:6px;
opacity:.6;
border:2px solid transparent;

}

.thumbs img.active{

opacity:1;
border:2px solid var(--gold);

}

/* viewer */

.viewer{

position:relative;

}

.viewer img{

width:100%;
border-radius:12px;
cursor:zoom-in;

}

/* arrows hidden */

.arrow{

position:absolute;
top:50%;
transform:translateY(-50%);
font-size:30px;
color:white;
padding:10px;
cursor:pointer;
opacity:0;

}

/* info */

.info{

padding-top:10px;

}

.inventory{

font-size:16px;
margin-bottom:4px;

}

.title{

font-size:20px;
font-weight:600;
margin-bottom:6px;

}

.meta{

font-size:16px;
margin-bottom:4px;

}

/* details */

.details{

max-width:900px;
margin:auto;
padding:30px;
border-top:1px solid var(--soft);

}

.details p{

font-size:16px;
line-height:1.7;

}

/* controls */

.controls{

position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);

background:rgba(0,0,0,.15);
backdrop-filter:blur(10px);

padding:10px 20px;
border-radius:30px;

display:flex;
gap:14px;

}

.controls button{

border:none;
background:none;
font-size:18px;
cursor:pointer;

}

/* footer */

footer{

text-align:center;
margin:80px 0 30px;
font-size:13px;
opacity:.7;

}

/* zoom */

.zoom{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);

display:none;
align-items:center;
justify-content:center;

}

.zoom img{

max-width:90%;
max-height:90%;

}

/* mobile */

@media(max-width:900px){

.container{

grid-template-columns:1fr;

}

.thumbs{

flex-direction:row;
order:2;

}

.viewer{

order:1;

}

.info{

order:3;

}

}

</style>

</head>

<body>

<header class="header">

<img src="images/logo-nadim.png" class="logo">

</header>

<div class="container">

<div class="thumbs" id="thumbs"></div>

<div class="viewer">

<img id="mainImage">

</div>

<div class="info">

<div class="inventory" id="inventory"></div>

<div class="title" id="title"></div>

<div class="meta" id="from"></div>

<div class="meta" id="date"></div>

<div class="meta" id="dimensions"></div>

</div>

</div>

<div class="details">

<p id="hall"></p>

<p id="desc"></p>

</div>

<div class="controls">

<button onclick="toggleLang()">🌐</button>
<button onclick="toggleTheme()">☀️</button>
<button onclick="shareItem()">🔗</button>

</div>

<footer>

Nadim Foundation - مؤسسة نديم © ®

</footer>

<div class="zoom" id="zoom">

<img id="zoomImg">

</div>

<script>

/* language */

let lang=navigator.language.startsWith("ar")?"ar":"en"

/* theme */

if(window.matchMedia('(prefers-color-scheme: dark)').matches){

document.body.classList.add("dark")

}

/* get id */

const params=new URLSearchParams(location.search)
const id=params.get("id")

let images=[]
let index=0

async function loadData(){

const res=await fetch("data/artworks.json")
const data=await res.json()

const art=data.find(a=>a.id===id)

if(!art){

document.body.innerHTML="<h2 style='text-align:center;margin-top:100px'>Artwork not found</h2>"
return

}

renderInfo(art)
loadImages(art)

}

/* info */

function renderInfo(a){

document.body.dir=lang==="ar"?"rtl":"ltr"

document.getElementById("inventory").textContent=a.inventory_number

document.getElementById("title").textContent=
lang==="ar"?a.title_ar:a.title_en

document.getElementById("from").textContent=
lang==="ar"?a.from_ar:a.from_en

document.getElementById("date").textContent=
lang==="ar"?a.date_ar:a.date_en

document.getElementById("dimensions").textContent=
lang==="ar"?a.dimensions_ar:a.dimensions_en

document.getElementById("desc").textContent=
lang==="ar"?a.desc_ar:a.desc_en

document.getElementById("hall").textContent=
lang==="ar"?a.hall_ar:a.hall_en

}

/* images */

function loadImages(a){

images=[

a.image1,
a.image2,
a.image3,
a.image4,
a.image5

].filter(i=>i && i.trim()!="")

if(images.length<=1){

document.getElementById("thumbs").style.display="none"

}

const thumbs=document.getElementById("thumbs")

images.forEach((src,i)=>{

const img=document.createElement("img")

img.src=src
img.onclick=()=>show(i)

thumbs.appendChild(img)

})

show(0)

}

/* show */

function show(i){

index=i

document.getElementById("mainImage").src=images[i]
document.getElementById("zoomImg").src=images[i]

document.querySelectorAll(".thumbs img").forEach((t,n)=>{

t.classList.toggle("active",n===i)

})

}

/* swipe */

let startX=0

document.getElementById("mainImage").addEventListener("touchstart",e=>{

startX=e.touches[0].clientX

})

document.getElementById("mainImage").addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

if(endX-startX>50) prev()
if(startX-endX>50) next()

})

function next(){

index=(index+1)%images.length
show(index)

}

function prev(){

index=(index-1+images.length)%images.length
show(index)

}

/* zoom */

document.getElementById("mainImage").onclick=function(){

document.getElementById("zoom").style.display="flex"

}

document.getElementById("zoom").onclick=function(){

this.style.display="none"

}

/* language */

function toggleLang(){

lang=lang==="ar"?"en":"ar"

loadData()

}

/* theme */

function toggleTheme(){

document.body.classList.toggle("dark")

}

/* share */

function shareItem(){

if(navigator.share){

navigator.share({

title:document.title,
url:location.href

})

}else{

navigator.clipboard.writeText(location.href)
alert("Link copied")

}

}

loadData()

</script>

</body>

</html>
