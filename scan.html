<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Tajawal;
background:#0f2024;
color:#e9f6f7;
transition:.4s;
}

.light{
background:#f4f7f8;
color:#0c4f57;
}

.header{
background:#e9f6f7;
padding:20px;
text-align:center;
}

.logo{
width:220px;
}

.container{
display:flex;
flex-wrap:wrap;
}

.image{
flex:1;
display:flex;
align-items:center;
justify-content:center;
background:black;
}

.image img{
max-width:90%;
max-height:85vh;
}

.info{
flex:1;
padding:40px;
}

.title{
font-size:36px;
margin-bottom:10px;
}

.meta{
color:#0f6c75;
margin:10px 0;
}

.desc{
margin-top:20px;
line-height:1.9;
}

.controls{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(255,255,255,.2);
padding:10px 20px;
border-radius:30px;
display:flex;
gap:20px;
}

.btn{
cursor:pointer;
font-size:22px;
}

</style>

</head>

<body>

<div class="header">

<img class="logo"
src="https://raw.githubusercontent.com/Sh33ar/https-github.com-/main/NADIM%20LOGO.png">

</div>

<div class="container">

<div class="image">
<img id="img">
</div>

<div class="info">

<div class="title" id="title"></div>

<div class="meta">

رقم القطعة: <span id="id"></span>

</div>

<div class="meta">

التاريخ: <span id="date"></span>

</div>

<div class="desc" id="desc"></div>

<div class="meta">

تمت مشاهدة هذه القطعة

<span id="views">0</span>

مرة

</div>

</div>

</div>

<div class="controls">

<div class="btn" onclick="toggleLang()">🌐</div>

<div class="btn" onclick="toggleTheme()">🌙</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbz0zgMLLmtC4NPZNJylRPgD7Q8aNjhfsZh6YdCJ55p8E-Bt7heKvDvkKkwutoiuwTSG/exec";

let lang="ar";

const url=new URLSearchParams(location.search);

const id=url.get("id");

fetch(API)

.then(r=>r.json())

.then(data=>{

let a=data.find(x=>x.id==id);

window.art=a;

load();

track();

loadViews();

});

function load(){

img.src=art.image;

title.innerText=

lang==="ar"

? art.title_ar

: art.title_en;

desc.innerText=

lang==="ar"

? art.desc_ar

: art.desc_en;

date.innerText=art.date;

document.getElementById("id").innerText=art.id;

}

function toggleLang(){

lang = lang==="ar" ? "en" : "ar";

load();

}

function toggleTheme(){

document.body.classList.toggle("light");

}

function track(){

fetch(API+"?track="+id);

}

function loadViews(){

fetch(API+"?stats=1")

.then(r=>r.json())

.then(data=>{

views.innerText=data[id]||0;

});

}

</script>

</body>

</html>
