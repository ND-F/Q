<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nadim Museum</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--main:#05444B;
--dark:#071f21;
--light:#f4f7f8;
}

body{
margin:0;
font-family:'Tajawal',sans-serif;
background:#071f21;
color:#e9f6f7;
text-align:center;
direction:rtl;
padding-bottom:100px;
}

.light{
background:#f4f7f8;
color:#0c4f57;
}

/* header */

.header{
background:#e9f6f7;
padding:22px;
border-radius:0 0 36px 36px;
}

.logo{
width:130px;
}

/* card */

.card{
width:92%;
max-width:900px;
margin:35px auto;
padding:26px;
background:rgba(255,255,255,.05);
border-radius:20px;
box-shadow:0 6px 24px rgba(0,0,0,.35);
}

/* image */

.image img{
width:100%;
border-radius:14px;
box-shadow:0 8px 26px rgba(0,0,0,.35);
}

/* title */

h1{
font-size:30px;
margin:20px 0 10px;
color:#d6f5f6;
}

/* meta */

.meta{
font-size:17px;
opacity:.85;
margin:6px 0;
}

/* description */

.desc{
margin-top:22px;
font-size:18px;
line-height:1.8;
}

/* views */

.counter{
margin-top:22px;
font-size:14px;
opacity:.65;
}

/* controls */

.controls{
position:fixed;
bottom:18px;
left:50%;
transform:translateX(-50%);
background:rgba(255,255,255,.12);
padding:12px 22px;
border-radius:40px;
display:flex;
gap:20px;
box-shadow:0 6px 20px rgba(0,0,0,.25);
}

.btn{
font-size:22px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
<img class="logo" src="images/logo-nadim.png">
</div>

<div class="card">

<div class="image">
<img id="img" loading="lazy">
</div>

<h1 id="title"></h1>

<div class="meta" id="id"></div>
<div class="meta" id="date"></div>

<div class="desc" id="desc"></div>

<div class="counter" id="views"></div>

</div>

<div class="controls">

<div class="btn" onclick="toggleTheme()">☀️</div>
<div class="btn" onclick="toggleLang()">🌐</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzvJPDx_LBhtn19YvkNM0NlXvjTy80Nzzgze8JdDVuol0fw1o3LYqENi1d2gfrDPFJJ/exec"

let lang="ar"

const params=new URLSearchParams(location.search)
const id=params.get("id")

/* التحقق من وجود id */

if(!id){

document.body.innerHTML="<h2 style='padding:40px'>Invalid QR Code</h2>"

throw new Error("No ID")

}

let artwork

/* تحميل البيانات */

async function loadData(){

try{

const res=await fetch(API+"?id="+id+"&t="+Date.now())

if(!res.ok){

console.error("API Error")
return

}

const data=await res.json()

artwork=data

render()

}catch(err){

console.error("Fetch error",err)

}

}

/* عرض البيانات */

function render(){

document.getElementById("img").src=artwork.image1 || "images/no-image.jpg"

if(lang=="ar"){

document.documentElement.lang="ar"
document.body.dir="rtl"

document.getElementById("title").textContent=artwork.title_ar || ""

document.getElementById("id").textContent="رقم القطعة: "+artwork.id

document.getElementById("date").textContent="التاريخ: "+(artwork.date || "")

document.getElementById("desc").textContent=artwork.desc_ar || ""

document.getElementById("views").textContent=
"تمت مشاهدة هذه القطعة "+(artwork.views || 0)+" مرة"

}

else{

document.documentElement.lang="en"
document.body.dir="ltr"

document.getElementById("title").textContent=artwork.title_en || ""

document.getElementById("id").textContent="Item ID: "+artwork.id

document.getElementById("date").textContent="Date: "+(artwork.date || "")

document.getElementById("desc").textContent=artwork.desc_en || ""

document.getElementById("views").textContent=
"This item was viewed "+(artwork.views || 0)+" times"

}

}

/* تغيير اللغة */

function toggleLang(){

lang=(lang=="ar")?"en":"ar"

render()

}

/* تغيير الثيم */

function toggleTheme(){

document.body.classList.toggle("light")

}

/* تحميل البيانات */

loadData()

/* تسجيل الزيارة بدون تعطيل الصفحة */

fetch(API+"?track="+id).catch(()=>{})

</script>

</body>

</html>
