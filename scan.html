<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nadim Museum</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">

<!-- preload image -->
<link rel="preload" as="image" id="preloadImg">

<style>

:root{
--main:#05444B;
--dark:#071f21;
--light:#f4f7f8;
}

body{
margin:0;
font-family:'Tajawal',sans-serif;
background:#071f21;
color:#e9f6f7;
text-align:center;
direction:rtl;
padding-bottom:100px;
}

/* light mode */

.light{
background:#f4f7f8;
color:#0c4f57;
}

/* header */

.header{
background:#e9f6f7;
padding:22px;
border-radius:0 0 36px 36px;
}

.logo{
width:130px;
}

/* card */

.card{
width:92%;
max-width:900px;
margin:35px auto;
padding:26px;
background:rgba(255,255,255,.05);
border-radius:20px;
box-shadow:0 6px 24px rgba(0,0,0,.35);
}

/* images */

.image{
display:flex;
flex-direction:column;
gap:20px;
}

.image img{
width:100%;
height:auto;
border-radius:14px;
box-shadow:0 8px 26px rgba(0,0,0,.35);
}

/* title */

h1{
font-size:30px;
margin:20px 0 10px;
color:#d6f5f6;
}

.light h1{
color:#05444B;
}

/* meta */

.meta{
font-size:17px;
opacity:.85;
margin:6px 0;
}

/* description */

.desc{
margin-top:22px;
font-size:18px;
line-height:1.8;
}

/* controls */

.controls{
position:fixed;
bottom:18px;
left:50%;
transform:translateX(-50%);
background:rgba(255,255,255,.12);
padding:12px 22px;
border-radius:40px;
display:flex;
gap:20px;
}

.btn{
font-size:22px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
<img class="logo" src="images/logo-nadim.png">
</div>

<div class="card">

<div class="image">
<img id="img1" loading="lazy" decoding="async">
<img id="img2" loading="lazy" decoding="async">
</div>

<h1 id="title"></h1>

<div class="meta" id="id"></div>
<div class="meta" id="date"></div>

<div class="desc" id="desc"></div>

</div>

<div class="controls">
<div class="btn" onclick="toggleTheme()">☀️</div>
<div class="btn" onclick="toggleLang()">🌐</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzvJPDx_LBhtn19YvkNM0NlXvjTy80Nzzgze8JdDVuol0fw1o3LYqENi1d2gfrDPFJJ/exec"

let lang="ar"

const params=new URLSearchParams(location.search)
const id=params.get("id")

let artwork

const img1=document.getElementById("img1")
const img2=document.getElementById("img2")

const title=document.getElementById("title")
const metaId=document.getElementById("id")
const date=document.getElementById("date")
const desc=document.getElementById("desc")

async function loadData(){

try{

const res=await fetch("data/artworks.json",{cache:"force-cache"})
const data=await res.json()

artwork=data.find(a=>a.id===id)

if(!artwork){

document.querySelector(".card").innerHTML="<h2>Artwork not found</h2>"
return

}

/* preload main image */

document.getElementById("preloadImg").href = artwork.image1

render()

}catch(err){

console.error(err)
document.querySelector(".card").innerHTML="<h2>Error loading artwork</h2>"

}

}

function render(){

img1.src = artwork.image1 || "images/no-image.jpg"

if(artwork.image2){

img2.src = artwork.image2

}else{

img2.style.display="none"

}

if(lang==="ar"){

title.textContent=artwork.title_ar
metaId.textContent="رقم القطعة: "+artwork.id
date.textContent="التاريخ: "+artwork.date
desc.textContent=artwork.desc_ar

}else{

title.textContent=artwork.title_en
metaId.textContent="Item ID: "+artwork.id
date.textContent="Date: "+artwork.date
desc.textContent=artwork.desc_en

}

}

function toggleLang(){

lang=(lang==="ar")?"en":"ar"
render()

}

function toggleTheme(){

document.body.classList.toggle("light")

}

/* load */

loadData()

/* track scan */

fetch(API+"?track="+id+"&lang="+lang+"&device="+navigator.userAgent).catch(()=>{})

</script>

</body>

</html>
