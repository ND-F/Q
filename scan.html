<!DOCTYPE html>

<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Museum of Islamic Arts in Cairo and NADIM - متحف الفن الإسلامي بالقاهرة ونديم</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--main:#06444C;
--light:#EAE8D8;
--gold:#E1A93E;
}

body{
margin:0;
font-family:Tajawal;
background:var(--main);
color:white;
}

.light{
background:var(--light);
color:#06444};
}

/* HEADER */

#museumHeader{

position:sticky;
top:0;

background:#EAE8D8;

padding:20px;

display:flex;
flex-direction:column;
align-items:center;

gap:12px;

z-index:1000;

transition:.3s;

}

.logo-row{

display:flex;
align-items:center;
justify-content:center;
gap:25px;

}

.logo{
height:60px;
cursor:pointer;
}

.header-title{

font-size:30px;
color:#06444C;
text-align:center;
max-width:900px;

}

.header-small{

padding:10px;

}

.header-small .logo{
height:35px;
}

.header-small .header-title{
font-size:20px;
}

/* PAGE */

.container{

max-width:1300px;
margin:auto;
padding:20px;

}

/* IMAGE */

.viewer{

height:75vh;

display:flex;
align-items:center;
justify-content:center;

}

.viewer img{

max-width:100%;
max-height:100%;

object-fit:contain;

}

/* THUMBS */

.thumbs{

display:flex;
gap:10px;
margin-top:15px;

}

.thumbs img{

width:80px;
border-radius:6px;
cursor:pointer;
opacity:.7;

}

.thumbs img.active{

border:3px solid var(--gold);
opacity:1;

}

/* INFO */

.info{

margin-top:10px;

}

.info h1{

font-size:30px;
margin:10px 0;

}

.meta{

font-size:20px;
margin:6px 0;

}

.details{

font-size:20px;
line-height:1.8;
margin-top:30px;

}

/* DESKTOP */

@media(min-width:1100px){

.container{

display:grid;

grid-template-columns:90px 1fr 420px;

grid-template-areas:

"thumb viewer info"

". details details";

gap:40px;

}

.thumbs{

grid-area:thumb;

flex-direction:column;

}

.viewer{

grid-area:viewer;

}

.info{

grid-area:info;

margin-top:0;

}

.details{

grid-area:details;

margin-top:40px;

}

}

/* MOBILE */

@media(max-width:1100px){

.container{

display:block;

}

.viewer{

margin-top:10px;

}

.thumbs{

flex-direction:row;
overflow-x:auto;

}

}

/* CONTROLS */

.controls{

position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);

background:rgba(0,0,0,.35);
padding:10px 20px;
border-radius:40px;

display:flex;
gap:16px;

}

.controls div{

font-size:22px;
cursor:pointer;

}

footer{

text-align:center;
margin:80px 0;
font-size:18px;

}

</style>

</head>

<body>

<header id="museumHeader">

<div class="logo-row">

<a href="https://nd-f.github.io/QR/">
<img src="images/logo-nadim.png" class="logo">
</a>

<div class="header-title" id="headerTitle"></div>

<img src="images/MIALOGO.png" class="logo">

</div>

</header>

<div class="container">

<div class="viewer">
<img id="mainImage">
</div>

<div class="thumbs" id="thumbs"></div>

<div class="info">

<div class="meta" id="inv"></div>

<h1 id="title"></h1>

<div class="meta" id="from"></div>

<div class="meta" id="date"></div>

<div class="meta" id="dim"></div>

</div>

<div class="details">

<div class="meta" id="hall"></div>

<div id="desc"></div>

</div>

</div>

  
<div class="controls">

<div onclick="toggleLang()">🌐</div>
<div onclick="toggleTheme()">☀️</div>
<div onclick="share()">🔗</div>

</div>

<footer>
Nadim Foundation - مؤسسة نديم © ®
</footer>

<script>

let lang = navigator.language.startsWith("ar") ? "ar" : "en"

if(window.matchMedia("(prefers-color-scheme: light)").matches){
document.body.classList.add("light")
}

const params = new URLSearchParams(location.search)
const id = params.get("id")

const mainImage = document.getElementById("mainImage")

let images=[]
let current=0
let artwork

async function load(){

const res = await fetch("data/artworks.json")
const data = await res.json()

artwork = data.find(a=>a.id===id)

if(!artwork){
document.body.innerHTML="<h2 style='text-align:center'>Artwork not found</h2>"
return
}

prepareImages()
render()

}

function prepareImages(){

images=[
artwork.image1,
artwork.image2,
artwork.image3,
artwork.image4,
artwork.image5
].filter(img=>img && img.trim()!=="")

const thumbs=document.getElementById("thumbs")

thumbs.innerHTML=""

images.forEach((src,i)=>{

const img=document.createElement("img")

img.src=src

img.onclick=()=>show(i)

img.onerror=()=>img.remove()

thumbs.appendChild(img)

})

}

function show(i){

if(images.length===0) return

current=i

mainImage.src=images[i]

document.querySelectorAll(".thumbs img").forEach((t,k)=>{

t.classList.toggle("active",k===i)

})

}

function render(){

document.documentElement.dir = lang==="ar" ? "rtl":"ltr"

document.getElementById("inv").textContent=artwork.inventory_number

document.getElementById("title").textContent =
lang==="ar" ? artwork.title_ar : artwork.title_en

document.getElementById("from").textContent =
lang==="ar" ? artwork.from_ar : artwork.from_en

document.getElementById("date").textContent =
lang==="ar" ? artwork.date_ar : artwork.date_en

document.getElementById("dim").textContent =
lang==="ar" ? artwork.dimensions_ar : artwork.dimensions_en

document.getElementById("hall").textContent =
lang==="ar" ? artwork.hall_ar : artwork.hall_en

document.getElementById("desc").textContent =
lang==="ar" ? artwork.desc_ar : artwork.desc_en

document.getElementById("headerTitle").textContent =
lang==="ar"
? "معرض من حياة التحفة"
: "From the life of an Artifact Exhibition"

show(0)

}

function toggleLang(){

lang = lang==="ar" ? "en":"ar"
render()

}

function toggleTheme(){

document.body.classList.toggle("light")

}

function share(){

navigator.share?.({url:location.href})

}

let startX=0

mainImage.addEventListener("touchstart",e=>{
startX = e.touches[0].clientX
})

mainImage.addEventListener("touchend",e=>{

let diff = startX - e.changedTouches[0].clientX

if(Math.abs(diff)>60){

if(diff>0) next()
else prev()

}

})

function next(){

if(images.length===0) return

current=(current+1)%images.length
show(current)

}

function prev(){

if(images.length===0) return

current=(current-1+images.length)%images.length
show(current)

}

const header=document.getElementById("museumHeader")

window.addEventListener("scroll",()=>{

if(window.scrollY>40){
header.classList.add("header-small")
}else{
header.classList.remove("header-small")
}

})

load()

</script>

</body>
</html>
