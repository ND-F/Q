<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museum of Islamic Arts - متحف الفن الإسلامي ونديم</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --main: #06444C;   /* الكحلي */
            --light: #EAE8D8;  /* الكريمي */
            --gold: #E1A93E;   /* الذهبي */
        }

        
        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background: var(--main);
            color: var(--light);
            transition: background 0.4s ease, color 0.4s ease;
        }

        .light {
            background: var(--light);
            color: var(--main);
        }

        /* HEADER */
        #museumHeader {
            position: sticky;
            top: 0;
            background: var(--light) !important; 
            color: var(--main) !important;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        .logo-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
        }

        .logo { height: 55px; cursor: pointer; }

        .header-title {
            font-size: 22px;
            color: var(--main) !important;
            text-align: center;
            font-weight: 700;
        }

        /* CONTAINER LAYOUT */
        .container {
            max-width: 1400px;
            margin: auto;
            padding: 20px;
        }

        /* MAIN VIEWER */
        .viewer {
            height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .viewer img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        /* THUMBS */
        .thumbs {
            display: flex;
            gap: 12px;
        }

        .thumbs img {
            width: 85px;
            height: 85px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            opacity: .6;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .thumbs img.active {
            border: 3px solid var(--gold);
            opacity: 1;
            transform: scale(1.05);
        }

        /* INFO & TEXT STYLE */
        .info h1 {
            font-size: 32px;
            margin: 0 0 15px 0;
            color: var(--gold);
            font-weight: 700;
        }

        .meta {
            font-size: 19px;
            margin: 8px 0;
            opacity: 0.9;
        }

        .details {
            font-size: 20px;
            line-height: 1.8;
            margin-top: 50px;
            border-top: 1px solid rgba(225, 169, 62, 0.2);
            padding-top: 20px;
        }

        /* DESKTOP SYMMETRY (السر هنا) */
        @media(min-width:1100px) {
            .container {
                display: grid;
                grid-template-columns: 450px 1fr 100px; /* توزيع الأعمدة */
                grid-template-areas: 
                    "info viewer thumb"
                    "details details ."; 
                gap: 30px;
                align-items: start;
            }

            .info {
                grid-area: info;
                /* نفس المسافة اللي هتنزلها الثامنيلز عشان التماثل */
                margin-top: 150px; 
                text-align: right;
            }

            .thumbs {
                grid-area: thumb;
                flex-direction: column;
                margin-top: 150px; /* بداية الثامنيلز */
            }

            .viewer { grid-area: viewer; }
            .details { grid-area: details; }
        }

        /* MOBILE LAYOUT */
        @media(max-width:1100px) {
            .container { display: flex; flex-direction: column; }
            .info { order: 2; margin-top: 20px; }
            .viewer { order: 1; height: 50vh; }
            .thumbs { order: 3; flex-direction: row; overflow-x: auto; padding: 10px 0; }
            .thumbs img { width: 70px; height: 70px; flex-shrink: 0; }
        }

        /* CONTROLS (الشكل المبهج) */
        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 30, 35, 0.85); /* خلفية غامقة شفافة شيك */
            backdrop-filter: blur(10px);
            padding: 12px 30px;
            border-radius: 50px;
            display: flex;
            gap: 25px;
            z-index: 2000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .controls div {
            font-size: 26px; /* حجم أكبر ومبهج */
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .controls div:hover {
            transform: scale(1.3); /* تكبير عند اللمس */
        }

        footer {
            text-align: center;
            margin: 60px 0 120px 0;
            font-size: 16px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

<header id="museumHeader">
    <div class="logo-row">
        <a href="https://nd-f.github.io/QR/">
            <img src="images/logo-nadim.png" class="logo">
        </a>
        <div class="header-title" id="headerTitle"></div>
        <img src="images/MIALOGO.png" class="logo">
    </div>
</header>

<div class="container">
    <div class="viewer">
        <img id="mainImage" src="">
    </div>

    <div class="thumbs" id="thumbs"></div>

    <div class="info">
        <div class="meta" id="inv"></div>
        <h1 id="title"></h1>
        <div class="meta" id="from"></div>
        <div class="meta" id="date"></div>
        <div class="meta" id="dim"></div>
    </div>

    <div class="details">
        <div class="meta" id="hall"></div>
        <div id="desc"></div>
    </div>
</div>

<div class="controls">
    <div onclick="toggleLang()" title="اللغة">🌐</div>
    <div onclick="toggleTheme()" id="themeBtn" title="الثيم">☀️</div>
    <div onclick="share()" title="مشاركة">🔗</div>
</div>

<footer>
    Nadim Foundation - مؤسسة نديم © ®
</footer>

<script>
    let lang = navigator.language.startsWith("ar") ? "ar" : "en";
    
    // ضبط الأيقونة الابتدائية بناءً على ثيم الجهاز
    const themeBtn = document.getElementById("themeBtn");
    if(window.matchMedia("(prefers-color-scheme: light)").matches){
        document.body.classList.add("light");
        themeBtn.textContent = "🌙";
    }

    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    const mainImage = document.getElementById("mainImage");
    let images = [];
    let artwork;

    async function load() {
        try {
            const res = await fetch("data/artworks.json");
            const data = await res.json();
            artwork = data.find(a => a.id === id);

            if(!artwork) {
                document.body.innerHTML = "<h2 style='text-align:center; margin-top:100px;'>التحفة غير موجودة</h2>";
                return;
            }
            prepareImages();
            render();
        } catch (e) { console.error(e); }
    }

    function prepareImages() {
        images = [artwork.image1, artwork.image2, artwork.image3, artwork.image4, artwork.image5]
                 .filter(img => img && img.trim() !== "");

        const thumbs = document.getElementById("thumbs");
        thumbs.innerHTML = "";
        images.forEach((src, i) => {
            const img = document.createElement("img");
            img.src = src;
            img.onclick = () => show(i);
            thumbs.appendChild(img);
        });
    }

    function show(i) {
        mainImage.src = images[i];
        document.querySelectorAll(".thumbs img").forEach((t, k) => {
            t.classList.toggle("active", k === i);
        });
    }

    function render() {
        document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
        document.getElementById("inv").textContent = artwork.inventory_number;
        document.getElementById("title").textContent = lang === "ar" ? artwork.title_ar : artwork.title_en;
        document.getElementById("from").textContent = lang === "ar" ? artwork.from_ar : artwork.from_en;
        document.getElementById("date").textContent = lang === "ar" ? artwork.date_ar : artwork.date_en;
        document.getElementById("dim").textContent = lang === "ar" ? artwork.dimensions_ar : artwork.dimensions_en;
        document.getElementById("hall").textContent = lang === "ar" ? artwork.hall_ar : artwork.hall_en;
        document.getElementById("desc").textContent = lang === "ar" ? artwork.desc_ar : artwork.desc_en;
        document.getElementById("headerTitle").textContent = lang === "ar" ? "معرض من حياة التحفة" : "From the Life of an Artefact Exhibition";
        show(0);
    }

    function toggleLang() {
        lang = lang === "ar" ? "en" : "ar";
        render();
    }

    function toggleTheme() {
        const isLight = document.body.classList.toggle("light");
        // تغيير الأيقونة: لو فاتح اعرض قمر (للانتقال للظلام)، لو غامق اعرض شمس
        themeBtn.textContent = isLight ? "🌙" : "☀️";
    }

    function share() {
        if (navigator.share) navigator.share({ url: location.href });
        else alert("تم نسخ الرابط: " + location.href);
    }

    load();
</script>

</body>
</html>
