<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nadim Museum</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--main:#05444B;
--dark:#071f21;
--light:#f4f7f8;
}

body{
margin:0;
font-family:'Tajawal',sans-serif;
background:#071f21;
color:#e9f6f7;
text-align:center;
direction:rtl;
padding-bottom:100px;
}

.light{
background:#f4f7f8;
color:#0c4f57;
}

.header{
background:#e9f6f7;
padding:22px;
border-radius:0 0 36px 36px;
}

.logo{
width:130px;
}

.card{
width:92%;
max-width:900px;
margin:35px auto;
padding:26px;
background:rgba(255,255,255,.05);
border-radius:20px;
box-shadow:0 6px 24px rgba(0,0,0,.35);
}

.image img{
width:100%;
border-radius:14px;
box-shadow:0 8px 26px rgba(0,0,0,.35);
}

h1{
font-size:30px;
margin:20px 0 10px;
color:#d6f5f6;
}

.meta{
font-size:17px;
opacity:.85;
margin:6px 0;
}

.desc{
margin-top:22px;
font-size:18px;
line-height:1.8;
}

.controls{
position:fixed;
bottom:18px;
left:50%;
transform:translateX(-50%);
background:rgba(255,255,255,.12);
padding:12px 22px;
border-radius:40px;
display:flex;
gap:20px;
}

.btn{
font-size:22px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
<img class="logo" src="images/logo-nadim.png">
</div>

<div class="card">

<div class="image">
<img id="img" loading="lazy">
</div>

<h1 id="title"></h1>

<div class="meta" id="id"></div>
<div class="meta" id="date"></div>

<div class="desc" id="desc"></div>

</div>

<div class="controls">
<div class="btn" onclick="toggleTheme()">☀️</div>
<div class="btn" onclick="toggleLang()">🌐</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzvJPDx_LBhtn19YvkNM0NlXvjTy80Nzzgze8JdDVuol0fw1o3LYqENi1d2gfrDPFJJ/exec"

let lang="ar"

const params=new URLSearchParams(location.search)
const id=params.get("id")

let artwork

async function loadData(){

const res=await fetch("data/artworks.json")
const data=await res.json()

artwork=data.find(a=>a.id===id)

render()

}

function render(){

document.getElementById("img").src=artwork.image1

if(lang=="ar"){

document.getElementById("title").textContent=artwork.title_ar
document.getElementById("id").textContent="رقم القطعة: "+artwork.id
document.getElementById("date").textContent="التاريخ: "+artwork.date
document.getElementById("desc").textContent=artwork.desc_ar

}else{

document.getElementById("title").textContent=artwork.title_en
document.getElementById("id").textContent="Item ID: "+artwork.id
document.getElementById("date").textContent="Date: "+artwork.date
document.getElementById("desc").textContent=artwork.desc_en

}

}

function toggleLang(){

lang=(lang=="ar")?"en":"ar"
render()

}

function toggleTheme(){

document.body.classList.toggle("light")

}

loadData()

fetch(API+"?track="+id).catch(()=>{})

</script>

</body>

</html>
