<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    
    <title>NADIM in Museum of Islamic Arts - نديم في متحف الفن الإسلامي</title>
    
    <meta name="theme-color" content="#06444C" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#EAE8D8" media="(prefers-color-scheme: light)">
    
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/ND-F/Q/main/images/icon-nadim-light.svg?v=2" media="(prefers-color-scheme: dark)">
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/ND-F/Q/main/images/icon-nadim.svg?v=2" media="(prefers-color-scheme: light)">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/ND-F/Q/main/images/icon-nadim-light.svg?v=2">
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root { --main: #06444C; --light: #EAE8D8; --gold: #E1A93E; }
        
        body { 
            margin: 0; font-family: 'Tajawal', sans-serif; 
            background: var(--main); color: var(--light); 
            transition: background 0.4s ease; overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .light { background: var(--light) !important; color: var(--main) !important; }

        #museumHeader { 
            position: sticky; top: 0; background: var(--light) !important; 
            padding: 0px 20px; display: flex; flex-direction: column; 
            align-items: center; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.1); 
            border-radius: 0 0 20px 20px; transition: padding 0.3s ease;
        }
        .logo-row { display: flex; align-items: center; justify-content: center; gap: 15px; width: 100%; direction: rtl !important; }
        .logo { height: 70px; width: auto; cursor: pointer; }
        .header-title { font-size: 21px; font-weight: 700; text-align: center; color: var(--main) !important; }

        .container { 
            max-width: 1400px; margin: auto; padding: 20px; 
            display: flex; flex-direction: column; 
        }

        .video-container {
            grid-area: video;
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; 
            height: 0;
            margin-bottom: 30px; 
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
            border: 2px solid var(--gold); 
            display: none; 
        }
        .video-container iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        .viewer { 
            grid-area: viewer; width: 100%; height: 50vh; position: relative; 
            display: flex; align-items: center; justify-content: center; 
            margin-bottom: 15px; overflow: hidden; background: transparent; 
            cursor: pointer;
        }
        .viewer img { 
            max-width: 95%; max-height: 95%; object-fit: contain; 
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.3)); opacity: 0; transition: opacity 0.3s;
        }
        .viewer.loaded img { opacity: 1; }

        .thumbs { grid-area: thumb; display: flex; gap: 12px; overflow-x: auto; padding: 10px 5px; scrollbar-width: none; }
        .thumbs img { 
            width: 75px; height: 75px; object-fit: contain; border-radius: 15px; 
            cursor: pointer; opacity: .4; background: rgba(255,255,255,0.05); 
            border: 2px solid transparent; display: none; transition: 0.3s;
        }
        .thumbs img.active { border-color: var(--gold); opacity: 1; transform: scale(1.1); }

        .info { grid-area: info; }
        .info h1 { font-size: 26px; color: var(--gold); margin: 0 0 10px 0; }
        .details { grid-area: details; margin-top: 25px; border-top: 1px solid rgba(225, 169, 62, 0.2); padding-top: 20px; line-height: 1.8; }

        body.lang-en .info, body.lang-en .details { text-align: left !important; direction: ltr !important; }
        body.lang-ar .info, body.lang-ar .details { text-align: right !important; direction: rtl !important; }

        @media(min-width:1100px) {
            .container:not(.video-only-layout) { 
                display: grid; 
                grid-template-columns: 120px 1fr 450px; 
                grid-template-areas: 
                    "video video video"
                    "thumb viewer info" 
                    "thumb details details";
                gap: 50px; 
                direction: ltr !important; 
            }
            .container:not(.video-only-layout) .viewer { height: 70vh; }
            .container:not(.video-only-layout) .thumbs { flex-direction: column; position: sticky; top: 120px; margin-top: 30px; }
            .container:not(.video-only-layout) .info { margin-top: 30px; }
            
            .container:not(.video-only-layout) .video-container {
                max-width: 800px;
                margin-left: auto; margin-right: auto;
            }
        }

        @media(min-width:1100px) {
            .container.video-only-layout {
                display: flex !important;
                flex-direction: column;
                align-items: center; 
                max-width: 800px; 
                margin: 0 auto;
            }
            .container.video-only-layout .video-container,
            .container.video-only-layout .info,
            .container.video-only-layout .details {
                width: 100%;
                margin-left: 0; margin-right: 0;
            }
            .container.video-only-layout .video-container { margin-bottom: 0; }
            .container.video-only-layout .info { margin-top: 15px; }
        }

        .controls { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            background: rgba(10, 30, 35, 0.96); backdrop-filter: blur(15px);
            padding: 12px 30px; border-radius: 50px; display: flex; align-items: center; gap: 25px; 
            z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.4); border: 1px solid var(--gold); 
            direction: ltr !important;
        }
        .controls div { font-size: 24px; cursor: pointer; color: white; transition: 0.2s; position: relative; } 
        .controls .nav-btn { color: var(--gold); font-size: 28px; }
        .controls .nav-btn.disabled { opacity: 0.15; pointer-events: none; }
        .controls .sep { width: 1px; height: 20px; background: rgba(225, 169, 62, 0.3); }

        .controls > div:not(.sep)::before {
            content: attr(data-tooltip); 
            position: absolute;
            bottom: 125%; 
            left: 50%;
            transform: translateX(-50%) translateY(10px); 
            background: rgba(6, 68, 76, 0.98); 
            color: var(--light); 
            padding: 8px 15px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap; 
            opacity: 0; 
            visibility: hidden;
            transition: 0.3s ease; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            pointer-events: none; 
            z-index: 10000; 
        }

        .controls > div:not(.sep):hover::before {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0); 
        }

        #fullscreenModal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--main); z-index: 10001; }
        #modalContent { display: flex; height: 100%; align-items: center; justify-content: center; overflow: hidden; }
        #modalImage { max-width: 95%; max-height: 95%; object-fit: contain; cursor: grab; transform-origin: center center; }
        #modalClose { position: absolute; top: 25px; right: 25px; font-size: 40px; color: var(--light); cursor: pointer; z-index: 10002; background: rgba(0,0,0,0.3); border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }

        .photo-credit { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.85)); color: white !important; padding: 35px 15px 15px; font-size: 13px; z-index: 10; opacity: 0; transition: 0.4s; pointer-events: none; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
        .viewer:hover .photo-credit, .viewer.info-active .photo-credit { opacity: 1 !important; }

        footer { text-align: center; margin: 40px 0 120px 0; font-size: 13px; opacity: 0.4; }
    </style>
</head>

<body class="lang-ar">

<div id="fullscreenModal"><div id="modalClose">×</div><div id="modalContent"><img id="modalImage"></div></div>

<header id="museumHeader">
    <div class="logo-row">
        <a href="https://nd-f.github.io/QR/">
            <img src="images/logo-nadim.png" class="logo">
        </a>
        <div class="header-title" id="headerTitle">معرض من حياة التحفة - From the Life of an Artefact Exhibition</div>
        <a href="https://www.miaegypt.org/ar-eg/museum/collection/Collection" target="_blank">
            <img src="images/MIALOGO.png" class="logo">
        </a>
    </div>
</header>

<div class="container">
    <div class="video-container" id="videoContainer"></div>
    
    <div class="viewer" id="mainViewer">
        <img id="mainImage" decoding="async">
        <div class="photo-credit" id="photoCredit"></div>
    </div>
    
    <div class="thumbs" id="thumbs"></div>
    
    <div class="info">
        <div class="meta" id="inv"></div><h1 id="title"></h1>
        <div class="meta" id="from"></div><div class="meta" id="date"></div><div class="meta" id="dim"></div>
    </div>
    
    <div class="details">
        <div class="meta" id="hall"></div>
        <div class="meta" id="material" style="font-weight: 600; color: var(--gold);"></div>
        <div id="desc"></div>
    </div>
</div>

<div class="controls">
    <div onclick="navigatePiece(-1)" id="prevPiece" class="nav-btn" data-ar="القطعة السابقة" data-en="Previous Piece">◀</div>
    <div class="sep"></div>
    <div onclick="toggleLang()" data-ar="اللغة" data-en="Language">🌐</div>
    <div onclick="window.location.href='https://nd-f.github.io/QR/'" data-ar="اتصل بنا" data-en="Contact Us" style="display: flex; align-items: center; justify-content: center;">
        <img src="images/icon-nadim-light.png" style="width: 35px; height: 35px; object-fit: contain;"> </div>
    <div onclick="toggleTheme()" id="themeBtn" data-ar="المظهر" data-en="Theme">☀️</div>
    <div onclick="share()" data-ar="مشاركة" data-en="Share">🔗</div>
    <div class="sep"></div>
    <div onclick="navigatePiece(1)" id="nextPiece" class="nav-btn" data-ar="القطعة التالية" data-en="Next Piece">▶</div>
</div>

<footer> Nadim Foundation ©® 2018 </footer>

<script>
    const systemLang = navigator.language.startsWith("ar") ? "ar" : "en";
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    let lang = localStorage.getItem("nadim_lang") || systemLang;
    
    let allArtworks = [], validImages = [], currentIdx = 0, artwork, infoTimer;

    const dom = {
        inv: document.getElementById("inv"),
        title: document.getElementById("title"),
        from: document.getElementById("from"),
        date: document.getElementById("date"),
        dim: document.getElementById("dim"),
        hall: document.getElementById("hall"),
        material: document.getElementById("material"),
        desc: document.getElementById("desc"),
        videoContainer: document.getElementById("videoContainer")
    };

    const mainViewer = document.getElementById("mainViewer"), mainImage = document.getElementById("mainImage");
    const photoCredit = document.getElementById("photoCredit"), modal = document.getElementById("fullscreenModal"), modalImage = document.getElementById("modalImage");

    async function load() {
        try {
            const savedTheme = localStorage.getItem("nadim_theme");
            if (savedTheme === "light" || (!savedTheme && !prefersDark)) document.body.classList.add("light");
            updateThemeIcon();

            const res = await fetch("data/artworks.json?t=" + new Date().getTime());
            allArtworks = await res.json();
            
            let id = new URLSearchParams(location.search).get("id");
            if (!id) {
                let pathName = window.location.pathname.replace(/\/$/, "");
                let fileName = pathName.split('/').pop().replace('.html', '');
                if (fileName && fileName !== "scan" && fileName !== "Q") id = fileName;
            }
            
            const finalId = id || allArtworks[0].id;
            initPiece(finalId);
            
            if (window.location.search.includes("id=")) {
                window.history.replaceState({id: finalId}, '', finalId);
            }
        } catch(e) { console.error("Data Load Failed"); }
    }

    function initPiece(id) {
        let targetId = String(id).trim().toLowerCase();
        artwork = allArtworks.find(a => String(a.id).trim().toLowerCase() === targetId);
        if(!artwork) artwork = allArtworks[0];
        
        currentIdx = 0;
        validImages = Array(5).fill(null);
        
        mainImage.removeAttribute("src");
        mainImage.src = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
        
        mainViewer.classList.remove("loaded", "empty-piece");
        mainViewer.style.display = "flex"; 
        document.getElementById("thumbs").style.display = "flex";
        
        const container = document.querySelector('.container');
        const isVideoPiece = targetId.startsWith('v');
        
        if (isVideoPiece) {
            container.classList.add('video-only-layout');
        } else {
            container.classList.remove('video-only-layout');
        }
        
        photoCredit.innerHTML = "";
        
        prepareImages();
        render();
        updateNavButtons();
    }

    function setNoImageFallback() {
        mainViewer.classList.remove("loaded");
        mainImage.onload = () => mainViewer.classList.add("loaded");
        mainImage.src = "images/no-image.webp";
        mainViewer.classList.add("empty-piece"); 
    }

    function prepareImages() {
        const potential = [artwork.image1, artwork.image2, artwork.image3, artwork.image4, artwork.image5];
        const thumbs = document.getElementById("thumbs");
        thumbs.innerHTML = ""; 
        const validSources = potential.filter(src => src && src.trim() !== "");
        
        if (validSources.length === 0) {
            if (artwork.video_url && artwork.video_url.trim() !== "") {
                mainViewer.style.display = "none";
                thumbs.style.display = "none";
            } else {
                setNoImageFallback();
            }
            return;
        }

        let firstFound = false;
        let checkedCount = 0;
        let loadedCount = 0;

        potential.forEach((src, index) => {
            if (!src || src.trim() === "") { checkedCount++; return; }
            const webpSrc = src.replace(/\.[^/.]+$/, ".webp");
            const img = document.createElement("img");
            
            img.onload = () => {
                checkedCount++; loadedCount++;
                img.style.display = 'block';
                validImages[index] = webpSrc;
                if (index === 0) { show(0); firstFound = true; } 
                else if (!firstFound && checkedCount === potential.length) {
                    const firstAvailable = validImages.findIndex(v => v !== null);
                    if (firstAvailable !== -1) { show(firstAvailable); firstFound = true; }
                }
            };
            img.onerror = () => {
                checkedCount++; img.remove();
                if (checkedCount === potential.length && loadedCount === 0) {
                    if (artwork.video_url && artwork.video_url.trim() !== "") { 
                        mainViewer.style.display = "none"; 
                        thumbs.style.display = "none"; 
                        document.querySelector('.container').classList.add('video-only-layout');
                    }
                    else setNoImageFallback();
                }
            };
            img.onclick = (e) => { e.stopPropagation(); show(index); };
            img.src = webpSrc;
            thumbs.appendChild(img);
        });
    }

    function show(i) {
        const src = validImages[i];
        if(!src) return;
        currentIdx = i;
        mainViewer.classList.remove("loaded", "empty-piece");
        mainImage.onload = () => mainViewer.classList.add("loaded");
        mainImage.src = src;
        modalImage.src = src;
        document.querySelectorAll(".thumbs img").forEach(t => t.classList.toggle("active", t.src.includes(src)));
        const info = (artwork[`info_${lang}${i + 1}`] || "").trim();
        photoCredit.innerHTML = info;
        photoCredit.style.opacity = info ? "1" : "0";
    }

    function render() {
        document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
        document.body.className = (lang === "ar" ? "lang-ar" : "lang-en") + (document.body.classList.contains("light") ? " light" : "");
        
        const isVideo = artwork.id && String(artwork.id).toLowerCase().startsWith('v');
        const prevBtn = document.getElementById("prevPiece");
        const nextBtn = document.getElementById("nextPiece");
        
        if (isVideo) {
            prevBtn.setAttribute("data-ar", "الحرفة السابقة");
            prevBtn.setAttribute("data-en", "Previous Craft");
            nextBtn.setAttribute("data-ar", "الحرفة التالية");
            nextBtn.setAttribute("data-en", "Next Craft");
        } else {
            prevBtn.setAttribute("data-ar", "القطعة السابقة");
            prevBtn.setAttribute("data-en", "Previous Piece");
            nextBtn.setAttribute("data-ar", "القطعة التالية");
            nextBtn.setAttribute("data-en", "Next Piece");
        }

        document.querySelectorAll('[data-ar]').forEach(el => {
            const label = el.getAttribute(`data-${lang}`);
            el.setAttribute('data-tooltip', label || '');
        });

        const ar = lang === "ar";
        dom.inv.innerHTML = artwork.inventory_number || "";
        dom.title.innerHTML = (ar ? artwork.title_ar : artwork.title_en) || "";
        dom.from.innerHTML = (ar ? artwork.from_ar : artwork.from_en) || "";
        dom.date.innerHTML = (ar ? artwork.date_ar : artwork.date_en) || "";
        dom.dim.innerHTML = (ar ? artwork.dimensions_ar : artwork.dimensions_en) || "";
        dom.hall.innerHTML = (ar ? artwork.hall_ar : artwork.hall_en) || "";
        dom.material.innerHTML = (ar ? artwork.material_ar : artwork.material_en) || "";
        dom.desc.innerHTML = ((ar ? artwork.desc_ar : artwork.desc_en) || "").replace(/\n/g, '<br>');

        if (artwork.video_url && artwork.video_url.trim() !== "") {
            let rawVid = artwork.video_url.trim();
            let finalUrl = rawVid;
            if (rawVid.includes("<iframe") && rawVid.includes("src=")) {
                let match = rawVid.match(/src="([^"]+)"/);
                if (match) finalUrl = match[1];
            }
            dom.videoContainer.style.display = "block";
            dom.videoContainer.innerHTML = `<iframe width="100%" height="100%" src="${finalUrl}" title="Video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;
        } else {
            dom.videoContainer.style.display = "none";
        }
    }

    function toggleLang() { lang = lang === "ar" ? "en" : "ar"; localStorage.setItem("nadim_lang", lang); render(); if(validImages[currentIdx]) show(currentIdx); }
    function toggleTheme() { const isLight = document.body.classList.toggle("light"); localStorage.setItem("nadim_theme", isLight ? "light" : "dark"); updateThemeIcon(); }
    function updateThemeIcon() { document.getElementById("themeBtn").textContent = document.body.classList.contains("light") ? "🌙" : "☀️"; }
    function share() { if (navigator.share) navigator.share({title: dom.title.innerText, url: location.href}); }

    function navigatePiece(step) {
        const idx = allArtworks.findIndex(a => String(a.id) === String(artwork.id)) + step;
        if(idx >= 0 && idx < allArtworks.length) {
            const nextId = allArtworks[idx].id;
            window.history.pushState({id: nextId}, '', nextId);
            initPiece(nextId);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function updateNavButtons() {
        const idx = allArtworks.findIndex(a => String(a.id) === String(artwork.id));
        document.getElementById("prevPiece").classList.toggle("disabled", idx === 0);
        document.getElementById("nextPiece").classList.toggle("disabled", idx === allArtworks.length - 1);
    }

    function triggerInfoMobile() {
        if(window.innerWidth >= 1100) return; 
        clearTimeout(infoTimer);
        mainViewer.classList.add('info-active');
        infoTimer = setTimeout(() => mainViewer.classList.remove('info-active'), 3500);
    }

    let mainStartX = 0;
    mainViewer.addEventListener('touchstart', e => { if (e.touches.length === 1) mainStartX = e.touches[0].clientX; triggerInfoMobile(); }, {passive: true});
    mainViewer.addEventListener('touchend', e => {
        if (validImages.filter(Boolean).length <= 1) return;
        let diff = mainStartX - e.changedTouches[0].clientX;
        if(Math.abs(diff) > 70) {
            const cleanImages = validImages.filter(Boolean);
            const relativeIdx = cleanImages.indexOf(validImages[currentIdx]);
            const nextRelative = diff > 0 ? (relativeIdx + 1) % cleanImages.length : (relativeIdx - 1 + cleanImages.length) % cleanImages.length;
            show(validImages.indexOf(cleanImages[nextRelative]));
        }
    }, {passive: true});

    /* ========================================================================= */
    /* كود الـ Smart Zoom المحدث لمنع مشكلة تصغير الصورة فجأة على الموبايل        */
    /* ========================================================================= */
    let scale = 1, panning = false, pointX = 0, pointY = 0, startX = 0, startY = 0;
    let startDist = 0, initialScale = 1;
    let isPinching = false;
    let tapStartX = 0, tapStartY = 0;

    function setTransform() {
        modalImage.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
    }

    function resetZoom() {
        scale = 1; pointX = 0; pointY = 0;
        setTransform();
    }

    mainViewer.onclick = () => {
        if(!mainImage.src || mainViewer.classList.contains("empty-piece") || mainImage.src.includes("no-image.webp")) return;
        resetZoom();
        modal.style.display = 'block'; 
        document.body.style.overflow = 'hidden'; 
        modalImage.src = mainImage.src;
        history.pushState({modal: true}, "");
    };

    modal.addEventListener("wheel", (e) => {
        if (modal.style.display !== 'block') return;
        e.preventDefault();
        
        const clientX = e.clientX;
        const clientY = e.clientY;
        const delta = e.deltaY || -e.wheelDelta;
        const zoomFactor = delta > 0 ? 0.85 : 1.15; 
        
        let newScale = scale * zoomFactor;
        if (newScale < 1) newScale = 1;
        if (newScale > 20) newScale = 20; 
        
        const ratio = 1 - (newScale / scale);
        const centerX = (window.innerWidth / 2) + pointX;
        const centerY = (window.innerHeight / 2) + pointY;
        
        pointX += (clientX - centerX) * ratio;
        pointY += (clientY - centerY) * ratio;
        scale = newScale;
        
        if (scale === 1) { pointX = 0; pointY = 0; }
        setTransform();
    }, { passive: false });

    modalImage.addEventListener("mousedown", (e) => {
        if (scale > 1) {
            e.preventDefault();
            startX = e.clientX;
            startY = e.clientY;
            panning = true;
            modalImage.style.cursor = "grabbing";
        }
    });
    window.addEventListener("mouseup", () => { panning = false; modalImage.style.cursor = "grab"; });
    window.addEventListener("mousemove", (e) => {
        if (!panning || scale === 1) return;
        e.preventDefault();
        pointX += e.clientX - startX;
        pointY += e.clientY - startY;
        startX = e.clientX;
        startY = e.clientY; 
        setTransform();
    });

    modal.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            e.preventDefault();
            isPinching = true;
            startDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            initialScale = scale;
        } else if (e.touches.length === 1) {
            if (scale > 1) panning = true;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            tapStartX = e.touches[0].clientX;
            tapStartY = e.touches[0].clientY;
        }
    }, {passive: false});

    modal.addEventListener('touchmove', (e) => {
        if (modal.style.display !== 'block') return;
