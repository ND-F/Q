<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Tajawal;
}

.container{
display:flex;
flex-wrap:wrap;
}

.image{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

.image img{
max-width:90%;
max-height:80vh;
}

.info{
flex:1;
padding:40px;
}

h1{
font-size:38px;
margin-bottom:10px;
}

.meta{
color:#0F5C5E;
margin:10px 0;
}

.desc{
margin-top:20px;
line-height:1.8;
}

.views{
margin-top:25px;
font-size:20px;
color:#0F5C5E;
}

</style>

</head>

<body>

<div class="container">

<div class="image">
<img id="img">
</div>

<div class="info">

<h1 id="title_en"></h1>
<h2 id="title_ar"></h2>

<div class="meta">
رقم القطعة: <span id="id"></span>
</div>

<div class="meta">
التاريخ: <span id="date"></span>
</div>

<div class="desc" id="desc_en"></div>

<div class="desc" id="desc_ar"></div>

<div class="views">
تمت مشاهدة هذه القطعة
<span id="views">0</span>
مرة
</div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbz0zgMLLmtC4NPZNJylRPgD7Q8aNjhfsZh6YdCJ55p8E-Bt7heKvDvkKkwutoiuwTSG/exec";

let artworks=[];

const url=new URLSearchParams(location.search);

const id=url.get("id");

fetch(API)
.then(r=>r.json())
.then(data=>{

artworks=data;

let a=artworks.find(x=>x.id==id);

load(a);

track(id);

loadViews();

});

function load(a){

img.src=a.image;

title_en.innerText=a.title_en;

title_ar.innerText=a.title_ar;

desc_en.innerText=a.desc_en;

desc_ar.innerText=a.desc_ar;

date.innerText=a.date;

document.getElementById("id").innerText=a.id;

}

function track(id){

fetch(API+"?track="+id);

}

function loadViews(){

fetch(API+"?stats=1")
.then(r=>r.json())
.then(data=>{

views.innerText=data[id]||0;

});

}

</script>

</body>
</html>
