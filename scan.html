<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nadim Museum</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--main:#0F5C5E;
--dark:#071f21;
--light:#f4f7f8;
}

body{
margin:0;
font-family:'Tajawal',sans-serif;
background:var(--dark);
color:white;
transition:.4s;
}

.light{
background:var(--light);
color:#0f2c2e;
}

.header{
background:var(--main);
padding:20px;
text-align:center;
}

.logo{
width:200px;
}

.container{
display:flex;
flex-wrap:wrap;
gap:40px;
padding:40px;
max-width:1200px;
margin:auto;
}

.image{
flex:1;
min-width:320px;
}

.image img{
width:100%;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.info{
flex:1;
min-width:320px;
}

h1{
font-size:36px;
margin-bottom:10px;
}

.meta{
margin:10px 0;
font-size:18px;
opacity:.9;
}

.desc{
margin-top:25px;
font-size:20px;
line-height:1.8;
}

.counter{
margin-top:25px;
font-size:16px;
opacity:.7;
}

.controls{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(255,255,255,.15);
backdrop-filter:blur(12px);
padding:12px 22px;
border-radius:40px;
display:flex;
gap:20px;
}

.btn{
cursor:pointer;
font-size:20px;
}

</style>

</head>

<body>

<div class="header">
<img class="logo" src="images/logo-full.png">
</div>

<div class="container">

<div class="image">
<img id="img">
</div>

<div class="info">

<h1 id="title"></h1>

<div class="meta" id="id"></div>
<div class="meta" id="date"></div>

<div class="desc" id="desc"></div>

<div class="counter" id="views"></div>

</div>

</div>

<div class="controls">

<div class="btn" onclick="toggleTheme()">🌙</div>
<div class="btn" onclick="toggleLang()">🌐</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbz0zgMLLmtC4NPZNJylRPgD7Q8aNjhfsZh6YdCJ55p8E-Bt7heKvDvkKkwutoiuwTSG/exec"

let lang="ar"

const params=new URLSearchParams(location.search)
const id=params.get("id")

let artwork

fetch(API)
.then(r=>r.json())
.then(data=>{

artwork=data.find(a=>a.id==id)

if(!artwork){
document.body.innerHTML="<h2 style='padding:40px'>Artwork not found</h2>"
return
}

render()

})

function render(){

document.getElementById("img").src=artwork.image || "images/no-image.jpg"

if(lang=="ar"){

document.documentElement.lang="ar"
document.body.dir="rtl"

document.getElementById("title").innerText=artwork.title_ar || ""

document.getElementById("id").innerText=
"رقم القطعة: "+artwork.id

document.getElementById("date").innerText=
"التاريخ: "+(artwork.date || "")

document.getElementById("desc").innerText=
artwork.desc_ar || ""

document.getElementById("views").innerText=
"تمت مشاهدة هذه القطعة "+(artwork.views || 0)+" مرة"

}

else{

document.documentElement.lang="en"
document.body.dir="ltr"

document.getElementById("title").innerText=artwork.title_en || ""

document.getElementById("id").innerText=
"Item ID: "+artwork.id

document.getElementById("date").innerText=
"Date: "+(artwork.date || "")

document.getElementById("desc").innerText=
artwork.desc_en || ""

document.getElementById("views").innerText=
"This item was viewed "+(artwork.views || 0)+" times"

}

}

function toggleLang(){

lang=(lang=="ar")?"en":"ar"
render()

}

function toggleTheme(){

document.body.classList.toggle("light")

}

fetch(API+"?track="+id)

</script>

</body>
</html>
